    {q:"Can you describe your daily routine?",a:"✓ se conseguir sem ajuda"},
    {q:"Can you say what you like and don't like doing?",a:"✓ se conseguir sem ajuda"},
    {q:"Can you say what you're doing right now?",a:"✓ se conseguir sem ajuda"}
  ],
  speaking:[
    "Introduce yourself completely (name, age, city, job).",
    "Tell me about your family.",
    "Describe your daily routine.",
    "What do you usually do on weekends?",
    "What do you love doing? What do you hate doing?",
    "Do you play any sport?",
    "What are you doing today after this class?",
    "How often do you speak English?",
    "What's your dream for this year?",
    "What was the most useful thing you learned in these weeks?"
  ],
  roleplay:{title:"Role-play: Novo amigo (junta tudo)",scenario:"Um faz o papel de alguém que acabou de te conhecer e quer saber TUDO. O outro responde com frases completas. Depois troquem.",lines:["A: Hi! Nice to meet you. Tell me about yourself.","B: (nome, idade, cidade, trabalho)","A: What do you do every day?","B: (rotina + frequência)","A: And what do you love doing?","B: (gostos + esporte)"]},
  homework:{tasks:["Grave um áudio de 1 minuto falando sobre você (junte tudo)","Faça o teste de revisão A1 no Test-English"],link:"https://test-english.com/grammar-points/a1/"}
}
];

// ============ RENDER ============
let current = 0;

function renderSelector(){
  const s = document.getElementById('weekSelector');
  s.innerHTML = lessons.map((l,i)=>`<button class="week-btn ${i===current?'active':''}" onclick="selectWeek(${i})">S${l.week} · ${l.theme.split('—')[0].trim()}</button>`).join('');
}

function selectWeek(i){ current=i; renderSelector(); renderLesson(); window.scrollTo({top:0,behavior:'smooth'}); }

function speak(word){
  if(!('speechSynthesis' in window)){alert('Áudio não suportado neste navegador');return;}
  const clean = word.replace(/\(.*?\)/g,'').trim();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang='en-US'; u.rate=0.9;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

function randomQuestion(){
  const items = document.querySelectorAll('#speakingList .q-item');
  if(!items.length) return;
  items.forEach(it=>it.classList.remove('flash'));
  const pick = items[Math.floor(Math.random()*items.length)];
  pick.classList.add('flash');
  pick.scrollIntoView({behavior:'smooth',block:'center'});
}

function toggleAnswer(id){ document.getElementById(id).classList.toggle('show'); }

function renderLesson(){
  const l = lessons[current];
  document.getElementById('lessonTitle').innerHTML = `
    <div class="flex items-center gap-3 mb-1">
      <span class="text-xs bg-indigo-600 text-white px-2 py-1 rounded font-bold">SEMANA ${l.week}</span>
      <span class="text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded">${l.level}</span>
    </div>
    <h2 class="text-2xl md:text-3xl font-bold text-white">${l.theme}</h2>
    <p class="text-slate-400 mt-1">📚 Gramática: ${l.grammar} · ⏱️ 60 min</p>`;

  const body = document.getElementById('lessonBody');
  let h = '';

  // 1 WARM-UP
  h += stageBlock('#3b82f6','👋 1 · Welcome + Small Talk','5 min · aquecer em inglês',
    l.warmup.map(q=>`<div class="q-item">${q}</div>`).join(''));

  // 2 REVIEW
  h += stageBlock('#22c55e','📚 2 · Review','8 min · revisar a aula anterior',
    l.review.map(q=>`<div class="q-item">${q}</div>`).join(''));

  // 3 LEAD-IN
  h += stageBlock('#a855f7','🎯 3 · Lead-in','5 min · apresentar o tema',
    `<p class="text-slate-300 mb-3">${l.leadin.text}</p><div class="q-item">${l.leadin.q}</div>`);

  // 4 VOCABULARY
  h += stageBlock('#eab308','📝 4 · Vocabulary','8 min · clique 🔊 para ouvir',
    `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">`+
    l.vocab.map(v=>`<div class="vocab-card">
        <div><div class="text-white font-bold">${v.en}</div>
        <div class="ipa">${v.ipa}</div>
        <div class="text-slate-400 text-sm">${v.pt}</div></div>
        <button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">🔊</button>
      </div>`).join('')+`</div>`);

  // 5 GRAMMAR
  h += stageBlock('#ef4444','📖 5 · Grammar Focus','10 min · a estrutura',
    `<p class="text-slate-300 mb-3">${l.grammar.exp}</p>
     <div class="space-y-2">${l.grammar.ex.map(e=>`<div class="q-item" style="color:#fca5a5">${e}</div>`).join('')}</div>`);

  // 6 CONTROLLED PRACTICE
  h += stageBlock('#ec4899','✏️ 6 · Controlled Practice','8 min · fixar sem pressão',
    l.practice.map((p,idx)=>{
      const id=`ans-${l.week}-${idx}`;
      return `<div class="q-item">
        <div class="flex items-center justify-between gap-3">
          <span>${idx+1}. ${p.q}</span>
          <button onclick="toggleAnswer('${id}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded flex-shrink-0">ver resposta</button>
        </div>
        <div id="${id}" class="answer">✓ ${p.a}</div>
      </div>`;
    }).join(''));

  // 7 SPEAKING (star)
  h += stageBlock('#06b6d4','💬 7 · Speaking / Activate','12 min · a hora de FALAR',
    `<div class="flex justify-between items-center mb-3 flex-wrap gap-2">
       <p class="text-slate-400 text-sm">Faça as perguntas ao aluno. Deixe ele falar à vontade.</p>
       <button onclick="randomQuestion()" class="gradient-amber text-white font-bold py-2 px-4 rounded-lg text-sm">🎲 Pergunta aleatória</button>
     </div>
     <div id="speakingList">${l.speaking.map(q=>`<div class="q-item">${q}</div>`).join('')}</div>
     <div class="mt-5 p-4 rounded-xl" style="background:linear-gradient(135deg,#312e81 0%,#1e3a8a 100%);border:1px solid #6366f1">
       <p class="text-indigo-200 font-bold mb-2">🎭 ${l.roleplay.title}</p>
       <p class="text-slate-300 text-sm mb-3">${l.roleplay.scenario}</p>
       ${l.roleplay.lines.map(line=>`<p class="text-white text-sm mb-1">${line}</p>`).join('')}
     </div>`);

  // 8 WRAP-UP
  h += stageBlock('#10b981','🎓 8 · Wrap-up + Homework','4 min · consolidar',
    `<p class="text-slate-300 font-bold mb-2">Homework:</p>
     ${l.homework.tasks.map(t=>`<div class="q-item">📌 ${t}</div>`).join('')}
     <a href="${l.homework.link}" target="_blank" class="inline-block mt-3 gradient-coral text-white font-bold py-2 px-4 rounded-lg text-sm">📊 Praticar no Test-English →</a>`);

  body.innerHTML = h;
}

function stageBlock(color,title,sub,inner){
  return `<div class="stage" style="border-left-color:${color}">
    <div class="mb-4"><h3 class="text-xl font-bold text-white">${title}</h3>
    <p class="text-slate-400 text-sm">${sub}</p></div>${inner}</div>`;
}

// ============ PDF ============
function exportLesson(){
  const l = lessons[current];
  const pa = document.getElementById('printArea');
  let h = `<div style="font-family:Arial;color:#222;padding:30px;line-height:1.6">
    <h1 style="text-align:center;border-bottom:3px solid #6366f1;padding-bottom:12px">⭐ Teacher Lu — Semana ${l.week}: ${l.theme}</h1>
    <p style="text-align:center;color:#666">Nível ${l.level} · Gramática: ${l.grammar} · 60 min</p>`;
  const sec=(t,c)=>`<h2 style="border-left:4px solid #6366f1;padding-left:10px;margin-top:22px">${t}</h2>${c}`;
  h+=sec('👋 1 · Welcome + Small Talk',l.warmup.map(q=>`<p>• ${q}</p>`).join(''));
  h+=sec('📚 2 · Review',l.review.map(q=>`<p>• ${q}</p>`).join(''));
  h+=sec('🎯 3 · Lead-in',`<p>${l.leadin.text}</p><p><b>${l.leadin.q}</b></p>`);
  h+=sec('📝 4 · Vocabulary',`<table style="width:100%;border-collapse:collapse">${l.vocab.map(v=>`<tr><td style="border:1px solid #ddd;padding:6px"><b>${v.en}</b></td><td style="border:1px solid #ddd;padding:6px">${v.ipa}</td><td style="border:1px solid #ddd;padding:6px">${v.pt}</td></tr>`).join('')}</table>`);
  h+=sec('📖 5 · Grammar Focus',`<p>${l.grammar.exp.replace(/<b>/g,'').replace(/<\/b>/g,'')}</p>${l.grammar.ex.map(e=>`<p>• ${e}</p>`).join('')}`);
  h+=sec('✏️ 6 · Controlled Practice',l.practice.map((p,i)=>`<p>${i+1}. ${p.q} <b>(${p.a})</b></p>`).join(''));
  h+=sec('💬 7 · Speaking',l.speaking.map(q=>`<p>• ${q}</p>`).join('')+`<p style="margin-top:10px"><b>🎭 ${l.roleplay.title}:</b> ${l.roleplay.scenario}</p>${l.roleplay.lines.map(x=>`<p style="margin-left:15px">${x}</p>`).join('')}`);
  h+=sec('🎓 8 · Wrap-up + Homework',l.homework.tasks.map(t=>`<p>📌 ${t}</p>`).join('')+`<p>Link: ${l.homework.link}</p>`);
  h+=`</div>`;
  pa.innerHTML=h;
  html2pdf().set({margin:8,filename:`Aula-S${l.week}-${l.theme.split('—')[0].trim()}.pdf`,image:{type:'jpeg',quality:.98},html2canvas:{scale:2},jsPDF:{orientation:'portrait',unit:'mm',format:'a4'}}).from(pa).save();
}

function goHome(){ window.location.href='index.html'; }

renderSelector();
renderLesson();
</script>
</body>
</html>
