<style>
  * { font-family: 'Inter', sans-serif; }
  h1,h2,h3,h4 { font-family: 'Poppins', sans-serif; }
  body { background: linear-gradient(135deg,#0f172a 0%,#1e293b 100%); }
  .gradient-indigo{background:linear-gradient(135deg,#6366f1 0%,#818cf8 100%);}
  .gradient-emerald{background:linear-gradient(135deg,#10b981 0%,#34d399 100%);}
  .gradient-coral{background:linear-gradient(135deg,#ff6b4a 0%,#ff8566 100%);}
  .gradient-amber{background:linear-gradient(135deg,#f59e0b 0%,#fbbf24 100%);}
  .gradient-pink{background:linear-gradient(135deg,#ec4899 0%,#f472b6 100%);}
  .card{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);border:1px solid rgba(148,163,184,.2);}
  .stage{border-left:5px solid;border-radius:12px;padding:24px;margin-bottom:18px;background:linear-gradient(135deg,#1e293b 0%,#293548 100%);}
  .q-item{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px 16px;margin:8px 0;color:#e2e8f0;transition:all .2s;font-size:15px;}
  .q-item:hover{border-color:#6366f1;}
  .q-item.flash{background:#6366f1;border-color:#818cf8;transform:scale(1.02);box-shadow:0 8px 25px rgba(99,102,241,.5);}
  .vocab-card{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .ipa{color:#fbbf24;font-family:'Times New Roman',serif;font-size:15px;}
  .speak-btn{background:#334155;border:none;color:#818cf8;width:38px;height:38px;border-radius:8px;cursor:pointer;font-size:18px;flex-shrink:0;transition:all .2s;}
  .speak-btn:hover{background:#6366f1;color:white;}
  .week-btn{white-space:nowrap;padding:10px 16px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;background:#334155;color:#cbd5e1;border:2px solid transparent;}
  .week-btn:hover{border-color:#6366f1;}
  .week-btn.active{background:linear-gradient(135deg,#6366f1 0%,#818cf8 100%);color:white;}
  .answer{display:none;margin-top:8px;color:#34d399;font-weight:600;}
  .answer.show{display:block;}


/* ===== LIGHT VIVID THEME (Sabatovicz) ===== */

.gradient-coral{background:linear-gradient(135deg,#ff5e62 0%,#ff9966 100%) !important;color:#fff !important;}
.gradient-emerald{background:linear-gradient(135deg,#0ea5a5 0%,#22c55e 100%) !important;color:#fff !important;}
.gradient-indigo{background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%) !important;color:#fff !important;}
.gradient-amber{background:linear-gradient(135deg,#f7971e 0%,#ffd200 100%) !important;color:#7a4a00 !important;}
.gradient-pink{background:linear-gradient(135deg,#ec4899 0%,#f472b6 100%) !important;color:#fff !important;}

<body>
<div class="min-h-screen">
  <!-- HEADER -->
  <div class="topbar text-white p-6 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto">
      <div class="flex justify-between items-center mb-4">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold">Conversation Lessons</h1>
          <p class="text-[#B7AE9C] text-sm">Ready content • Adult A1 • Speaking focus</p>
        </div>
        <button onclick="goHome()" class="bg-white text-indigo-600 font-bold py-2 px-4 rounded-lg hover:bg-indigo-50 text-sm">← Menu</button>
      </div>
      <!-- WEEK SELECTOR -->
      <div class="flex gap-2 overflow-x-auto pb-1" id="weekSelector"></div>
    </div>
  </div>

  <!-- LESSON -->
  <div class="max-w-5xl mx-auto p-4 md:p-6">
    <div id="lessonTitle" class="card rounded-xl p-6 mb-6"></div>
    <div id="stuBar" class="card rounded-xl p-4 mb-6"></div>
    <div id="lessonBody"></div>

    <div class="card rounded-xl p-6 mt-6 flex gap-3 flex-wrap">
      <button onclick="exportLesson()" class="gradient-emerald text-white font-bold py-3 px-6 rounded-lg">Download lesson PDF</button>
    </div>
    <div id="printArea" class="hidden"></div>
  </div>
</div>

<script src="platform-print.js?v=1"></script>
<script>
// ============ LESSON CONTENT (weeks 1-13) ============
/* Os dados das 52 semanas foram movidos para engine/conversation-lessons.js
   para que qualquer página os leia sem depender desta ter sido aberta.
   Este alias mantém todo o restante da página inalterado. */
const lessons = window.CONV_LESSONS;

// ============ RENDER ============
let current = 0;

function renderSelector(){
  const s = document.getElementById('weekSelector');
  const pilot = i => window.CONV_PLUS && CONV_PLUS[lessons[i].week];
  let h='';
  if(lessons.some((l,i)=>pilot(i))){
    h+=`<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:800;letter-spacing:.5px;color:#7c3aed;background:#ede9fe;border:1px solid #ddd6fe;border-radius:8px;padding:6px 10px;white-space:nowrap">⚡ PILOTO — NOVO PADRÃO</span>`;
  }
  h+=lessons.map((l,i)=>{
    const on=i===current, p=pilot(i);
    const style=p
      ? `background:${on?'linear-gradient(135deg,#7c3aed,#db2777)':'#f5f3ff'} !important;color:${on?'#fff':'#6d28d9'} !important;border:2px solid ${on?'#7c3aed':'#c4b5fd'} !important;box-shadow:0 2px 8px rgba(124,58,237,.15)`
      : '';
    return `<button class="week-btn ${on?'active':''}" style="${style}" onclick="selectWeek(${i})">${p?'⚡ ':''}S${l.week} · ${l.theme.split('—')[0].trim()}</button>`;
  }).join('');
  s.innerHTML=h;
}

function selectWeek(i){ current=i; renderSelector(); renderLesson(); window.scrollTo({top:0,behavior:'smooth'}); }

function speak(word){
  if(!('speechSynthesis' in window)){alert('Audio not supported in this browser');return;}
  const clean = word.replace(/\(.*?\)/g,'').trim();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang='en-US'; u.rate=0.9;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

function randomQuestion(){
  const items = document.querySelectorAll('#speakingList .q-item');
  if(!items.length) return;
  items.forEach(it=>it.classList.remove('flash'));
  const pick = items[Math.floor(Math.random()*items.length)];
  pick.classList.add('flash');
  pick.scrollIntoView({behavior:'smooth',block:'center'});
}

function toggleAnswer(id){ document.getElementById(id).classList.toggle('show'); }

function renderLesson(){
  const l = lessons[current];
  const enriched = window.CONV_PLUS && CONV_PLUS[l.week];
  document.getElementById('lessonTitle').innerHTML = `
    <div class="flex items-center gap-3 mb-1">
      <span class="text-xs bg-[#B08F4C] text-white px-2 py-1 rounded font-bold">WEEK ${l.week}</span>
      <span class="text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded">${l.level}</span>
      ${enriched?'<span class="text-xs px-2 py-1 rounded font-bold" style="background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff">⚡ Conversation Live</span>':''}
    </div>
    <h2 class="text-2xl md:text-3xl font-bold text-white">${l.theme}</h2>
    <p class="text-slate-400 mt-1">Grammar: ${l.grammar} · 60 min</p>`;

  renderStuBar();
  if(enriched){ renderEnriched(l); return; }

  const body = document.getElementById('lessonBody');
  let h = '';

  // 1 WARM-UP
  h += stageBlock('#3b82f6','1 · Welcome + Small Talk','5 min · warm up in English',
    l.warmup.map(q=>`<div class="q-item">${q}</div>`).join(''));

  // 2 REVIEW
  h += stageBlock('#22c55e','2 · Review','8 min · review the previous lesson',
    l.review.map(q=>`<div class="q-item">${q}</div>`).join(''));

  // 3 LEAD-IN
  h += stageBlock('#a855f7','3 · Lead-in','5 min · introduce the topic',
    `<p class="text-slate-300 mb-3">${l.leadin.text}</p><div class="q-item">${l.leadin.q}</div>`);

  // 4 VOCABULARY
  h += stageBlock('#eab308','4 · Vocabulary','8 min · click ► to listen',
    `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">`+
    l.vocab.map(v=>`<div class="vocab-card">
        <div><div class="text-white font-bold">${v.en}</div>
        <div class="ipa">${v.ipa}</div>
        <div class="text-slate-400 text-sm">${v.pt}</div></div>
        <button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">►</button>
      </div>`).join('')+`</div>`);

  // 5 GRAMMAR
  h += stageBlock('#ef4444','5 · Grammar Focus','10 min · the structure',
    `<p class="text-slate-300 mb-3">${l.grammar.exp}</p>
     <div class="space-y-2">${l.grammar.ex.map(e=>`<div class="q-item" style="color:#fca5a5">${e}</div>`).join('')}</div>`);

  // 6 CONTROLLED PRACTICE
  h += stageBlock('#ec4899','6 · Controlled Practice','8 min · practice with no pressure',
    l.practice.map((p,idx)=>{
      const id=`ans-${l.week}-${idx}`;
      return `<div class="q-item">
        <div class="flex items-center justify-between gap-3">
          <span>${idx+1}. ${p.q}</span>
          <button onclick="toggleAnswer('${id}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded flex-shrink-0">show answer</button>
        </div>
        <div id="${id}" class="answer">✓ ${p.a}</div>
      </div>`;
    }).join(''));

  // 7 SPEAKING (star)
  h += stageBlock('#06b6d4','7 · Speaking / Activate','12 min · time to SPEAK',
    `<div class="flex justify-between items-center mb-3 flex-wrap gap-2">
       <p class="text-slate-400 text-sm">Ask the student the questions. Let them speak freely.</p>
       <button onclick="randomQuestion()" class="gradient-amber text-white font-bold py-2 px-4 rounded-lg text-sm">Random question</button>
     </div>
     <div id="speakingList">${l.speaking.map(q=>`<div class="q-item">${q}</div>`).join('')}</div>
     <div class="mt-5 p-4 rounded-xl" style="background:linear-gradient(135deg,#312e81 0%,#1e3a8a 100%);border:1px solid #6366f1">
       <p class="text-indigo-200 font-bold mb-2">${l.roleplay.title}</p>
       <p class="text-slate-300 text-sm mb-3">${l.roleplay.scenario}</p>
       ${l.roleplay.lines.map(line=>`<p class="text-white text-sm mb-1">${line}</p>`).join('')}
     </div>`);

  // 8 WRAP-UP
  h += stageBlock('#10b981','8 · Wrap-up + Homework','4 min · consolidate',
    `<p class="text-slate-300 font-bold mb-2">Homework:</p>
     ${l.homework.tasks.map(t=>`<div class="q-item">${t}</div>`).join('')}
     <a href="${l.homework.link}" target="_blank" class="inline-block mt-3 gradient-coral text-white font-bold py-2 px-4 rounded-lg text-sm">Practice on Test-English →</a>`);

  body.innerHTML = h;
}

function stageBlock(color,title,sub,inner){
  return `<div class="stage" style="border-left-color:${color}">
    <div class="mb-4"><h3 class="text-xl font-bold text-white">${title}</h3>
    <p class="text-slate-400 text-sm teacher-only">${sub}</p></div>${inner}</div>`;
}

// ============ PDF ============
function exportLesson(){
  const l = lessons[current];
  const pa = document.getElementById('printArea');
  let h = `<div style="font-family:Arial;color:#222;padding:30px;line-height:1.6">
    <h1 style="text-align:center;border-bottom:3px solid #6366f1;padding-bottom:12px">Sabatovicz — Week ${l.week}: ${l.theme}</h1>
    <p style="text-align:center;color:#666">Level ${l.level} · Grammar: ${l.grammar} · 60 min</p>`;
  const sec=(t,c)=>`<h2 style="border-left:4px solid #6366f1;padding-left:10px;margin-top:22px">${t}</h2>${c}`;
  h+=sec('1 · Welcome + Small Talk',l.warmup.map(q=>`<p>• ${q}</p>`).join(''));
  h+=sec('2 · Review',l.review.map(q=>`<p>• ${q}</p>`).join(''));
  h+=sec('3 · Lead-in',`<p>${l.leadin.text}</p><p><b>${l.leadin.q}</b></p>`);
  h+=sec('4 · Vocabulary',`<table style="width:100%;border-collapse:collapse">${l.vocab.map(v=>`<tr><td style="border:1px solid #ddd;padding:6px"><b>${v.en}</b></td><td style="border:1px solid #ddd;padding:6px">${v.ipa}</td><td style="border:1px solid #ddd;padding:6px">${v.pt}</td></tr>`).join('')}</table>`);
  h+=sec('5 · Grammar Focus',`<p>${l.grammar.exp.replace(/<b>/g,'').replace(/<\/b>/g,'')}</p>${l.grammar.ex.map(e=>`<p>• ${e}</p>`).join('')}`);
  h+=sec('6 · Controlled Practice',l.practice.map((p,i)=>`<p>${i+1}. ${p.q} <b>(${p.a})</b></p>`).join(''));
  h+=sec('7 · Speaking',l.speaking.map(q=>`<p>• ${q}</p>`).join('')+`<p style="margin-top:10px"><b>${l.roleplay.title}:</b> ${l.roleplay.scenario}</p>${l.roleplay.lines.map(x=>`<p style="margin-left:15px">${x}</p>`).join('')}`);
  h+=sec('8 · Wrap-up + Homework',l.homework.tasks.map(t=>`<p>${t}</p>`).join('')+`<p>Link: ${l.homework.link}</p>`);
  h+=`</div>`;
  pa.innerHTML=h;
  printDoc(document.getElementById('printArea').innerHTML,'Sabatovicz');
}

function printDoc(html,title){ TeacherLu.printDoc(html, title); }

function goHome(){ window.location.href='index.html'; }

/* ================================================================
   CONVERSATION LIVE — piloto SLF módulo 8 (semanas 1–3).
   Camada aditiva: só as semanas em CONV_PLUS usam o renderizador
   novo; as demais seguem no renderer legado acima, intactas.
   ================================================================ */
/* ---------- student store — fonte única: platform-students.js ----------
   O bloco DEFAULT_STUDENTS/loadStudents que existia aqui foi centralizado.
   Estes aliases mantêm o restante desta página inalterado. -------------- */
const STU_KEY = TeacherLu.Students.KEY;
const DEFAULT_STUDENTS = TeacherLu.Students.DEFAULTS;
function loadStudents(){ return TeacherLu.Students.load(); }
const STUDENTS_DATA=loadStudents();
let curStu=localStorage.getItem('sabatovicz_current_student');
if(!STUDENTS_DATA.some(s=>s.id===curStu))curStu=STUDENTS_DATA.length?STUDENTS_DATA[0].id:null;
function stuName(){const s=STUDENTS_DATA.find(x=>x.id===curStu);return s?s.name:'the student';}
function pickStu(id){curStu=id;localStorage.setItem('sabatovicz_current_student',id);renderLesson();}
function renderStuBar(){
  const el=document.getElementById('stuBar');if(!el)return;
  if(!(window.CONV_PLUS&&CONV_PLUS[lessons[current].week])){el.style.display='none';return;}
  el.style.display='';
  el.innerHTML=`<span class="text-slate-300 text-sm font-bold" style="margin-right:8px">Class with:</span>`+
    STUDENTS_DATA.map(s=>`<button onclick="pickStu('${s.id}')" class="week-btn text-xs font-bold py-2 px-3 rounded-lg" style="margin:2px;${s.id===curStu?'background:linear-gradient(135deg,#7c3aed,#db2777) !important;color:#fff !important':''}">${s.emoji||''} ${s.name}</button>`).join('');
}
function logError(kind,q,a){
  if(!curStu)return;
  try{
    const k='errq|'+curStu;
    const arr=JSON.parse(localStorage.getItem(k)||'[]');
    const l=lessons[current];
    const topic='Conv W'+l.week+' — '+String(l.theme).split('—')[0].trim();
    arr.push({m:'conversation',topic,kind,q:String(q),a:String(a),d:new Date().toISOString().slice(0,10)});
    localStorage.setItem(k,JSON.stringify(arr));
  }catch(e){}
}
function P(s){return String(s==null?'':s).replace(/\{name\}/g,stuName());}

/* ================================================================
   PADRÃO DEFINITIVO — como propagar uma semana (SÓ dados, sem código):
   copie este template para CONV_PLUS[<week>]. Warm-up, vocabulário,
   prática, role-play e homework continuam vindo do objeto `lessons`
   legado da mesma semana — não se duplicam aqui.

   <week>:{
     discover:{ examples:['4 frases com a estrutura em <b>negrito</b>'],
                qs:{form:'pergunta de forma', meaning:'pergunta de sentido'},
                hints:['dica 1','dica 2','dica 3'] },     // escada de descoberta
     brTip:'dica curta para brasileiros (armadilha do PT).',
     practiceFu:['follow-up por item da prática legada (opcional; tem fallback)'],
     ladder:{ concrete:[{q:'…',fu:['…']}], experience:[…], opinion:[…], hypothesis:[…] },
     teacherOpinion:'opinião provocadora p/ o aluno reagir.',
     reactions:['Really?','Me too!','…'],                 // palavras de reação
     canDoNow:'o que o aluno passa a conseguir fazer.',
     convGoal:'alvo concreto desta conversa.',
     studyTip:'sugestão de estudo/áudio para casa.'
   }
   Campos ausentes NÃO quebram a página: o validador convMissing() avisa
   exatamente o que falta. Nenhuma alteração de renderizador é necessária.
   ================================================================ */
window.CONV_PLUS={
 1:{
  discover:{
   examples:['I <b>am</b> a teacher and I<b>\'m</b> from Brazil.','You <b>are</b> my student.','My friend <b>is</b> tired today.','We <b>are</b> here to speak English!'],

 },

/* ---- estado de avaliação da aula viva ---- */
let cpPr={}, cpEv={}, cpMiss=[], cpVocab={};
function judgeCpPr(i,ok){
  if(cpPr[i]!==undefined)return; cpPr[i]=ok;
  document.getElementById('cpy-'+i).style.opacity=ok?'1':'.35';
  document.getElementById('cpn-'+i).style.opacity=ok?'.35':'1';
  const l=lessons[current];
  if(!ok){logError('practice',l.practice[i].q,l.practice[i].a);cpMiss.push({q:l.practice[i].q,a:l.practice[i].a});}
  const n=Object.keys(cpPr).length,c=Object.values(cpPr).filter(Boolean).length;
  const el=document.getElementById('cpScore');if(el)el.textContent=`${c} correct / ${n} checked of ${l.practice.length} · gate: ≥80%`;
  if(n===l.practice.length){
    const pct=Math.round(c/n*100);
    document.getElementById('cpVerdict').innerHTML=pct>=80
      ?`<div class="mistake" style="background:#f0fdf4 !important;border-color:#bbf7d0 !important;color:#166534 !important;font-weight:700">✅ ${pct}% — ready to really talk. Go to the conversation.</div>`
      :`<div class="mistake" style="font-weight:700">⚠ ${pct}% — revisit the pattern together first (misses saved to ${stuName()}'s review queue).</div>`;
  }
}
function judgeCpEv(i,ok){
  if(cpEv[i]!==undefined)return; cpEv[i]=ok;
  document.getElementById('evy-'+i).style.opacity=ok?'1':'.35';
  document.getElementById('evn-'+i).style.opacity=ok?'.35':'1';
  const n=Object.keys(cpEv).length,c=Object.values(cpEv).filter(Boolean).length;
  if(n===3){
    document.getElementById('evVerdict').innerHTML=
      `<div class="mistake" style="background:#f5f3ff !important;border-color:#ddd6fe !important;color:#5b21b6 !important;font-weight:700">${c}/3 signs of real conversation. Now build the lesson summary below ↓</div>`;
  }
}
/* vocabulário-alvo destacado e rastreado durante a conversa */
function markVocab(i){
  cpVocab[i]=!cpVocab[i];
  const el=document.getElementById('vchip-'+i);
  if(el){el.style.background=cpVocab[i]?'#dcfce7':'#ede9fe';el.style.color=cpVocab[i]?'#166534':'#6d28d9';el.style.borderColor=cpVocab[i]?'#86efac':'#ddd6fe';}
  const used=Object.values(cpVocab).filter(Boolean).length;
  const cnt=document.getElementById('vUsed');if(cnt)cnt.textContent=String(used);
}
/* RESUMO FINAL — desempenho, correções e sugestões de estudo (SLF §8/§10) */
function buildDebrief(){
  const l=lessons[current], cp=CONV_PLUS[l.week];
  const pn=Object.keys(cpPr).length, pc=Object.values(cpPr).filter(Boolean).length;
  const ppct=pn?Math.round(pc/pn*100):0;
  const en=Object.keys(cpEv).length, ec=Object.values(cpEv).filter(Boolean).length;
  const vt=l.vocab.length, vu=Object.values(cpVocab).filter(Boolean).length;
  const bar=(label,val,tone)=>`<div class="q-item" style="display:flex;justify-content:space-between;align-items:center"><span>${label}</span><b style="color:${tone}">${val}</b></div>`;
  let h=`<div class="p-4 rounded-xl" style="background:#fff;border:1px solid #eee7fb">`;
  // desempenho
  h+=`<p class="font-bold mb-2" style="color:#7c3aed">📊 Performance</p>`;
  h+=bar('Grammar practice',pn?`${pc}/${pn} · ${ppct}%${ppct>=80?' ✅':' ⚠'}`:'not marked','#1e293b');
  h+=bar('Signs of real conversation',`${ec}/3`,'#1e293b');
  h+=bar('Target words recycled while speaking',`${vu}/${vt}`,'#1e293b');
  // correções
  h+=`<p class="font-bold mt-4 mb-2" style="color:#dc2626">✎ Corrections to revisit (say: "try again", then the answer)</p>`;
  if(cpMiss.length){
    h+=cpMiss.map(m=>`<div class="mistake" style="font-size:14px">✗ ${m.q} &nbsp;→&nbsp; <b style="color:#16a34a">${m.a}</b></div>`).join('');
    h+=`<p class="text-slate-400 text-xs mt-1">These are saved to ${stuName()}'s review queue — they return in the next warm-up.</p>`;
  }else{
    h+=`<div class="q-item" style="color:#166534">Nothing missed — great control today! 🎉</div>`;
  }
  // sugestões de estudo
  h+=`<p class="font-bold mt-4 mb-2" style="color:#0ea5a5">🎯 What ${stuName()} can do now & study suggestion</p>`;
  h+=`<div class="q-item">Tell ${stuName()}: “Today you can ${P(cp.canDoNow)}” 🎉</div>`;
  h+=`<div class="q-item">🎧 Homework focus: ${cp.studyTip}</div>`;
  if(cpMiss.length)h+=`<div class="q-item">📌 Extra: review <b>${l.theme.split('—').slice(-1)[0].trim()}</b> — the exact items above.</div>`;
  h+=`<a href="${l.homework.link}" target="_blank" class="inline-block mt-3 gradient-coral text-white font-bold py-2 px-4 rounded-lg text-sm">Practice on Test-English →</a>`;
  h+=`</div>`;
  document.getElementById('cpDebrief').innerHTML=h;
}

/* validador de propagação: garante que uma semana nova só precisa de DADOS.
   Retorna a lista de campos faltando — a página avisa em vez de quebrar. */
function convMissing(cp){
  if(!cp)return['(sem dados para esta semana)'];
  const m=[],need=(c,n)=>{if(!c)m.push(n);};
  need(cp.discover&&cp.discover.examples&&cp.discover.examples.length>=1,'discover.examples');
  need(cp.discover&&cp.discover.qs&&cp.discover.qs.form&&cp.discover.qs.meaning,'discover.qs (form+meaning)');
  need(cp.discover&&cp.discover.hints&&cp.discover.hints.length>=3,'discover.hints (3)');
  need(cp.brTip,'brTip');
  need(cp.ladder&&['concrete','experience','opinion','hypothesis'].every(k=>Array.isArray(cp.ladder[k])),'ladder (4 níveis)');
  need(cp.teacherOpinion,'teacherOpinion');
  need(cp.reactions&&cp.reactions.length,'reactions');
  need(cp.canDoNow,'canDoNow');
  need(cp.convGoal,'convGoal');
  need(cp.studyTip,'studyTip');
  return m;
}

function renderEnriched(l){
  const cp=CONV_PLUS[l.week];
  const miss=convMissing(cp);
  if(miss.length){
    try{console.warn('[Conversation Live] semana '+l.week+' incompleta — falta: '+miss.join(', '));}catch(e){}
    document.getElementById('lessonBody').innerHTML=stageBlock('#f59e0b',
      '⚠ Conversation Live — dados incompletos',
      'Para publicar a semana '+l.week+', complete CONV_PLUS['+l.week+'] (só dados, sem mexer no código)',
      '<p class="text-slate-500">Faltando: <b style="color:#dc2626">'+miss.join(', ')+'</b></p>'+
      '<p class="text-slate-400 text-sm mt-2">O renderizador é reutilizável — nenhuma reconstrução é necessária, apenas estes campos.</p>');
    return;
  }
  cpPr={};cpEv={};cpMiss=[];cpVocab={};
  const body=document.getElementById('lessonBody');
  let h='';

  // OBJETIVO DA AULA — claro, no topo
  h+=`<div class="p-4 rounded-xl mb-4" style="background:linear-gradient(135deg,#faf5ff,#eff6ff);border:1px solid #ddd6fe">
        <span class="text-xs font-bold" style="color:#7c3aed">🎯 GOAL OF THIS LESSON</span>
        <p class="text-slate-700 font-bold mt-1" style="font-size:16px">By the end, ${stuName()} can ${P(cp.canDoNow)}</p>
        <p class="text-slate-500 text-sm mt-1">Conversation target: ${P(cp.convGoal)}</p>
      </div>`;

  // 1 WARM-UP conversacional
  h+=stageBlock('#3b82f6','1 · Warm-up — just talk','3–5 min · you only ask & react (100% '+stuName()+' speaking)',
    l.warmup.map(q=>`<div class="q-item">${q}</div>`).join(''));

  // 2 DISCOVER (noticing antes da regra) — SLF G5
  h+=stageBlock('#10b981','2 · Discover the pattern','5 min · '+stuName()+' finds the rule BEFORE you explain it',
    cp.discover.examples.map(e=>`<div class="q-item" style="display:flex;justify-content:space-between;align-items:center;gap:10px"><span>${e}</span><button class="speak-btn" onclick="speak('${e.replace(/<[^>]*>/g,'').replace(/'/g,"\\'")}')">►</button></div>`).join('')+
    `<div class="mt-3"><span class="chip">🔍 ${cp.discover.qs.form}</span><span class="chip">💭 ${cp.discover.qs.meaning}</span><span class="chip">🗣️ Say the rule in YOUR words</span></div>
     <div class="mt-3 p-3 rounded-lg teacher-only" style="background:#f8f7fe;border:1px solid #ece7fb">
       <p class="text-slate-400 text-xs font-bold mb-1">Escada de dicas (só se travar, uma por vez):</p>
       <p class="text-slate-500 text-sm">1️⃣ ${cp.discover.hints[0]}<br>2️⃣ ${cp.discover.hints[1]}<br>3️⃣ ${cp.discover.hints[2]}</p>
     </div>
     <div class="text-center mt-4" id="cpRuleReveal">
       <button onclick="document.getElementById('cpRuleBox').style.display='block';this.style.display='none'" class="week-btn font-bold py-3 px-6 rounded-lg" style="font-size:15px">👁 Reveal the rule — after ${stuName()} says it</button>
     </div>
     <div id="cpRuleBox" style="display:none;margin-top:12px">
       <div class="p-4 rounded-lg" style="background:#fff;border:1px solid #eee7fb;border-left:5px solid #f59e0b">
         <p class="text-slate-300">${l.grammar.exp}</p>
         <div class="mt-2 space-y-1">${l.grammar.ex.map(e=>`<div class="q-item" style="margin:4px 0">${e}</div>`).join('')}</div>
         <div class="mt-3 p-3 rounded-lg" style="background:#fff1f2;border:1px solid #fecdd3"><span class="text-xs font-bold" style="color:#7c3aed">🇧🇷 Dica para brasileiros:</span> <span class="text-slate-600 text-sm">${cp.brTip}</span></div>
       </div>
     </div>`);

  // 3 VOCABULARY (reuso) — com pergunta pessoal de uso
  h+=stageBlock('#eab308','3 · Vocabulary','8 min · click ► to listen · use each word about YOUR life',
    `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">`+
    l.vocab.map(v=>`<div class="vocab-card"><div><div class="text-white font-bold">${v.en}</div><div class="ipa">${v.ipa}</div><div class="text-slate-400 text-sm">${v.pt}</div></div><button class="speak-btn" onclick="speak('${v.en.replace(/'/g,"\\'")}')">►</button></div>`).join('')+
    `</div><p class="text-slate-400 text-sm mt-3">👉 After each word: "Now make a sentence about YOU with it."</p>`);

  // 4 CONTROLLED PRACTICE — oral, ✓/✗ na fila de erros, com follow-up (G3/G4/G8)
  h+=stageBlock('#ec4899','4 · Practice — say it, then check it','8 min · '+stuName()+' says it aloud, you reveal & mark',
    `<div id="cpScore" class="text-slate-300 text-sm font-bold mb-2">0 / ${l.practice.length} checked · gate: ≥80%</div>`+
    l.practice.map((p,i)=>{
      const id=`cpa-${l.week}-${i}`;
      return `<div class="q-item" style="display:block">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
          <span>${i+1}. ${p.q}</span>
          <button onclick="toggleAnswer('${id}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded flex-shrink-0">show answer</button>
        </div>
        <div id="${id}" class="answer">✓ ${p.a}
          <span style="margin-left:8px">
            <button onclick="judgeCpPr(${i},true)" id="cpy-${i}" class="text-xs px-3 py-1 rounded" style="background:#dcfce7;color:#166534;font-weight:700;border:1px solid #86efac">✓ got it</button>
            <button onclick="judgeCpPr(${i},false)" id="cpn-${i}" class="text-xs px-3 py-1 rounded" style="background:#fee2e2;color:#991b1b;font-weight:700;border:1px solid #fecaca">✗ missed</button>
          </span>
          <div class="text-xs teacher-only" style="color:#7c3aed;margin-top:5px">↳ follow-up: ${cp.practiceFu[i]||'And you? Make it about YOUR life.'}</div>
        </div>
      </div>`;
    }).join('')+`<div id="cpVerdict" style="margin-top:10px"></div>`);

  // 5 CONVERSATION (a estrela) — objetivo + escada + follow-ups reativos + vocab ao vivo + provocação
  const rung=(label,color,items)=>`<div style="margin:10px 0"><span class="chip" style="background:${color}22;color:${color};border-color:${color}55">${label}</span>`+
    items.map(it=>`<div class="q-item" style="margin-top:6px"><div>${it.q}</div>${it.fu&&it.fu.length?`<div class="text-xs teacher-only" style="color:#7c3aed;margin-top:5px">↳ dig deeper: ${it.fu.map(f=>'“'+f+'”').join(' · ')}</div>`:''}</div>`).join('')+`</div>`;
  h+=stageBlock('#06b6d4','5 · Conversation — the real thing','15 min · '+stuName()+' speaks ~80% · a ladder, not an interrogation',
    `<div class="p-3 rounded-lg mb-2" style="background:#ecfeff;border:1px solid #a5f3fc"><span class="text-xs font-bold" style="color:#0e7490">🎯 THIS CONVERSATION:</span> <span class="text-slate-600 text-sm">${P(cp.convGoal)}</span></div>
     <p class="text-slate-400 text-sm mb-1">Climb the ladder: concrete first, then deeper. One question → listen → react in 1 sentence → follow-up. Correct nothing now (note it for the summary).</p>`+
    rung('① Concrete','#0ea5a5',cp.ladder.concrete)+
    rung('② Your experience','#7c3aed',cp.ladder.experience)+
    rung('③ Your opinion','#db2777',cp.ladder.opinion)+
    rung('④ Imagine / hypothesis','#f59e0b',cp.ladder.hypothesis)+
    // follow-up REATIVO — reage ao que o aluno realmente diz
    `<div class="mt-4 p-4 rounded-xl teacher-only" style="background:#fffbeb;border:1px solid #fde68a">
       <p class="font-bold text-sm" style="color:#92400e">🔁 React to what ${stuName()} actually says (pick the follow-up that fits the answer):</p>
       <div class="text-slate-600 text-sm mt-2" style="line-height:1.9">
         • Answer too short / one word → <b>"Tell me more. / Give me an example."</b><br>
         • No reason given → <b>"Why? / Why do you think so?"</b><br>
         • Impersonal / generic → <b>"And YOU? Does this happen to you?"</b><br>
         • Stuck or switches to Portuguese → <b>"Say it another way in English"</b> — give ONE key word, never the whole sentence.
       </div>
     </div>
     <div class="mt-4 p-4 rounded-xl" style="background:#f5f3ff;border:1px solid #ddd6fe">
       <p class="font-bold text-sm" style="color:#6d28d9">🔑 Target words — tap each one when ${stuName()} uses it in conversation (<b><span id="vUsed">0</span>/${l.vocab.length}</b> recycled):</p>
       <div class="mt-2">${l.vocab.map((v,i)=>`<span id="vchip-${i}" class="chip" style="cursor:pointer" onclick="markVocab(${i})">${v.en}</span>`).join('')}</div>
     </div>
     <div class="mt-4 p-4 rounded-xl teacher-only" style="background:linear-gradient(135deg,#faf5ff,#fdf2f8);border:1px solid #e9d5ff">
       <p class="font-bold" style="color:#7c3aed">🎭 Your turn to provoke (conversation is two-way — you talk ~20%):</p>
       <p class="text-slate-600 text-sm mt-1">"${cp.teacherOpinion}"</p>
     </div>
     <div class="mt-3"><span class="text-slate-500 text-xs font-bold">Palavras para reagir na conversa:</span><br>${cp.reactions.map(r=>`<span class="chip">${r}</span>`).join('')}</div>
     <div class="mt-4 p-4 rounded-xl" style="background:linear-gradient(135deg,#312e81 0%,#1e3a8a 100%);border:1px solid #6366f1">
       <p class="text-indigo-200 font-bold mb-2">${l.roleplay.title}</p>
       <p class="text-slate-300 text-sm mb-3">${l.roleplay.scenario}</p>
       ${l.roleplay.lines.map(line=>`<p class="text-white text-sm mb-1">${line}</p>`).join('')}
     </div>`);

  // 6 EVIDENCE — 3 sinais de conversa real (SLF §8)
  h+=stageBlock('#7c3aed','6 · Evidence — signs of real conversation','2 min · mark what you saw',"<div class='teacher-only'>"+
    [['Did '+stuName()+'’s turns get LONGER through the lesson?'],
     [stuName()+' started a topic or added something without being asked?'],
     [stuName()+' asked YOU a question back?']].map((t,i)=>`
      <div class="q-item" style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <span>${i+1}. ${t[0]}</span>
        <span style="display:flex;gap:6px;flex-shrink:0">
          <button onclick="judgeCpEv(${i},true)" id="evy-${i}" class="text-xs px-3 py-1 rounded" style="background:#dcfce7;color:#166534;font-weight:700;border:1px solid #86efac">✓</button>
          <button onclick="judgeCpEv(${i},false)" id="evn-${i}" class="text-xs px-3 py-1 rounded" style="background:#fee2e2;color:#991b1b;font-weight:700;border:1px solid #fecaca">✗</button>
        </span>
      </div>`).join('')+`<div id="evVerdict" style="margin-top:8px"></div></div>`);

  // 7 LESSON SUMMARY — desempenho + correções + sugestões de estudo
  h+=stageBlock('#16a34a','7 · Lesson summary','2 min · '+stuName()+'’s report for today',
    `<button onclick="buildDebrief()" class="gradient-emerald text-white font-bold py-3 px-6 rounded-lg">📋 Build ${stuName()}'s summary</button>
     <div id="cpDebrief" style="margin-top:12px"></div>`);

  body.innerHTML=h;
}

renderSelector();
renderLesson();
