<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Lu - 8 Week Strategic Curriculum Map</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }
    
    h1, h2, h3, h4, h5 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
    }
    
    .display-font {
      font-family: 'Fredoka', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
    }
    
    .week-card {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      border: 2px solid transparent;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .week-card:hover {
      border-color: rgba(148, 163, 184, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    
    .week-card.expanded {
      border-color: rgba(148, 163, 184, 0.6);
    }
    
    .gradient-1 { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
    .gradient-2 { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); }
    .gradient-3 { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
    .gradient-4 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .gradient-5 { background: linear-gradient(135deg, #ff6b4a 0%, #dc2626 100%); }
    .gradient-6 { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
    .gradient-7 { background: linear-gradient(135deg, #ec4899 0%, #db2777 100%); }
    .gradient-8 { background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%); }
    
    .connection-line {
      position: absolute;
      width: 2px;
      background: linear-gradient(180deg, rgba(148, 163, 184, 0.2) 0%, rgba(148, 163, 184, 0.5) 50%, rgba(148, 163, 184, 0.2) 100%);
      left: 50%;
      transform: translateX(-50%);
    }
    
    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(148, 163, 184, 0.3);
      border: 2px solid rgba(148, 163, 184, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .progress-dot.complete {
      background: #10b981;
      border-color: #34d399;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
    }
    
    .module-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .module-item {
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(51, 65, 85, 0.3);
      border: 1px solid rgba(148, 163, 184, 0.2);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .module-item:hover {
      background: rgba(51, 65, 85, 0.5);
      border-color: rgba(148, 163, 184, 0.4);
    }
    
    .module-item.done {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
    }
    
    .connection-arrow {
      color: rgba(148, 163, 184, 0.4);
      margin: 0 8px;
      font-weight: bold;
    }
    
    .stat-box {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.3s ease;
    }
    
    .stat-box:hover {
      border-color: rgba(148, 163, 184, 0.4);
      transform: translateY(-2px);
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        max-height: 0;
      }
      to {
        opacity: 1;
        max-height: 500px;
      }
    }
    
    .module-list {
      animation: slideDown 0.4s ease-out;
      max-height: 500px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { ChevronDown, ChevronUp, CheckCircle2, Circle, Download, RotateCcw, Zap, BookOpen } = lucide;

    const CurriculumMap = () => {
      const [expandedWeeks, setExpandedWeeks] = useState({});
      const [completedModules, setCompletedModules] = useState({});
      const [notes, setNotes] = useState({});

      const toggleWeek = (weekId) => {
        setExpandedWeeks(prev => ({
          ...prev,
          [weekId]: !prev[weekId]
        }));
      };

      const toggleModule = (moduleId) => {
        setCompletedModules(prev => ({
          ...prev,
          [moduleId]: !prev[moduleId]
        }));
      };

      const updateNote = (weekId, text) => {
        setNotes(prev => ({
          ...prev,
          [weekId]: text
        }));
      };

      const calculateProgress = () => {
        const total = Object.keys(completedModules).length;
        const done = Object.values(completedModules).filter(Boolean).length;
        return total > 0 ? Math.round((done / total) * 100) : 0;
      };

      const downloadPlan = () => {
        const content = `STRATEGIC CURRICULUM MAP - 8 WEEKS
Teacher Lu's Advanced Pedagogy
=====================================

${weeks.map((week, idx) => {
  const modules = week.modules.map(m => `  ☐ ${m.title}`).join('\n');
  return `WEEK ${week.number}: ${week.title}
Objective: ${week.objective}
Focus: ${week.focus}

Modules:
${modules}

---
`;
}).join('\n')}`;
        
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '8-weeks-curriculum-map.txt';
        a.click();
      };

      const renderWeekCard = (week) => {
        const isExpanded = expandedWeeks[week.id];
        const completedInWeek = week.modules.filter(m => completedModules[m.id]).length;
        const totalInWeek = week.modules.length;

        return (
          <div key={week.id} className={`week-card rounded-2xl p-6 mb-6 ${isExpanded ? 'expanded' : ''}`}>
            <div onClick={() => toggleWeek(week.id)} className="cursor-pointer">
              <div className="flex justify-between items-start mb-4">
                <div className="flex-1">
                  <div className={`inline-block px-3 py-1 rounded-full text-white text-xs font-bold mb-2 ${week.gradient}`}>
                    WEEK {week.number}
                  </div>
                  <h3 className="text-2xl font-bold text-white mb-2">{week.title}</h3>
                  <p className="text-slate-400 mb-2">{week.objective}</p>
                  <p className="text-slate-500 text-sm">Focus: {week.focus}</p>
                </div>
                <button className="p-2 hover:bg-slate-700 rounded-lg transition">
                  {isExpanded ? <ChevronUp size={20} className="text-white" /> : <ChevronDown size={20} className="text-white" />}
                </button>
              </div>

              <div className="flex items-center gap-4">
                <div className="flex-1 bg-slate-700 rounded-full h-2 overflow-hidden">
                  <div 
                    className={`h-full transition-all ${week.gradient}`}
                    style={{width: `${(completedInWeek / totalInWeek) * 100}%`}}
                  />
                </div>
                <span className="text-sm text-slate-300 font-semibold">{completedInWeek}/{totalInWeek}</span>
              </div>
            </div>

            {isExpanded && (
              <div className="module-list mt-6 pt-6 border-t border-slate-700">
                <div className="mb-6">
                  <h4 className="text-sm font-bold text-amber-300 mb-3" style={{fontFamily: 'Poppins'}}>MODULES TO CREATE:</h4>
                  <div className="space-y-2">
                    {week.modules.map(module => (
                      <div key={module.id} className={`module-item ${completedModules[module.id] ? 'done' : ''}`}>
                        <input
                          type="checkbox"
                          checked={completedModules[module.id] || false}
                          onChange={() => toggleModule(module.id)}
                          className="module-checkbox cursor-pointer"
                        />
                        <span className={`flex-1 ${completedModules[module.id] ? 'line-through text-slate-500' : 'text-slate-300'}`}>
                          {module.title}
                        </span>
                        <span className="text-xs text-slate-500 bg-slate-700 px-2 py-1 rounded">
                          {module.sections} sections
                        </span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="mb-6">
                  <h4 className="text-sm font-bold text-emerald-300 mb-3" style={{fontFamily: 'Poppins'}}>KEY CONNECTIONS:</h4>
                  <div className="space-y-2 text-sm text-slate-400">
                    {week.connections.map((conn, idx) => (
                      <div key={idx} className="flex gap-2">
                        <span className="text-emerald-400">→</span>
                        <span>{conn}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div>
                  <h4 className="text-sm font-bold text-indigo-300 mb-3" style={{fontFamily: 'Poppins'}}>NOTES:</h4>
                  <textarea
                    placeholder="Your notes for this week..."
                    value={notes[week.id] || ''}
                    onChange={(e) => updateNote(week.id, e.target.value)}
                    className="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg text-slate-300 text-sm focus:border-indigo-500 focus:outline-none"
                    rows="3"
                  />
                </div>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen py-12 px-4">
          <div className="max-w-4xl mx-auto">
            {/* HEADER */}
            <div className="mb-12 text-center">
              <div className="flex items-center justify-center gap-3 mb-4">
                <Zap className="text-amber-400" size={32} />
                <h1 className="text-4xl font-bold text-white" style={{fontFamily: 'Poppins'}}>
                  8-Week Strategic Curriculum Map
                </h1>
              </div>
              <p className="text-slate-400 text-lg mb-6">
                From Identity to Narrative: A pedagogical journey
              </p>
              <p className="text-slate-500 text-sm max-w-2xl mx-auto">
                This curriculum is designed with strategic thinking: each week builds on the previous one,
                creating a spiral of deepening understanding. Students go from talking about themselves
                to telling complex stories in 8 weeks.
              </p>
            </div>

            {/* STATS */}
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
              <div className="stat-box">
                <div className="flex items-center gap-3 mb-2">
                  <BookOpen size={20} className="text-blue-400" />
                  <span className="text-slate-400 text-sm">Total Modules</span>
                </div>
                <p className="text-3xl font-bold text-white">24</p>
              </div>
              <div className="stat-box">
                <div className="flex items-center gap-3 mb-2">
                  <CheckCircle2 size={20} className="text-emerald-400" />
                  <span className="text-slate-400 text-sm">Completed</span>
                </div>
                <p className="text-3xl font-bold text-emerald-400">{Object.values(completedModules).filter(Boolean).length}</p>
              </div>
              <div className="stat-box">
                <div className="flex items-center gap-3 mb-2">
                  <Zap size={20} className="text-amber-400" />
                  <span className="text-slate-400 text-sm">Progress</span>
                </div>
                <p className="text-3xl font-bold text-amber-400">{calculateProgress()}%</p>
              </div>
              <div className="stat-box">
                <div className="flex items-center gap-3 mb-2">
                  <Circle size={20} className="text-indigo-400" />
                  <span className="text-slate-400 text-sm">Remaining</span>
                </div>
                <p className="text-3xl font-bold text-indigo-400">
                  {24 - Object.values(completedModules).filter(Boolean).length}
                </p>
              </div>
            </div>

            {/* WEEKLY PROGRESSION */}
            <div className="mb-12">
              <div className="mb-8">
                <h2 className="text-2xl font-bold text-white mb-2" style={{fontFamily: 'Poppins'}}>
                  The Spiral of Learning
                </h2>
                <p className="text-slate-400">
                  Click on each week to see modules, connections, and add your notes.
                </p>
              </div>

              {weeks.map((week, idx) => (
                <div key={week.id}>
                  {renderWeekCard(week)}
                  {idx < weeks.length - 1 && (
                    <div className="flex justify-center mb-4">
                      <div className="text-slate-500 text-2xl">↓</div>
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* ACTIONS */}
            <div className="flex gap-4 justify-center mb-12">
              <button
                onClick={downloadPlan}
                className="flex items-center gap-2 px-6 py-3 gradient-1 text-white font-bold rounded-xl hover:shadow-lg transition"
              >
                <Download size={18} /> Download Plan
              </button>
              <button
                onClick={() => {
                  setCompletedModules({});
                  setNotes({});
                  setExpandedWeeks({});
                }}
                className="flex items-center gap-2 px-6 py-3 bg-slate-700 text-white font-bold rounded-xl hover:bg-slate-600 transition"
              >
                <RotateCcw size={18} /> Reset
              </button>
            </div>

            {/* FOOTER */}
            <div className="bg-gradient-to-r from-slate-800 to-slate-900 border border-slate-700 rounded-2xl p-8 text-center">
              <h3 className="text-xl font-bold text-white mb-4" style={{fontFamily: 'Poppins'}}>
                Strategic Pedagogy in Action
              </h3>
              <p className="text-slate-300 mb-4">
                This curriculum map is based on deep pedagogical thinking:
              </p>
              <ul className="text-slate-400 space-y-2 text-sm max-w-2xl mx-auto">
                <li>✓ <strong>Scaffolding</strong>: Simple → Complex, Concrete → Abstract</li>
                <li>✓ <strong>Spaced Repetition</strong>: Vocabulary appears in multiple contexts</li>
                <li>✓ <strong>Emotional Engagement</strong>: Students speak about themselves and stories</li>
                <li>✓ <strong>Temporal Understanding</strong>: Present → Past → (Future) progression</li>
                <li>✓ <strong>Identity-First</strong>: Students gain confidence talking about themselves first</li>
              </ul>
            </div>
          </div>
        </div>
      );
    };

    // CURRICULUM DATA
    const weeks = [
      {
        id: 'week-1',
        number: 1,
        title: 'IDENTITY',
        gradient: 'gradient-1',
        objective: 'Who am I? (Foundation of speaking)',
        focus: 'Be verbs, personal information, confidence building',
        modules: [
          { id: 'w1-m1', title: 'I Am: Personal Facts', sections: 7 },
          { id: 'w1-m2', title: 'Nationality & Origin', sections: 7 },
          { id: 'w1-m3', title: 'Jobs & Professions', sections: 7 }
        ],
        connections: [
          'Foundation: Be verbs and personal vocabulary',
          'Next week uses this as base for actions',
          'Students gain confidence speaking about themselves'
        ]
      },
      {
        id: 'week-2',
        number: 2,
        title: 'ROUTINE',
        gradient: 'gradient-2',
        objective: 'What do I do every day? (Action + Rhythm)',
        focus: 'Simple Present, daily routines, time expressions',
        modules: [
          { id: 'w2-m1', title: 'Morning Routine', sections: 7 },
          { id: 'w2-m2', title: 'Work & Study Life', sections: 7 },
          { id: 'w2-m3', title: 'Evening Activities', sections: 7 }
        ],
        connections: [
          'Builds on Week 1 identity (WHO + WHAT they do)',
          'Introduces Simple Present with familiar context',
          'Vocabulary: wake up, breakfast, work, sleep recycled from here on'
        ]
      },
      {
        id: 'week-3',
        number: 3,
        title: 'FREQUENCY',
        gradient: 'gradient-3',
        objective: 'How often? (Quantification of habits)',
        focus: 'Frequency adverbs, time quantifiers, habit specificity',
        modules: [
          { id: 'w3-m1', title: 'Always to Never Scale', sections: 7 },
          { id: 'w3-m2', title: 'Habit Specification', sections: 7 },
          { id: 'w3-m3', title: 'Weekly Patterns', sections: 7 }
        ],
        connections: [
          'Recycles Week 1-2 vocabulary in frequency context',
          'Makes routines more realistic (not every day is the same)',
          'Prepares for deeper narrative complexity'
        ]
      },
      {
        id: 'week-4',
        number: 4,
        title: 'PREFERENCES',
        gradient: 'gradient-4',
        objective: 'What do I love? (Identity deepens to passion)',
        focus: 'Love/like/enjoy + -ing, hobbies, reasons & emotions',
        modules: [
          { id: 'w4-m1', title: 'Hobbies & Interests', sections: 7 },
          { id: 'w4-m2', title: 'Love vs Like vs Enjoy', sections: 7 },
          { id: 'w4-m3', title: 'Reasons & Emotions', sections: 7 }
        ],
        connections: [
          'Completes persona: WHO + WHAT + HOW OFTEN + WHY',
          'Most emotional engagement (talking about passions)',
          'Bridge to narrative (preferences motivate actions in stories)'
        ]
      },
      {
        id: 'week-5',
        number: 5,
        title: 'OBSERVATION',
        gradient: 'gradient-5',
        objective: 'What\'s happening NOW? (Awareness & Contrast)',
        focus: 'Present Continuous, observation, temporal awareness',
        modules: [
          { id: 'w5-m1', title: 'Present Continuous Form', sections: 7 },
          { id: 'w5-m2', title: 'What Are You Doing?', sections: 7 },
          { id: 'w5-m3', title: 'Simple Present vs Continuous', sections: 7 }
        ],
        connections: [
          'Critical shift: ALWAYS vs RIGHT NOW',
          'Introduces temporal awareness (foundation for past narrative)',
          'Recycles all Week 1-4 vocabulary in present moment context'
        ]
      },
      {
        id: 'week-6',
        number: 6,
        title: 'DESCRIPTION',
        gradient: 'gradient-6',
        objective: 'How is it? (Context & Landscape building)',
        focus: 'There is/are, adjectives, prepositions of place',
        modules: [
          { id: 'w6-m1', title: 'There is/There are', sections: 7 },
          { id: 'w6-m2', title: 'Describing People & Places', sections: 7 },
          { id: 'w6-m3', title: 'Adjectives & Prepositions', sections: 7 }
        ],
        connections: [
          'Builds narrative landscape (what the scene looks like)',
          'Essential for storytelling in Week 7',
          'Bridges observation (Week 5) + narrative (Week 7)'
        ]
      },
      {
        id: 'week-7',
        number: 7,
        title: 'NARRATIVE',
        gradient: 'gradient-7',
        objective: 'What happened? (Story & Memory)',
        focus: 'Past Simple, irregular verbs, sequencing, storytelling',
        modules: [
          { id: 'w7-m1', title: 'Regular Past Verbs', sections: 7 },
          { id: 'w7-m2', title: 'Irregular Past Verbs (Top 20)', sections: 7 },
          { id: 'w7-m3', title: 'Story Sequencing & Narrative', sections: 7 }
        ],
        connections: [
          'Climax: Recycles ALL Weeks 1-6 in past context',
          'Highest engagement (stories are memorable and emotional)',
          'Demonstrates complete structural mastery'
        ]
      },
      {
        id: 'week-8',
        number: 8,
        title: 'INTEGRATION',
        gradient: 'gradient-8',
        objective: 'Everything together! (Complex Conversation)',
        focus: 'All tenses mixed, conversation skills, synthesis',
        modules: [
          { id: 'w8-m1', title: 'Mixed Tense Conversations', sections: 7 },
          { id: 'w8-m2', title: 'Complex Discussion Topics', sections: 7 },
          { id: 'w8-m3', title: 'Role-Plays & Real Scenarios', sections: 7 }
        ],
        connections: [
          'Integration of all 7 previous weeks',
          'Students ready for B1 threshold conversations',
          'Can discuss past, present, preferences, plans naturally'
        ]
      }
    ];

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CurriculumMap />);
  </script>
</body>
</html>
