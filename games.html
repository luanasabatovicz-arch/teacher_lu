<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabatovicz — Jogos de Aula</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:700;}
  body{background:#ffffff;color:#1e293b;min-height:100vh;}
  .topbar{background:linear-gradient(120deg,#06b6d4 0%,#7c3aed 55%,#db2777 100%);color:#fff;padding:22px 24px;position:sticky;top:0;z-index:40;box-shadow:0 6px 24px rgba(124,58,237,.28);}
  .topwrap{max-width:1000px;margin:0 auto;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .menu-btn{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.75);color:#fff;font-family:'Poppins';font-weight:600;padding:8px 16px;border-radius:10px;cursor:pointer;text-decoration:none;font-size:14px;}
  .menu-btn:hover{background:rgba(255,255,255,.38);}
  .selector{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .g-btn{white-space:nowrap;padding:9px 14px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;background:rgba(255,255,255,.18);color:#fff;border:2px solid transparent;transition:all .2s;}
  .g-btn:hover{background:rgba(255,255,255,.3);}
  .g-btn.active{background:#fff;color:#7c3aed;}
  .wrap{max-width:1000px;margin:0 auto;padding:28px 24px 60px;}
  .card{background:#fff;border:1px solid #ece7fb;border-radius:16px;box-shadow:0 4px 18px rgba(124,58,237,.08);padding:28px;}
  h2.title{font-size:30px;margin-bottom:6px;background:linear-gradient(90deg,#7c3aed,#db2777);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .desc{color:#64748b;margin-bottom:20px;font-size:15px;}
  .btn{border:none;border-radius:12px;font-weight:700;font-family:'Poppins';cursor:pointer;padding:12px 22px;font-size:15px;color:#fff;transition:all .2s;box-shadow:0 4px 14px rgba(124,58,237,.2);}
  .btn:hover{transform:translateY(-2px);}
  .btn.purple{background:linear-gradient(135deg,#7c3aed,#a78bfa);}
  .btn.pink{background:linear-gradient(135deg,#ec4899,#f472b6);}
  .btn.green{background:linear-gradient(135deg,#22c55e,#4ade80);}
  .btn.cyan{background:linear-gradient(135deg,#06b6d4,#22d3ee);}
  .btn.amber{background:linear-gradient(135deg,#f59e0b,#facc15);color:#7a4a00;}
  .btn.gray{background:#e2e8f0;color:#475569;box-shadow:none;}
  .chip{display:inline-block;padding:7px 14px;border-radius:20px;font-weight:600;font-size:14px;background:#ede9fe;color:#6d28d9;border:1px solid #ddd6fe;margin:4px;cursor:pointer;}
  .chip.active{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;}
  .inp{width:100%;padding:14px;border:2px solid #e2ddf5;border-radius:12px;font-size:16px;color:#1e293b;background:#f8f7fe;}
  .inp:focus{outline:none;border-color:#7c3aed;}
  .big{font-size:52px;font-weight:800;font-family:'Poppins';letter-spacing:.12em;text-align:center;}
  .key{width:44px;height:48px;border:none;border-radius:8px;background:#ede9fe;color:#5b21b6;font-weight:700;font-size:16px;cursor:pointer;margin:3px;transition:all .15s;}
  .key:hover{background:#7c3aed;color:#fff;}
  .key:disabled{opacity:.35;cursor:not-allowed;}
  .blanks{font-size:34px;font-weight:800;letter-spacing:.18em;text-align:center;color:#7c3aed;font-family:'Poppins';margin:10px 0;}
  .feedback{padding:14px;border-radius:12px;font-weight:600;margin-top:14px;}
  .ok{background:#dcfce7;color:#166534;}
  .no{background:#fee2e2;color:#991b1b;}
  .info{background:#e0f2fe;color:#075985;}
  .lives{font-size:22px;text-align:center;color:#db2777;letter-spacing:.15em;}
  select.inp{cursor:pointer;}
  .catrow{display:flex;gap:10px;align-items:center;margin:8px 0;}
  .catrow .w{flex:1;font-weight:600;background:#f8f7fe;border:1px solid #ece7fb;border-radius:10px;padding:10px 14px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topwrap">
    <div class="row">
      <div>
        <h1 style="font-size:26px">Jogos de Aula</h1>
        <p style="opacity:.9;font-size:14px">Oito jogos para animar a conversação</p>
      </div>
      <a href="index.html" class="menu-btn">← Menu</a>
    </div>
    <div class="selector" id="selector"></div>
  </div>
</div>

<div class="wrap"><div class="card" id="gameArea"></div></div>

<script>
const GAMES=[
  {id:'hangman',label:'Forca'},
  {id:'categories',label:'Categorias (Stop)'},
  {id:'q20',label:'20 Perguntas'},
  {id:'odd',label:'Odd One Out'},
  {id:'sort',label:'Category Sort'},
  {id:'spelling',label:'Spelling Bee'},
  {id:'emoji',label:'Guess the Emoji'},
  {id:'chains',label:'Word Chains'}
];
let current='hangman';

function renderSelector(){
  document.getElementById('selector').innerHTML=GAMES.map(g=>`<button class="g-btn ${g.id===current?'active':''}" onclick="select('${g.id}')">${g.label}</button>`).join('');
}
function select(id){current=id;renderSelector();render();}
function speak(w){if(!('speechSynthesis'in window)){alert('Áudio não suportado');return;}const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);}
function norm(s){return (s||'').toLowerCase().trim().replace(/[^a-z ]/g,'');}

/* ============ 1. HANGMAN ============ */
const HANG={
  Animals:['DOG','CAT','HORSE','RABBIT','ELEPHANT','MONKEY','TIGER','SNAKE','CHICKEN','DOLPHIN'],
  Food:['BREAD','APPLE','CHEESE','CHICKEN','COFFEE','ORANGE','POTATO','TOMATO','BANANA','CHOCOLATE'],
  Verbs:['WORK','STUDY','TRAVEL','COOK','SLEEP','DANCE','LISTEN','WATCH','DRIVE','SWIM'],
  Jobs:['TEACHER','DOCTOR','NURSE','ENGINEER','LAWYER','WAITER','PILOT','FARMER','ARTIST','DENTIST'],
  Home:['KITCHEN','BEDROOM','TABLE','WINDOW','GARDEN','MIRROR','SOFA','FRIDGE','SHOWER','CARPET']
};
let hCat='Animals',hWord='',hGuessed=[],hLives=6;
function hStart(cat){hCat=cat;const arr=HANG[cat];hWord=arr[Math.floor(Math.random()*arr.length)];hGuessed=[];hLives=6;render();}
function hGuess(l){if(hGuessed.includes(l))return;hGuessed.push(l);if(!hWord.includes(l))hLives--;render();}
function renderHangman(){
  const done=hWord && hWord.split('').every(c=>c===' '||hGuessed.includes(c));
  const lost=hLives<=0;
  let g=document.getElementById('gameArea');
  let cats=Object.keys(HANG).map(c=>`<span class="chip ${c===hCat?'active':''}" onclick="hStart('${c}')">${c}</span>`).join('');
  if(!hWord){g.innerHTML=`<h2 class="title">Forca</h2><p class="desc">Escolha uma categoria e adivinhe a palavra letra por letra.</p><div>${cats}</div>`;return;}
  const blanks=hWord.split('').map(c=>c===' '?'&nbsp;&nbsp;':(hGuessed.includes(c)?c:'_')).join(' ');
  const keys='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>`<button class="key" onclick="hGuess('${l}')" ${hGuessed.includes(l)||done||lost?'disabled':''}>${l}</button>`).join('');
  let fb='';
  if(done)fb=`<div class="feedback ok">Muito bem! A palavra era <b>${hWord}</b>.</div>`;
  else if(lost)fb=`<div class="feedback no">Fim! A palavra era <b>${hWord}</b>.</div>`;
  g.innerHTML=`<h2 class="title">Forca — ${hCat}</h2><div>${cats}</div>
    <div class="lives" style="margin-top:14px">${'♥ '.repeat(Math.max(0,hLives))}${'· '.repeat(6-Math.max(0,hLives))}</div>
    <div class="blanks">${blanks}</div>
    <div style="text-align:center;margin:14px 0">${keys}</div>${fb}
    <div style="text-align:center"><button class="btn purple" onclick="hStart('${hCat}')">Nova palavra</button></div>`;
}

/* ============ 2. CATEGORIES (STOP) ============ */
const CATS=['Name','Animal','Food','Country','Object','Verb','Adjective','Color'];
const LETTERS='ABCDEFGHIJKLMNOPRSTW'.split('');
let cTimer=null,cTime=120;
function cNew(){const l=LETTERS[Math.floor(Math.random()*LETTERS.length)];document.getElementById('cLetter').textContent=l;cReset();}
function cReset(){clearInterval(cTimer);cTime=120;cUpd();}
function cStart(){clearInterval(cTimer);cTimer=setInterval(()=>{cTime--;cUpd();if(cTime<=0){clearInterval(cTimer);}},1000);}
function cUpd(){const m=Math.floor(cTime/60),s=cTime%60;const el=document.getElementById('cTime');if(el)el.textContent=`${m}:${String(s).padStart(2,'0')}`;}
function renderCategories(){
  document.getElementById('gameArea').innerHTML=`<h2 class="title">Categorias (Stop)</h2>
  <p class="desc">Sorteie uma letra. O aluno diz (ou escreve) uma palavra de cada categoria começando com ela. Quem terminar grita "Stop!".</p>
  <div class="big" id="cLetter" style="color:#7c3aed">?</div>
  <div style="text-align:center;font-size:28px;font-weight:800;color:#db2777;margin:6px 0" id="cTime">2:00</div>
  <div style="text-align:center;margin:16px 0">
    <button class="btn pink" onclick="cNew()">Sortear letra</button>
    <button class="btn green" onclick="cStart()">Iniciar tempo</button>
    <button class="btn gray" onclick="cReset()">Zerar</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">${CATS.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`;
}

/* ============ 3. 20 QUESTIONS ============ */
const Q20=['elephant','pizza','teacher','airplane','beach','guitar','doctor','mountain','coffee','umbrella','football','kitchen','rainbow','dolphin','bicycle','library','winter','chocolate','hospital','garden'];
let qWord='',qCount=0,qShow=false;
function qNew(){qWord=Q20[Math.floor(Math.random()*Q20.length)];qCount=0;qShow=false;render();}
function qToggle(){qShow=!qShow;render();}
function qInc(){qCount++;render();}
function renderQ20(){
  if(!qWord){document.getElementById('gameArea').innerHTML=`<h2 class="title">20 Perguntas</h2><p class="desc">Um jogador vê a palavra secreta; o outro faz até 20 perguntas de sim/não para adivinhar.</p><div style="text-align:center"><button class="btn cyan" onclick="qNew()">Nova palavra secreta</button></div>`;return;}
  document.getElementById('gameArea').innerHTML=`<h2 class="title">20 Perguntas</h2>
  <p class="desc">Um jogador olha a palavra (esconda do outro!). O outro faz perguntas de sim/não.</p>
  <div style="text-align:center;margin:16px 0">
    <div class="big" style="color:#7c3aed">${qShow?qWord.toUpperCase():'• • • • •'}</div>
    <button class="btn amber" onclick="qToggle()">${qShow?'Esconder':'Mostrar palavra'}</button>
  </div>
  <div style="text-align:center;font-size:20px;font-weight:700;margin:10px 0">Perguntas usadas: <span style="color:#db2777">${qCount}/20</span></div>
  <div style="text-align:center">
    <button class="btn purple" onclick="qInc()">+1 pergunta</button>
    <button class="btn green" onclick="qNew()">Nova palavra</button>
  </div>`;
}

/* ============ 4. ODD ONE OUT ============ */
const ODD=[
  {w:['apple','banana','carrot','orange'],odd:2,reason:'carrot is a vegetable, the others are fruits'},
  {w:['dog','cat','horse','table'],odd:3,reason:'table is not an animal'},
  {w:['red','blue','happy','green'],odd:2,reason:'happy is a feeling, the others are colors'},
  {w:['run','swim','book','dance'],odd:2,reason:'book is not a verb'},
  {w:['mother','father','teacher','sister'],odd:2,reason:'teacher is a job, the others are family'},
  {w:['Monday','Friday','summer','Sunday'],odd:2,reason:'summer is a season, the others are days'},
  {w:['coffee','tea','water','bread'],odd:3,reason:'bread is food, the others are drinks'},
  {w:['car','bus','train','kitchen'],odd:3,reason:'kitchen is not transport'},
  {w:['big','small','tall','chair'],odd:3,reason:'chair is not an adjective'},
  {w:['eye','nose','shoe','mouth'],odd:2,reason:'shoe is not part of the face'}
];
let oIdx=0,oAns=null;
function oNew(){oIdx=Math.floor(Math.random()*ODD.length);oAns=null;render();}
function oPick(i){oAns=i;render();}
function renderOdd(){
  const it=ODD[oIdx];
  let opts=it.w.map((w,i)=>{let cls='opt';if(oAns!==null){if(i===it.odd)cls+=' right';else if(i===oAns)cls+=' wrong';}return `<button class="chip" style="font-size:16px;padding:12px 18px;${oAns!==null&&i===it.odd?'background:linear-gradient(135deg,#22c55e,#4ade80);color:#fff':''}${oAns!==null&&i===oAns&&i!==it.odd?'background:#fee2e2;color:#991b1b':''}" onclick="oPick(${i})">${w}</button>`;}).join(' ');
  let fb=oAns!==null?`<div class="feedback ${oAns===it.odd?'ok':'no'}">${oAns===it.odd?'Correto! ':'Não. '}<b>${it.w[it.odd]}</b> — ${it.reason}.</div>`:'';
  document.getElementById('gameArea').innerHTML=`<h2 class="title">Odd One Out</h2><p class="desc">Qual palavra não pertence ao grupo? Peça ao aluno para explicar o porquê em inglês.</p>
  <div style="text-align:center;margin:16px 0">${opts}</div>${fb}
  <div style="text-align:center;margin-top:14px"><button class="btn cyan" onclick="oNew()">Próximo</button></div>`;
}

/* ============ 5. CATEGORY SORT ============ */
const SORT=[
  {title:'Frutas ou Vegetais?',a:'Fruit',b:'Vegetable',items:[['apple','Fruit'],['carrot','Vegetable'],['banana','Fruit'],['potato','Vegetable'],['orange','Fruit'],['onion','Vegetable']]},
  {title:'Passado ou Presente?',a:'Past',b:'Present',items:[['went','Past'],['go','Present'],['ate','Past'],['eat','Present'],['saw','Past'],['see','Present']]},
  {title:'Contável ou Incontável?',a:'Countable',b:'Uncountable',items:[['apple','Countable'],['water','Uncountable'],['book','Countable'],['rice','Uncountable'],['car','Countable'],['milk','Uncountable']]},
  {title:'Bebida ou Comida?',a:'Drink',b:'Food',items:[['coffee','Drink'],['bread','Food'],['juice','Drink'],['cheese','Food'],['tea','Drink'],['rice','Food']]}
];
let sIdx=0,sAns={},sChecked=false;
function sNew(){sIdx=Math.floor(Math.random()*SORT.length);sAns={};sChecked=false;render();}
function sSet(i,v){sAns[i]=v;}
function sCheck(){sChecked=true;render();}
function renderSort(){
  const t=SORT[sIdx];
  let rows=t.items.map((it,i)=>{
    let mark='';if(sChecked)mark=(sAns[i]===it[1])?' <span style="color:#16a34a;font-weight:700">✓</span>':' <span style="color:#dc2626;font-weight:700">✗ ('+it[1]+')</span>';
    return `<div class="catrow"><div class="w">${it[0]}${mark}</div>
    <select class="inp" style="flex:1" onchange="sSet(${i},this.value)"><option value="">—</option><option ${sAns[i]===t.a?'selected':''}>${t.a}</option><option ${sAns[i]===t.b?'selected':''}>${t.b}</option></select></div>`;
  }).join('');
  let score='';if(sChecked){let c=t.items.filter((it,i)=>sAns[i]===it[1]).length;score=`<div class="feedback info">Acertos: <b>${c}/${t.items.length}</b></div>`;}
  document.getElementById('gameArea').innerHTML=`<h2 class="title">Category Sort</h2><p class="desc">${t.title} — classifique cada palavra na categoria certa.</p>${rows}${score}
  <div style="text-align:center;margin-top:16px"><button class="btn green" onclick="sCheck()">Verificar</button> <button class="btn cyan" onclick="sNew()">Outro conjunto</button></div>`;
}

/* ============ 6. SPELLING BEE ============ */
const SPELL={
  Easy:['cat','dog','book','red','sun','milk','tree','fish','blue','door'],
  Medium:['house','water','happy','friend','school','orange','yellow','family','doctor','garden'],
  Hard:['beautiful','wednesday','restaurant','different','favourite','necessary','tomorrow','because','together','breakfast']
};
let spLevel='Easy',spWord='',spChecked=false,spVal='';
function spNew(lv){if(lv)spLevel=lv;const arr=SPELL[spLevel];spWord=arr[Math.floor(Math.random()*arr.length)];spChecked=false;spVal='';render();setTimeout(()=>speak(spWord),200);}
function spCheck(){spVal=document.getElementById('spInp').value;spChecked=true;render();}
function renderSpelling(){
  let levels=Object.keys(SPELL).map(l=>`<span class="chip ${l===spLevel?'active':''}" onclick="spNew('${l}')">${l}</span>`).join('');
  if(!spWord){document.getElementById('gameArea').innerHTML=`<h2 class="title">Spelling Bee</h2><p class="desc">O jogo fala a palavra em inglês; o aluno escreve. Escolha o nível para começar.</p><div>${levels}</div>`;return;}
  let fb='';if(spChecked){const ok=norm(spVal)===spWord;fb=`<div class="feedback ${ok?'ok':'no'}">${ok?'Perfeito!':'A grafia certa é:'} <b>${spWord}</b></div>`;}
  document.getElementById('gameArea').innerHTML=`<h2 class="title">Spelling Bee — ${spLevel}</h2><div>${levels}</div>
  <p class="desc" style="margin-top:14px">Ouça e escreva a palavra:</p>
  <div style="text-align:center;margin-bottom:14px"><button class="btn amber" onclick="speak('${spWord}')">🔊 Ouvir de novo</button></div>
  <input class="inp" id="spInp" placeholder="Escreva aqui..." value="${spChecked?spVal:''}">
  <div style="text-align:center;margin-top:16px"><button class="btn green" onclick="spCheck()">Verificar</button> <button class="btn purple" onclick="spNew()">Próxima</button></div>${fb}`;
}

/* ============ 7. GUESS THE EMOJI ============ */
const EMO=[
  {e:'🐱',a:['cat']},{e:'🏠',a:['house','home']},{e:'⚽',a:['football','soccer','ball']},{e:'🌧️',a:['rain']},
  {e:'☕',a:['coffee']},{e:'✈️',a:['airplane','plane']},{e:'📚',a:['book','books']},{e:'🍎',a:['apple']},
  {e:'🎂',a:['cake','birthday']},{e:'⏰',a:['clock','alarm']},{e:'🌙',a:['moon','night']},{e:'💧',a:['water']},
  {e:'🎵',a:['music','song']},{e:'🚗',a:['car']},{e:'🐶',a:['dog']},{e:'☀️',a:['sun','sunny']},{e:'🍌',a:['banana']},{e:'👨‍👩‍👧',a:['family']}
];
let emIdx=0,emChecked=false,emVal='';
function emNew(){emIdx=Math.floor(Math.random()*EMO.length);emChecked=false;emVal='';render();}
function emCheck(){emVal=document.getElementById('emInp').value;emChecked=true;render();}
function renderEmoji(){
  const it=EMO[emIdx];
  let fb='';if(emChecked){const ok=it.a.includes(norm(emVal));fb=`<div class="feedback ${ok?'ok':'no'}">${ok?'Isso!':'Resposta:'} <b>${it.a[0]}</b></div>`;}
  document.getElementById('gameArea').innerHTML=`<h2 class="title">Guess the Emoji</h2><p class="desc">Que palavra em inglês o emoji representa?</p>
  <div style="text-align:center;font-size:80px;margin:10px 0">${it.e}</div>
  <input class="inp" id="emInp" placeholder="Sua resposta em inglês..." value="${emChecked?emVal:''}">
  <div style="text-align:center;margin-top:16px"><button class="btn green" onclick="emCheck()">Verificar</button> <button class="btn pink" onclick="emNew()">Próximo</button></div>${fb}`;
}

/* ============ 8. WORD CHAINS ============ */
const STARTS=['apple','house','table','orange','elephant','rabbit','garden','tiger','river','sunny'];
let chChain=[],chMsg='';
function chNew(){chChain=[STARTS[Math.floor(Math.random()*STARTS.length)]];chMsg='';render();}
function chAdd(){
  const v=norm(document.getElementById('chInp').value);
  const last=chChain[chChain.length-1];
  const need=last[last.length-1];
  if(!v){return;}
  if(v[0]!==need){chMsg=`A palavra precisa começar com "${need.toUpperCase()}".`;render();return;}
  if(chChain.includes(v)){chMsg='Essa palavra já foi usada!';render();return;}
  chChain.push(v);chMsg='';render();
}
function renderChains(){
  if(!chChain.length){document.getElementById('gameArea').innerHTML=`<h2 class="title">Word Chains</h2><p class="desc">Cada palavra começa com a última letra da anterior (cat → tiger → rabbit...). Comece uma corrente!</p><div style="text-align:center"><button class="btn purple" onclick="chNew()">Começar</button></div>`;return;}
  const last=chChain[chChain.length-1];const need=last[last.length-1].toUpperCase();
  let chain=chChain.map((w,i)=>`<span class="chip" style="${i===chChain.length-1?'background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff':''}">${w}</span>`).join(' → ');
  let msg=chMsg?`<div class="feedback no">${chMsg}</div>`:'';
  document.getElementById('gameArea').innerHTML=`<h2 class="title">Word Chains</h2><p class="desc">Próxima palavra deve começar com <b style="color:#db2777;font-size:20px">${need}</b></p>
  <div style="margin:14px 0;line-height:2.2">${chain}</div>
  <input class="inp" id="chInp" placeholder="Próxima palavra..." onkeydown="if(event.key==='Enter')chAdd()">
  <div style="text-align:center;margin-top:16px"><button class="btn green" onclick="chAdd()">Adicionar</button> <button class="btn gray" onclick="chNew()">Reiniciar</button></div>${msg}`;
}

/* ============ ROUTER ============ */
function render(){
  ({hangman:renderHangman,categories:renderCategories,q20:renderQ20,odd:renderOdd,sort:renderSort,spelling:renderSpelling,emoji:renderEmoji,chains:renderChains})[current]();
}
renderSelector();render();
</script>
</body>
</html>
