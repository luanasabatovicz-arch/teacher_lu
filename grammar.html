<script>
// ============ GRAMMAR LESSON BANK ============
const tenses = [
{
  eid:"verb-to-be",
  name:"Verb to be — Present", short:"Verb to be", level:"A1",
  use:"We use the verb TO BE to say who we are, how we feel, where we are from, age, job and characteristics. It is the first verb in English.",
  form:{
    aff:["I <b>am</b> (I'm) a teacher.","You / We / They <b>are</b> ('re) happy.","He / She / It <b>is</b> ('s) from Brazil."],
    neg:["I <b>am not</b> (I'm not) tired.","You <b>aren't</b> ready.","He <b>isn't</b> at home."],
    q:["<b>Am</b> I right?","<b>Are</b> you a student?","<b>Is</b> she Brazilian?"]
  },
  examples:["I'm a teacher.","She is very happy today.","They are from Curitiba.","Are you tired?","He isn't at home right now."],
  signals:["name","age","origin","feelings","job","characteristics"],
  mistakes:["✗ I have 30 years → ✓ I <b>am</b> 30 years old","✗ She have happy → ✓ She <b>is</b> happy","✗ I am agree → ✓ I agree (agree doesn't use 'be')"],
  practice:[
    {q:"I ___ a student.",a:"am"},
    {q:"She ___ from Italy.",a:"is"},
    {q:"They ___ my friends.",a:"are"},
    {q:"___ you ready?",a:"Are"},
    {q:"He ___ (not) tired.",a:"isn't / is not"},
    {q:"We ___ 20 years old.",a:"are"}
  ],
  speaking:["Who are you?","How are you today?","Where are you from?","Are you a happy person?"]
},
{
  eid:"present-simple",
  name:"Present Simple", short:"Present Simple", level:"A1",
  use:"We use the Present Simple for routines, habits, facts and general truths — things that happen always or regularly.",
  form:{
    aff:["I / You / We / They + <b>verb</b>: I work.","He / She / It + <b>verb + s</b>: She work<b>s</b>."],
    neg:["I / You / We / They + <b>don't</b> + verb: I don't work.","He / She / It + <b>doesn't</b> + verb: He doesn't work."],
    q:["<b>Do</b> + I/you/we/they + verb? Do you work?","<b>Does</b> + he/she/it + verb? Does she work?"]
  },
  examples:["I work in Curitiba.","She likes coffee.","We don't watch TV in the morning.","Does he speak English?","The sun rises in the east."],
  signals:["every day","always","usually","often","sometimes","never","on Mondays","in the morning"],
  mistakes:["✗ He work → ✓ He work<b>s</b>","✗ She don't like → ✓ She <b>doesn't</b> like","✗ Do she work? → ✓ <b>Does</b> she work?","✗ I no like → ✓ I <b>don't</b> like"],
  practice:[
    {q:"She ___ (work) at a bank.",a:"works"},
    {q:"I ___ (not/like) coffee.",a:"don't like"},
    {q:"___ he ___ (speak) English?",a:"Does / speak"},
    {q:"They ___ (live) in Rio.",a:"live"},
    {q:"He ___ (go) to the gym on Sundays.",a:"goes"},
    {q:"We ___ (not/have) a car.",a:"don't have"}
  ],
  speaking:["What do you do every day?","What time do you wake up?","Do you like coffee?","What does your best friend do?"]
},
{
  eid:"present-continuous",
  name:"Present Continuous", short:"Present Continuous", level:"A1",
  use:"We use the Present Continuous for actions happening NOW, at the moment of speaking, or temporary / ongoing situations.",
  form:{
    aff:["am / is / are + <b>verb-ing</b>: I <b>am</b> study<b>ing</b>."],
    neg:["am / is / are + <b>not</b> + verb-ing: She <b>isn't</b> working."],
    q:["Am / Is / Are + subject + verb-ing? <b>Are</b> you listening?"]
  },
  examples:["I'm studying English now.","She is cooking dinner.","They aren't sleeping.","Are you listening to me?","Look! It's raining."],
  signals:["now","right now","at the moment","today","Look!","Listen!"],
  mistakes:["✗ I am study → ✓ I am study<b>ing</b>","✗ She studying → ✓ She <b>is</b> studying","✗ I working now → ✓ I <b>am</b> working now","run → run<b>ning</b> · make → mak<b>ing</b> (watch the spelling)"],
  practice:[
    {q:"I ___ (study) right now.",a:"am studying"},
    {q:"She ___ (cook) dinner.",a:"is cooking"},
    {q:"They ___ (not/work) today.",a:"aren't working"},
    {q:"___ you ___ (listen)?",a:"Are / listening"},
    {q:"Look! It ___ (rain).",a:"is raining"}
  ],
  speaking:["What are you doing right now?","Am I sitting or standing?","Are you learning English at the moment?"]
},
{
  name:"Present Simple vs Continuous", short:"Simple vs Continuous", level:"A1+",
  use:"The big contrast: Present Simple = habit/routine/fact. Present Continuous = now/temporary. Knowing the difference is essential.",
  form:{
    aff:["<b>Simple</b> (habit): I usually work. He plays football.","<b>Continuous</b> (now): I'm working now. He is playing at the moment."],
    neg:["Simple: I don't work on Sundays.","Continuous: I'm not working now."],
    q:["Simple: Do you work every day?","Continuous: Are you working now?"]
  },
  examples:["I usually drink coffee, but right now I'm drinking tea.","She works in a shop, but today she is working from home.","We often play tennis, but we aren't playing today.","He speaks English, and right now he is speaking English!"],
  signals:["Simple: usually, every day, always, often","Continuous: now, right now, at the moment, today"],
  mistakes:["✗ I am going to the gym every day → ✓ I <b>go</b> to the gym every day","✗ Look! He plays → ✓ Look! He <b>is playing</b>"],
  practice:[
    {q:"I ___ (usually/drink) coffee.",a:"usually drink"},
    {q:"Right now she ___ (watch) TV.",a:"is watching"},
    {q:"He ___ (play) football every Sunday.",a:"plays"},
    {q:"Look! They ___ (run).",a:"are running"},
    {q:"We ___ (not/work) at the moment.",a:"aren't working"}
  ],
  speaking:["What do you usually do on weekends?","What are you doing this weekend?","Tell me one habit and one thing you're doing now."]
},
{
  name:"Verb to be — Past (was / were)", short:"Was / Were", level:"A1+",
  use:"We use was/were to talk about past states and situations: how something was, where you were, how you felt.",
  form:{
    aff:["I / He / She / It + <b>was</b>: I was tired.","You / We / They + <b>were</b>: They were happy."],
    neg:["<b>wasn't</b>: She wasn't at home.","<b>weren't</b>: We weren't ready."],
    q:["<b>Was</b> I / he / she...? Was it cold?","<b>Were</b> you / we / they...? Were you there?"]
  },
  examples:["I was tired yesterday.","They were at home.","She wasn't happy.","Were you at the party?","It was cold last night."],
  signals:["yesterday","last night","last week","in 2010","two days ago","when I was young"],
  mistakes:["✗ I were → ✓ I <b>was</b>","✗ They was → ✓ They <b>were</b>","✗ Was you? → ✓ <b>Were</b> you?"],
  practice:[
    {q:"I ___ at work yesterday.",a:"was"},
    {q:"They ___ tired.",a:"were"},
    {q:"She ___ (not) at home.",a:"wasn't"},
    {q:"___ you happy?",a:"Were"},
    {q:"It ___ cold last night.",a:"was"}
  ],
  speaking:["Where were you yesterday?","How were you last week?","Were you a happy child?"]
},
{
  eid:"past-simple",
  name:"Past Simple — Regular verbs", short:"Past Regular", level:"A1+",
  use:"We use the Past Simple for finished actions in the past. Regular verbs end in -ed.",
  form:{
    aff:["verb + <b>ed</b>: worked, played, lived. I worked yesterday."],
    neg:["<b>didn't</b> + base verb: I didn't work. (base, no -ed!)"],
    q:["<b>Did</b> + subject + base verb? Did you work?"]
  },
  examples:["I worked yesterday.","She played tennis.","We didn't watch the film.","Did you like it?","They lived in Rio."],
  signals:["yesterday","last week","...ago","in 2015","then"],
  mistakes:["✗ I didn't worked → ✓ I didn't <b>work</b> (base after didn't)","✗ Did you worked? → ✓ Did you <b>work</b>?","study → stud<b>ied</b> · stop → stop<b>ped</b>"],
  practice:[
    {q:"I ___ (work) yesterday.",a:"worked"},
    {q:"She ___ (not/like) the film.",a:"didn't like"},
    {q:"___ you ___ (play) football?",a:"Did / play"},
    {q:"They ___ (live) in Curitiba.",a:"lived"},
    {q:"He ___ (study) all night.",a:"studied"}
  ],
  speaking:["What did you do yesterday?","Where did you go last weekend?","Did you like your weekend?"]
},
{
  name:"Past Simple — Irregular verbs", short:"Past Irregular", level:"A1+",
  use:"Many common verbs do NOT follow the -ed rule. You need to memorize the irregular forms.",
  form:{
    aff:["irregular form: go → <b>went</b>, have → <b>had</b>, see → <b>saw</b>. I went home."],
    neg:["<b>didn't</b> + base: I didn't go. (back to the base!)"],
    q:["<b>Did</b> + subject + base? Did you go?"]
  },
  list:["go → went","have → had","do → did","make → made","see → saw","eat → ate","drink → drank","come → came","get → got","take → took","buy → bought","think → thought"],
  examples:["I went to the beach.","She had lunch at noon.","We saw a good movie.","Did you go out yesterday?","They didn't come to the party."],
  signals:["yesterday","last...","...ago"],
  mistakes:["✗ I goed → ✓ I <b>went</b>","✗ She eated → ✓ She <b>ate</b>","✗ Did you went? → ✓ Did you <b>go</b>?"],
  practice:[
    {q:"I ___ (go) to work.",a:"went"},
    {q:"She ___ (have) a coffee.",a:"had"},
    {q:"We ___ (see) our friends.",a:"saw"},
    {q:"___ you ___ (eat) lunch?",a:"Did / eat"},
    {q:"He ___ (not/come) to the party.",a:"didn't come"}
  ],
  speaking:["What did you eat yesterday?","Where did you go on your last holiday?","What did you buy recently?"]
},
{
  name:"Future — Going to", short:"Going to", level:"A2",
  use:"We use 'going to' for plans and intentions (things already decided) and for predictions with clear evidence.",
  form:{
    aff:["am / is / are + <b>going to</b> + verb: I'm going to travel."],
    neg:["am / is / are + <b>not</b> + going to + verb: We aren't going to work."],
    q:["Am / Is / Are + subject + going to + verb? Are you going to come?"]
  },
  examples:["I'm going to travel next month.","She is going to study medicine.","We aren't going to work tomorrow.","Are you going to come?","Look at the clouds — it's going to rain."],
  signals:["tomorrow","next week / month / year","tonight","soon"],
  mistakes:["✗ I going to travel → ✓ I'm going to travel (use the 'to be')","✗ I'm going to travelling → ✓ I'm going to <b>travel</b> (base)","✗ She go to study → ✓ She <b>is going to</b> study"],
  practice:[
    {q:"I ___ (going to/travel) next week.",a:"am going to travel"},
    {q:"She ___ (going to/study).",a:"is going to study"},
    {q:"They ___ (not/going to/come).",a:"aren't going to come"},
    {q:"___ you ___ (going to/help)?",a:"Are / going to help"},
    {q:"It ___ (going to/rain).",a:"is going to rain"}
  ],
  speaking:["What are you going to do this weekend?","What are your plans for next year?","Are you going to travel soon?"]
},
{
  name:"Future — Will", short:"Will", level:"A2",
  use:"We use 'will' for decisions at the moment of speaking, predictions, promises and offers to help.",
  form:{
    aff:["<b>will</b> + base verb: I'll help you. (will never changes)"],
    neg:["<b>won't</b> (will not) + verb: They won't come."],
    q:["<b>Will</b> + subject + verb? Will you be there?"]
  },
  examples:["I'll help you.","She will call you later.","They won't come.","Will you marry me?","I think it will rain tomorrow."],
  signals:["tomorrow","later","tonight","next...","I think","maybe","probably"],
  mistakes:["✗ I will to help → ✓ I will <b>help</b> (no 'to')","✗ She wills → ✓ She <b>will</b> (never changes)","✗ I will helping → ✓ I will <b>help</b> (base)"],
  practice:[
    {q:"I ___ (help) you.",a:"will help"},
    {q:"She ___ (call) you later.",a:"will call"},
    {q:"They ___ (not/come).",a:"won't come"},
    {q:"___ you ___ (be) there?",a:"Will / be"},
    {q:"I think it ___ (rain).",a:"will rain"}
  ],
  speaking:["What will you do tomorrow?","Do you think you'll travel this year?","Make a promise using 'will'."]
},
{
  name:"Present Perfect", short:"Present Perfect", level:"A2",
  use:"We use the Present Perfect for life experiences (without saying when), past actions with a result in the present, and actions that started in the past and continue. Do NOT use it with a specific time (yesterday, last week).",
  form:{
    aff:["have / has + <b>past participle</b>: I have seen. She has gone."],
    neg:["haven't / hasn't + past participle: We haven't finished."],
    q:["Have / Has + subject + past participle? Have you ever been to London?"]
  },
  examples:["I have visited Paris.","She has just arrived.","We haven't finished yet.","Have you ever eaten sushi?","He has lived here for five years."],
  signals:["ever","never","already","just","yet","since","for"],
  mistakes:["✗ I have visited Paris last year → ✓ I <b>visited</b> Paris last year (specific time = Past Simple)","✗ She has went → ✓ She has <b>gone</b> (past participle)","✗ I have ate → ✓ I have <b>eaten</b>"],
  practice:[
    {q:"I ___ (see) that film.",a:"have seen"},
    {q:"She ___ (just/arrive).",a:"has just arrived"},
    {q:"___ you ever ___ (be) to London?",a:"Have / been"},
    {q:"We ___ (not/finish) yet.",a:"haven't finished"},
    {q:"He ___ (live) here for years.",a:"has lived"}
  ],
  speaking:["Have you ever traveled abroad?","What countries have you visited?","Have you had breakfast today?"]
}
,
{
  name:"Can / Could", short:"Can / Could", level:"A1",
  use:"Can = present ability and requests/permission. Could = past ability and more polite requests.",
  form:{aff:["can / could + base verb: I <b>can</b> swim. She <b>could</b> read at four."],neg:["<b>can't</b> (cannot) / <b>couldn't</b>: I can't drive."],q:["<b>Can/Could</b> + subject + verb? Can you help me?"]},
  examples:["I can speak English.","She can't come today.","Could you open the window, please?","When I was young, I could run fast.","Can I use your phone?"],
  signals:["ability","permission","polite requests","could = past"],

// ============ RENDER ============
let current = 0;

function renderSelector(){
  document.getElementById('tenseSelector').innerHTML =
    tenses.map((t,i)=>`<button class="tense-btn ${i===current?'active':''}" onclick="selectTense(${i})">${t.eid&&window.ENGINE_TOPICS&&ENGINE_TOPICS[t.eid]?'⚡ ':''}${t.short}</button>`).join('');
}
function selectTense(i){current=i;renderSelector();renderLesson();window.scrollTo({top:0,behavior:'smooth'});}

function speak(txt){
  if(!('speechSynthesis' in window)){alert('Audio not supported in this browser');return;}
  const u=new SpeechSynthesisUtterance(txt);u.lang='en-US';u.rate=0.9;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function toggleAnswer(id){document.getElementById(id).classList.toggle('show');}

function revealRule(){
  document.getElementById('ruleWrap').classList.remove('hide-rule');
  document.getElementById('ruleReveal').style.display='none';
}

function stageBlock(color,title,inner){
  return `<div class="stage" style="border-left-color:${color}"><h3 class="text-xl font-bold text-white mb-3">${title}</h3>${inner}</div>`;
}

function renderLesson(){
  const t=tenses[current];
  const engine=t.eid&&window.ENGINE_TOPICS&&ENGINE_TOPICS[t.eid];
  document.getElementById('lessonTitle').innerHTML=`
    <div class="flex items-center gap-3 mb-1">
      <span class="text-xs bg-[#B08F4C] text-[#181510] px-2 py-1 rounded font-bold">GRAMMAR</span>
      <span class="text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded">${t.level}</span>
      ${engine?'<span class="text-xs px-2 py-1 rounded font-bold" style="background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff">⚡ Grammar Engine v1</span>':''}
    </div>
    <h2 class="text-2xl md:text-3xl font-bold text-white">${t.name}</h2>`;

  // Tópicos migrados usam o motor (GRAMMAR-ENGINE.md); os demais, o renderer legado abaixo.
  if(engine){ renderStuBar(); GE.start(ENGINE_TOPICS[t.eid]); return; }

  let h='';

  // 0 WARM-UP — review queue: the student's past ✗ items return as retrieval (Grammar Engine §2 · SLF G4)
  wuJudge={};
  wuItems=getQueue().slice(0,4);
  if(wuItems.length){
    h+=stageBlock('#22c55e','0 · Warm-up — '+stuName()+'’s review queue',
      `<p class="text-slate-400 text-sm mb-2">Ask these aloud first — things ${stuName()} missed before. A ✓ clears the item from the queue.</p>`+
      wuItems.map((it,i)=>`
        <div class="ex-line" style="display:block">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
            <span><span class="chip" style="margin:0 6px 0 0">${it.topic||'review'}</span>${it.q}</span>
            <span style="display:flex;gap:6px;flex-shrink:0">
              ${it.a?`<button onclick="toggleAnswer('wua-${i}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded">answer</button>`:''}
              <button onclick="judgeWU(${i},true)" id="wuy-${i}" class="text-xs px-3 py-1 rounded" style="background:#dcfce7;color:#166534;font-weight:700;border:1px solid #86efac">✓</button>
              <button onclick="judgeWU(${i},false)" id="wun-${i}" class="text-xs px-3 py-1 rounded" style="background:#fee2e2;color:#991b1b;font-weight:700;border:1px solid #fecaca">✗</button>
            </span>
          </div>
          ${it.a?`<div id="wua-${i}" class="answer">✓ ${it.a}</div>`:''}
        </div>`).join('')+`<div id="wuVerdict" style="margin-top:8px"></div>`);
  }

  // 1 NOTICE — the student discovers the pattern BEFORE seeing the rule (Grammar Engine §3)
  h+=stageBlock('#10b981','1 · Notice the pattern (listen & discover)',
    t.examples.map(e=>`<div class="ex-line"><span>${e}</span><button class="speak-btn" onclick="speak('${e.replace(/'/g,"\\'")}')">►</button></div>`).join('')+
    `<div style="margin-top:12px">
       <span class="chip">🔍 What repeats in every sentence?</span>
       <span class="chip">🔍 What changes — and when?</span>
       <span class="chip">🗣️ Say the rule in YOUR words</span>
     </div>`);

  // 2 RULE — hidden until the student has said their version (teacher reveals with 1 click)
  h+=`<div id="ruleReveal" style="text-align:center;margin:4px 0 14px">
        <button onclick="revealRule()" class="theme-btn font-bold py-3 px-6 rounded-lg" style="font-size:15px">👁 Reveal the rule — after the student says it</button>
      </div>
      <div id="ruleWrap" class="hide-rule">`;
  h+=stageBlock('#f59e0b','2 · When to use',`<p class="text-slate-300">${t.use}</p>`);
  h+=stageBlock('#3b82f6','Structure',
    `<div class="form-box"><div class="label" style="color:#34d399">Affirmative</div>${t.form.aff.map(x=>`<p class="text-slate-200 text-sm mb-1">${x}</p>`).join('')}</div>
     <div class="form-box"><div class="label" style="color:#f87171">Negative</div>${t.form.neg.map(x=>`<p class="text-slate-200 text-sm mb-1">${x}</p>`).join('')}</div>
     <div class="form-box"><div class="label" style="color:#60a5fa">Question</div>${t.form.q.map(x=>`<p class="text-slate-200 text-sm mb-1">${x}</p>`).join('')}</div>`);
  if(t.list){
    h+=stageBlock('#a855f7','Common irregular verbs',
      `<div class="grid grid-cols-2 md:grid-cols-3 gap-2">${t.list.map(v=>`<div class="form-box" style="margin:0;padding:10px"><span class="text-white font-semibold text-sm">${v}</span></div>`).join('')}</div>`);
  }
  h+=stageBlock('#eab308','Signal words',
    `<div>${t.signals.map(s=>`<span class="chip">${s}</span>`).join('')}</div>`);
  h+=`</div>`;

  // 5 ERROS COMUNS
  h+=stageBlock('#ef4444','Common mistakes',
    t.mistakes.map(m=>`<div class="mistake text-slate-200 text-sm">${m}</div>`).join(''));

  // 3 PRACTICE — student says it, teacher reveals and marks (evidence gate ≥80%)
  prJudge={};
  h+=stageBlock('#ec4899','3 · Practice — student says it, you check it',
    `<div id="prScore" class="text-slate-300 text-sm font-bold mb-2">0 / ${t.practice.length} checked · gate: ≥80%</div>`+
    t.practice.map((p,idx)=>{
      const id=`ans-${current}-${idx}`;
      return `<div class="ex-line" style="display:block" id="pr-${idx}">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
          <span>${idx+1}. ${p.q}</span>
          <span style="display:flex;gap:6px;flex-shrink:0">
            <button onclick="toggleAnswer('hint-${idx}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded">💡 hint</button>
            <button onclick="toggleAnswer('${id}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded">show answer</button>
          </span>
        </div>
        <div id="hint-${idx}" class="answer" style="color:#d97706 !important">💡 It starts with “${(p.a||'?').trim().charAt(0)}…” — try again!</div>
        <div id="${id}" class="answer">✓ ${p.a}
          <span style="margin-left:8px">
            <button onclick="judgePr(${idx},true)" id="pry-${idx}" class="text-xs px-3 py-1 rounded" style="background:#dcfce7;color:#166534;font-weight:700;border:1px solid #86efac">✓ got it</button>
            <button onclick="judgePr(${idx},false)" id="prn-${idx}" class="text-xs px-3 py-1 rounded" style="background:#fee2e2;color:#991b1b;font-weight:700;border:1px solid #fecaca">✗ missed</button>
          </span>
          <div class="text-xs" style="color:#7c3aed;margin-top:5px">↳ follow-up: ${FOLLOWUPS[idx%FOLLOWUPS.length]}</div>
        </div>
      </div>`;
    }).join('')+`<div id="prVerdict" style="margin-top:10px"></div>`);

  // 4 FALE AGORA
  h+=stageBlock('#06b6d4','4 · Speak now (use the tense)',
    t.speaking.map(q=>`<div class="ex-line"><span>${q}</span></div>`).join(''));

  // 5 EXIT TICKET — auto-built evidence gate (Grammar Engine §10)
  etJudge={};
  const et=buildExit(t);
  h+=stageBlock('#7c3aed','5 · Exit Ticket — ≥80% (5/6) completes the week',
    et.map((it,i)=>`
      <div class="ex-line" style="display:block">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
          <span><span class="chip" style="margin:0 6px 0 0">${it.tag}</span>${it.q}</span>
          <span style="display:flex;gap:6px;flex-shrink:0">
            ${it.a?`<button onclick="toggleAnswer('eta-${i}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded">answer</button>`:''}
            <button onclick="judgeET(${i},true)" id="ety-${i}" class="text-xs px-3 py-1 rounded" style="background:#dcfce7;color:#166534;font-weight:700;border:1px solid #86efac">✓</button>
            <button onclick="judgeET(${i},false)" id="etn-${i}" class="text-xs px-3 py-1 rounded" style="background:#fee2e2;color:#991b1b;font-weight:700;border:1px solid #fecaca">✗</button>
          </span>
        </div>
        ${it.a?`<div id="eta-${i}" class="answer">✓ ${it.a}</div>`:''}
      </div>`).join('')+`<div id="etVerdict" style="margin-top:10px"></div>`);

  document.getElementById('lessonBody').innerHTML=h;
  renderStuBar();
}

// ============ EVIDENCE & ERROR QUEUE (Grammar Engine §7/§10 · SLF G3/G4) ============
const FOLLOWUPS=['Why?','And you? Make it about YOU.','Say it again — faster and natural.','Make one more sentence like this one.','Why not the other form?','Now turn it into a question.'];
let prJudge={},etJudge={},wuJudge={},wuItems=[];

function getQueue(){
  if(!curStu)return[];
  try{
    const arr=JSON.parse(localStorage.getItem('errq|'+curStu)||'[]');
    return arr.map((e,idx)=>Object.assign({},e,{_i:idx})).filter(e=>!e.rv);
  }catch(e){return[];}
}
function judgeWU(i,ok){
  if(wuJudge[i]!==undefined)return;
  wuJudge[i]=ok;
  document.getElementById('wuy-'+i).style.opacity=ok?'1':'.35';
  document.getElementById('wun-'+i).style.opacity=ok?'.35':'1';
  try{
    const k='errq|'+curStu;
    const arr=JSON.parse(localStorage.getItem(k)||'[]');
    const it=arr[wuItems[i]._i];
    if(it){ if(ok)it.rv=1; else it.d=new Date().toISOString().slice(0,10); }
    localStorage.setItem(k,JSON.stringify(arr));
  }catch(e){}
  const n=Object.keys(wuJudge).length,c=Object.values(wuJudge).filter(Boolean).length;
  if(n===wuItems.length){
    const left=getQueue().length;
    document.getElementById('wuVerdict').innerHTML=
      `<div class="mistake" style="background:#f0fdf4 !important;border-color:#bbf7d0 !important;color:#166534 !important;font-weight:700">${c}/${n} recovered · ${left} item${left===1?'':'s'} still in ${stuName()}'s queue. Now let's discover something new ↓</div>`;
  }
}

function buildExit(t){
  const sp=t.speaking.slice(-2);
  const sg=t.signals.slice(0,2).map(s=>String(s).split(':').pop().split(',')[0].trim());
  const strip=s=>String(s).replace(/<[^>]*>/g,'');
  const mk=strip(t.mistakes[0]||'').split('→');
  const items=[];
  sp.forEach(q=>items.push({tag:'🗣 speak',q}));
  sg.forEach(w=>items.push({tag:'✏ create',q:`Make your own sentence with: “${w}”`}));
  if(mk.length>1)items.push({tag:'⚠ fix it',q:mk[0].replace('✗','').trim(),a:mk[1].replace('✓','').trim()});
  else items.push({tag:'⚠ fix it',q:'Say one WRONG sentence with this tense — then fix it.'});
  items.push({tag:'💭 concept',q:`When do we use ${t.short} — and when NOT? Give one example.`});
  return items;
}

function judgePr(i,ok){
  if(prJudge[i]!==undefined)return;
  prJudge[i]=ok;
  document.getElementById('pry-'+i).style.opacity=ok?'1':'.35';
  document.getElementById('prn-'+i).style.opacity=ok?'.35':'1';
  const t=tenses[current];
  if(!ok)logError('practice',t.practice[i].q,t.practice[i].a);
  const n=Object.keys(prJudge).length,c=Object.values(prJudge).filter(Boolean).length;
  document.getElementById('prScore').textContent=`${c} correct / ${n} checked of ${t.practice.length} · gate: ≥80%`;
  if(n===t.practice.length){
    const pct=Math.round(c/n*100);
    document.getElementById('prVerdict').innerHTML=pct>=80
      ?`<div class="mistake" style="background:#f0fdf4 !important;border-color:#bbf7d0 !important;color:#166534 !important;font-weight:700">✅ ${pct}% — gate passed. Go to Speak now.</div>`
      :`<div class="mistake" style="font-weight:700">⚠ ${pct}% — below the gate. Revisit the rule together, then retry the missed ones (misses saved to ${stuName()}'s review queue).</div>`;
  }
}

function judgeET(i,ok){
  if(etJudge[i]!==undefined)return;
  etJudge[i]=ok;
  document.getElementById('ety-'+i).style.opacity=ok?'1':'.35';
  document.getElementById('etn-'+i).style.opacity=ok?'.35':'1';
  const t=tenses[current];
  if(!ok)logError('exit',buildExit(t)[i].q,buildExit(t)[i].a||'');
  const n=Object.keys(etJudge).length,c=Object.values(etJudge).filter(Boolean).length;
  if(n===6){
    document.getElementById('etVerdict').innerHTML=c>=5
      ?`<div class="mistake" style="background:#f0fdf4 !important;border-color:#bbf7d0 !important;color:#166534 !important;font-weight:700">🏆 ${c}/6 — week complete! Mark it in the Annual Plan and tell ${stuName()} one thing they can do now that they couldn't before.</div>`
      :`<div class="mistake" style="font-weight:700">↩ ${c}/6 — below 80%. This topic returns next class (misses saved to ${stuName()}'s review queue). Don't advance the week.</div>`;
  }
}

const STU_KEY='sabatovicz_students';
const DEFAULT_STUDENTS=[
  {id:'natali',name:'Natali',emoji:'🌟',level:'A1',age:''},
  {id:'heitor',name:'Heitor',emoji:'🚀',level:'A1',age:''},
  {id:'joao',name:'João',emoji:'⚽',level:'A1',age:''},
  {id:'maria',name:'Maria',emoji:'🌸',level:'A1',age:''},
  {id:'lais',name:'Lais',emoji:'🎨',level:'A1',age:''},
  {id:'regis',name:'Régis',emoji:'🎸',level:'A1',age:''},
  {id:'isa',name:'Isa',emoji:'🦄',level:'A1',age:10}
];
function loadStudents(){
  try{const v=localStorage.getItem(STU_KEY);if(v){const a=JSON.parse(v);if(Array.isArray(a)&&a.length)return a;}}catch(e){}
  localStorage.setItem(STU_KEY,JSON.stringify(DEFAULT_STUDENTS));
  return DEFAULT_STUDENTS.slice();
}
const STUDENTS_DATA=loadStudents();
let curStu=localStorage.getItem('sabatovicz_current_student');
if(!STUDENTS_DATA.some(s=>s.id===curStu))curStu=STUDENTS_DATA.length?STUDENTS_DATA[0].id:null;
function stuName(){const s=STUDENTS_DATA.find(x=>x.id===curStu);return s?s.name:'the student';}
function pickStu(id){curStu=id;localStorage.setItem('sabatovicz_current_student',id);renderLesson();}
function renderStuBar(){
  const el=document.getElementById('stuBar');if(!el)return;
  el.innerHTML=`<span class="text-slate-300 text-sm font-bold" style="margin-right:8px">Class with:</span>`+
    STUDENTS_DATA.map(s=>`<button onclick="pickStu('${s.id}')" class="theme-btn text-xs font-bold py-2 px-3 rounded-lg" style="margin:2px;${s.id===curStu?'background:linear-gradient(135deg,#7c3aed,#db2777) !important;color:#fff !important':''}">${s.emoji||''} ${s.name}</button>`).join('');
}
function logError(kind,q,a){
  if(!curStu)return;
  try{
    const k='errq|'+curStu;
    const arr=JSON.parse(localStorage.getItem(k)||'[]');
    arr.push({m:'grammar',topic:tenses[current].short,kind,q:String(q),a:String(a),d:new Date().toISOString().slice(0,10)});
    localStorage.setItem(k,JSON.stringify(arr));
  }catch(e){}
}

// ============ PDF ============
function exportLesson(){
  const t=tenses[current];
  const pa=document.getElementById('printArea');
  const strip=s=>s.replace(/<b>/g,'').replace(/<\/b>/g,'');
  let h=`<div style="font-family:Arial;color:#222;padding:30px;line-height:1.6">
    <h1 style="text-align:center;border-bottom:3px solid #f59e0b;padding-bottom:12px">Grammar — ${t.name}</h1>
    <p style="text-align:center;color:#666">Level ${t.level}</p>
    <h2 style="border-left:4px solid #f59e0b;padding-left:10px">When to use</h2><p>${t.use}</p>
    <h2 style="border-left:4px solid #f59e0b;padding-left:10px">Structure</h2>
    <p><b>Affirmative:</b></p>${t.form.aff.map(x=>`<p style="margin-left:15px">${strip(x)}</p>`).join('')}
    <p><b>Negative:</b></p>${t.form.neg.map(x=>`<p style="margin-left:15px">${strip(x)}</p>`).join('')}
    <p><b>Question:</b></p>${t.form.q.map(x=>`<p style="margin-left:15px">${strip(x)}</p>`).join('')}`;
  if(t.list){h+=`<h2 style="border-left:4px solid #f59e0b;padding-left:10px">Irregular verbs</h2><p>${t.list.join(' · ')}</p>`;}
  h+=`<h2 style="border-left:4px solid #f59e0b;padding-left:10px">Examples</h2>${t.examples.map(e=>`<p style="margin-left:15px">• ${e}</p>`).join('')}
    <h2 style="border-left:4px solid #f59e0b;padding-left:10px">Signal words</h2><p>${t.signals.join(' · ')}</p>
    <h2 style="border-left:4px solid #f59e0b;padding-left:10px">Common mistakes</h2>${t.mistakes.map(m=>`<p style="margin-left:15px">${strip(m)}</p>`).join('')}
    <h2 style="border-left:4px solid #f59e0b;padding-left:10px">Practice (with answer key)</h2>${t.practice.map((p,i)=>`<p style="margin-left:15px">${i+1}. ${p.q} &nbsp; <b style="color:#059669">(${p.a})</b></p>`).join('')}
    <h2 style="border-left:4px solid #f59e0b;padding-left:10px">Speak now</h2>${t.speaking.map(q=>`<p style="margin-left:15px">• ${q}</p>`).join('')}
    </div>`;
  pa.innerHTML=h;
  printDoc(document.getElementById('printArea').innerHTML,'Sabatovicz');
}

function printDoc(html,title){var w=window.open('','_blank');if(!w){alert('Allow pop-ups to generate the PDF.');return;}w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+title+'</title><style>body{font-family:Arial,Helvetica,sans-serif;padding:28px;color:#111;line-height:1.6;}h1,h2{margin:16px 0 8px;}table{width:100%;border-collapse:collapse;margin:10px 0;}td,th{border:1px solid #ccc;padding:8px;text-align:left;}</style></head><body>'+html+'<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},250);};<\/scr'+'ipt></body></html>');w.document.close();}
