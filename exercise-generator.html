<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabatovicz - Exercise Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family:'Inter',sans-serif; }
  h1,h2,h3 { font-family:'Poppins',sans-serif; }
  body { background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%); }
  .gradient-indigo{background:linear-gradient(135deg,#6366f1 0%,#818cf8 100%);}
  .gradient-emerald{background:linear-gradient(135deg,#10b981 0%,#34d399 100%);}
  .card{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);border:1px solid rgba(148,163,184,.2);}
  .ex-card{border-left:4px solid #667eea;padding:22px;margin-bottom:18px;border-radius:10px;background:linear-gradient(135deg,#1e293b 0%,#293548 100%);}
  .opt{background:#0f172a;border:2px solid #334155;color:#e2e8f0;padding:12px 14px;margin:6px 0;border-radius:8px;cursor:pointer;transition:all .15s;display:block;width:100%;text-align:left;}
  .opt:hover{border-color:#6366f1;}
  .opt.sel{background:#6366f1;border-color:#818cf8;color:#fff;}
  .opt.right{background:#065f46;border-color:#10b981;color:#fff;}
  .opt.wrong{background:#7f1d1d;border-color:#ef4444;color:#fff;}
  .inp{background:#0f172a;border:2px solid #334155;color:#fff;padding:12px;border-radius:8px;width:100%;}
  .inp:focus{outline:none;border-color:#6366f1;}
  .inp.right{border-color:#10b981;}
  .inp.wrong{border-color:#ef4444;}
  .tag{color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .theme-btn{white-space:nowrap;padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;background:#334155;color:#cbd5e1;border:2px solid transparent;transition:all .2s;}
  .theme-btn:hover{border-color:#6366f1;}
  .theme-btn.active{background:linear-gradient(135deg,#6366f1 0%,#818cf8 100%);color:#fff;}
  .correct-note{color:#34d399;font-weight:600;font-size:13px;margin-top:6px;}
  select.inp option{background:#0f172a;}
  /* ===== LIVE CLASS MODE ===== */
  .opt{font-size:17px;font-weight:600;}
  .opt .letter{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:#ede9fe;color:#6d28d9;font-weight:800;margin-right:10px;flex-shrink:0;}
  .opt.right .letter{background:#22c55e;color:#fff;}
  .opt.wrong .letter{background:#ef4444;color:#fff;}
  .opt:disabled{cursor:default;}
  .opt.dim{opacity:.45;}
  .q-big{font-size:22px !important;line-height:1.45;}
  .reveal-btn{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;font-weight:700;padding:12px 22px;border-radius:10px;font-size:16px;cursor:pointer;}
  .answer-big{font-size:30px;font-weight:800;color:#16a34a;margin:10px 0;font-family:'Poppins',sans-serif;}
  .judge{padding:10px 18px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;border:2px solid transparent;}
  .judge.jr{background:#dcfce7;color:#166534;}
  .judge.jw{background:#fee2e2;color:#991b1b;}
  .judge.picked{border-color:currentColor;}
  .judge:disabled{opacity:.45;cursor:default;}
  .legend{background:#f8f7fe;border:1px solid #ece7fb;border-radius:10px;padding:12px 16px;margin-bottom:12px;}
  .legend p{font-size:16px;margin:4px 0;color:#334155;}
  .legend b{color:#6d28d9;margin-right:8px;}
  .mletter{width:42px;height:42px;border-radius:10px;background:#f1edfd;color:#5b21b6;font-weight:800;font-size:17px;cursor:pointer;border:2px solid transparent;transition:all .15s;}
  .mletter:hover{border-color:#a78bfa;}
  .mletter.right{background:#22c55e;color:#fff;}
  .mletter.wrong{background:#ef4444;color:#fff;}
  .mletter:disabled{cursor:default;}
  .mletter.dim{opacity:.4;}


/* ===== LIGHT VIVID THEME (Sabatovicz) ===== */
:root{--ink:#1e293b;--gold:#16a34a;--violet:#7c3aed;--pink:#db2777;}
body{background:#ffffff !important;color:#1e293b !important;}
*{font-family:'Inter',sans-serif;}
h1,h2,h3,h4{font-family:'Poppins',sans-serif !important;font-weight:700 !important;}
.topbar{background:linear-gradient(120deg,#7c3aed 0%,#db2777 55%,#f59e0b 100%) !important;border-bottom:none !important;color:#fff !important;box-shadow:0 6px 24px rgba(124,58,237,.28);}
.topbar h1,.topbar h2,.topbar h3,.topbar p,.topbar span{color:#fff !important;}
[onclick="goHome()"]{background:rgba(255,255,255,.22) !important;border:1px solid rgba(255,255,255,.75) !important;color:#fff !important;font-family:'Poppins',sans-serif !important;}
[onclick="goHome()"]:hover{background:rgba(255,255,255,.38) !important;}
.text-white{color:#1e293b !important;}
.text-slate-300{color:#475569 !important;}
.text-slate-400{color:#64748b !important;}
.text-slate-200{color:#334155 !important;}
.text-slate-500,.text-slate-600{color:#94a3b8 !important;}
.text-indigo-100,.text-indigo-200{color:#6d28d9 !important;}
.text-emerald-400,.text-emerald-300{color:#16a34a !important;}
.text-red-300,.text-red-400{color:#dc2626 !important;}
.text-amber-300{color:#d97706 !important;}
.text-indigo-400{color:#7c3aed !important;}
.text-pink-300{color:#db2777 !important;}
.gradient-coral{background:linear-gradient(135deg,#ff5e62 0%,#ff9966 100%) !important;color:#fff !important;}
.gradient-emerald{background:linear-gradient(135deg,#0ea5a5 0%,#22c55e 100%) !important;color:#fff !important;}
.gradient-indigo{background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%) !important;color:#fff !important;}
.gradient-amber{background:linear-gradient(135deg,#f7971e 0%,#ffd200 100%) !important;color:#7a4a00 !important;}
.gradient-pink{background:linear-gradient(135deg,#ec4899 0%,#f472b6 100%) !important;color:#fff !important;}
.card{background:#ffffff !important;border:1px solid #ece7fb !important;box-shadow:0 4px 18px rgba(124,58,237,.08) !important;border-radius:14px !important;}
.card:hover{transform:translateY(-3px) !important;box-shadow:0 12px 30px rgba(124,58,237,.16) !important;border-color:#d6c8f5 !important;}
.stage{background:#ffffff !important;border:1px solid #eee7fb;border-left-width:5px;box-shadow:0 3px 14px rgba(124,58,237,.06) !important;}
.q-item,.form-box,.ex-line,.vocab-card{background:#f8f7fe !important;border:1px solid #ece7fb !important;color:#334155 !important;}
.q-item:hover{border-color:#a78bfa !important;}
.inp{background:#f8f7fe !important;border:2px solid #e2ddf5 !important;color:#1e293b !important;}
.inp:focus{border-color:#7c3aed !important;outline:none;}
.inp::placeholder,input::placeholder,textarea::placeholder{color:#94a3b8 !important;}
.opt{background:#f8f7fe !important;border:2px solid #e6e0f7 !important;color:#334155 !important;}
.opt:hover{border-color:#a78bfa !important;}
.opt.sel{background:#7c3aed !important;border-color:#7c3aed !important;color:#fff !important;}
.opt.right,.inp.right{background:#dcfce7 !important;border-color:#22c55e !important;color:#166534 !important;}
.opt.wrong,.inp.wrong{background:#fee2e2 !important;border-color:#ef4444 !important;color:#991b1b !important;}
.mistake{background:#fff1f2 !important;border:1px solid #fecdd3 !important;color:#334155 !important;}
.chip{background:#ede9fe !important;color:#6d28d9 !important;border:1px solid #ddd6fe !important;}
.speak-btn{background:#ede9fe !important;color:#7c3aed !important;}
.speak-btn:hover{background:#7c3aed !important;color:#fff !important;}
.ipa{color:#db2777 !important;}
.answer,.correct-note{color:#16a34a !important;}
.tag{color:#7c3aed !important;}
.theme-btn,.week-btn,.tense-btn{background:#f1edfd !important;color:#5b21b6 !important;}
.theme-btn:hover,.week-btn:hover,.tense-btn:hover{border-color:#7c3aed !important;}
.theme-btn.active,.week-btn.active,.tense-btn.active{background:linear-gradient(135deg,#7c3aed,#db2777) !important;color:#fff !important;}
.q-item.flash{background:#fef9c3 !important;border-color:#f59e0b !important;color:#713f12 !important;box-shadow:0 8px 22px rgba(245,158,11,.3) !important;}
.custom-checkbox{border-color:#7c3aed !important;}
.custom-checkbox.checked{background:#7c3aed !important;border-color:#7c3aed !important;}
.custom-checkbox.checked::after{color:#fff !important;}
.progress-bar{background:#ede9fe !important;}
.progress-fill{background:linear-gradient(90deg,#7c3aed,#db2777,#f59e0b) !important;}
.week-card{background:#fff !important;}
.week-card.completed{background:#f0fdf4 !important;}
.week-card:hover{background:#faf8ff !important;}
.bg-slate-700,.bg-slate-800,.bg-slate-900{background:#f8f7fe !important;}
.bg-slate-600{background:#ede9fe !important;}
.border-slate-600,.border-slate-700{border-color:#e2ddf5 !important;}
select.inp option{background:#fff !important;color:#1e293b !important;}
.text-emerald-400{color:#16a34a !important;}
</style>
</head>
<body>
<div class="min-h-screen">
  <!-- HEADER -->
  <div class="topbar text-white p-6 sticky top-0 z-40">
    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-4">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold">Exercise Generator</h1>
          <p class="text-[#B7AE9C] text-sm">Lots of practice · A1</p>
        </div>
        <button onclick="goHome()" class="bg-white text-indigo-600 font-bold py-2 px-4 rounded-lg hover:bg-indigo-50 text-sm">← Menu</button>
      </div>
      <div class="flex gap-2 overflow-x-auto pb-1" id="themeButtons"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="card rounded-xl p-5 mb-6 flex items-center justify-between flex-wrap gap-3">
      <div>
        <p class="text-slate-400 text-sm">Current topic</p>
        <p class="text-white text-xl font-bold" id="currentTopic">—</p>
      </div>
      <div class="text-right">
        <p class="text-slate-400 text-sm">Score</p>
        <p class="text-emerald-400 text-2xl font-bold" id="scoreDisplay">—</p>
      </div>
    </div>

    <div id="exercisesContainer"></div>

    <div class="card rounded-xl p-6 mt-6 flex gap-3 flex-wrap">
      <button onclick="loadTopic(currentKey)" class="gradient-emerald text-white font-bold py-3 px-6 rounded-lg">↺ Restart</button>
      <button onclick="exportPDF()" class="gradient-indigo text-white font-bold py-3 px-6 rounded-lg">Download PDF (with answer key)</button>
    </div>
    <div id="printArea" class="hidden"></div>
  </div>
</div>

<script src="platform-print.js?v=1"></script>
<script>
// ================= EXERCISE BANK =================
const bank = {
  personal:{ label:"Personal Info (to be)", keys:["personal","identity","i am","to be","name","apresent"], exercises:[
    {type:"multiple_choice",question:"I ___ a teacher.",options:["am","is","are","be"],correct:0},
    {type:"multiple_choice",question:"She ___ from Brazil.",options:["am","are","is","be"],correct:2},
    {type:"multiple_choice",question:"They ___ my friends.",options:["is","am","are","be"],correct:2},
    {type:"multiple_choice",question:"___ you happy today?",options:["Is","Am","Are","Be"],correct:2},
    {type:"multiple_choice",question:"He ___ 45 years old.",options:["am","is","are","be"],correct:1},
    {type:"multiple_choice",question:"We ___ students.",options:["is","am","are","been"],correct:2},
    {type:"fill_blank",question:"My name ___ Ana.",hint:"to be",correct:"is"},
    {type:"fill_blank",question:"I ___ from Curitiba.",hint:"to be",correct:"am"},
    {type:"fill_blank",question:"You ___ very kind.",hint:"to be",correct:"are"},
    {type:"fill_blank",question:"It ___ a nice day.",hint:"to be",correct:"is"},
    {type:"fill_blank",question:"We ___ tired.",hint:"to be",correct:"are"},
    {type:"true_false",statements:[
      {text:"'I'm' is short for 'I am'.",answer:true},
      {text:"'She are happy' is correct.",answer:false},
      {text:"We use 'is' with he, she and it.",answer:true},
      {text:"'Are you a doctor?' is a question.",answer:true},
      {text:"'They is my family' is correct.",answer:false},
      {text:"'I'm not' means 'I am not'.",answer:true}
    ]},
    {type:"matching",question:"Match the word to its meaning:",pairs:[
      {left:"name",right:"what people call you"},{left:"age",right:"how old you are"},{left:"country",right:"a nation"},
      {left:"married",right:"has a husband or wife"},{left:"single",right:"not married"}
    ]}
  ]},

  jobs:{ label:"Jobs & Nationalities", keys:["job","profession","national","work","nacional"], exercises:[
    {type:"multiple_choice",question:"A person who teaches is a ___.",options:["doctor","teacher","nurse","pilot"],correct:1},
    {type:"multiple_choice",question:"A person from Brazil is ___.",options:["Brazil","Brazilian","Brazilic","Brazilish"],correct:1},
    {type:"multiple_choice",question:"A ___ works in a hospital and cares for patients.",options:["teacher","nurse","lawyer","chef"],correct:1},
    {type:"multiple_choice",question:"A person from the United States is ___.",options:["American","America","Americano","US"],correct:0},
    {type:"multiple_choice",question:"A person who designs bridges is an ___.",options:["artist","engineer","actor","author"],correct:1},
    {type:"multiple_choice",question:"What ___ you do for work?",options:["do","are","is","be"],correct:0},
    {type:"fill_blank",question:"I teach English. I'm a ___.",hint:"profession",correct:"teacher"},
    {type:"fill_blank",question:"She's from Italy. She's ___.",hint:"nationality",correct:"italian"},
    {type:"fill_blank",question:"He flies planes. He's a ___.",hint:"profession",correct:"pilot"},
    {type:"fill_blank",question:"A person who cooks in a restaurant is a ___.",hint:"profession",correct:"chef"},
    {type:"fill_blank",question:"I'm from Brazil, so I'm ___.",hint:"nationality",correct:"brazilian"},
    {type:"true_false",statements:[
      {text:"A nurse works in a hospital.",answer:true},
      {text:"A person from France is 'Frenchian'.",answer:false},
      {text:"An engineer designs and builds things.",answer:true},
      {text:"'Teacher' is a nationality.",answer:false},
      {text:"A person from Japan is Japanese.",answer:true},
      {text:"A retired person works every day.",answer:false}
    ]},
    {type:"matching",question:"Match the job to its meaning:",pairs:[
      {left:"teacher",right:"teaches students"},{left:"nurse",right:"cares for patients"},{left:"engineer",right:"designs machines"},
      {left:"lawyer",right:"works with the law"},{left:"retired",right:"stopped working"}
    ]}
  ]},

  family:{ label:"Family", keys:["family","famil","relatives"], exercises:[
    {type:"multiple_choice",question:"My mother's mother is my ___.",options:["aunt","grandmother","sister","cousin"],correct:1},
    {type:"multiple_choice",question:"My father's brother is my ___.",options:["uncle","cousin","nephew","grandfather"],correct:0},
    {type:"multiple_choice",question:"My brother's daughter is my ___.",options:["sister","niece","aunt","cousin"],correct:1},
    {type:"multiple_choice",question:"My sister's son is my ___.",options:["nephew","niece","uncle","cousin"],correct:0},
    {type:"multiple_choice",question:"The children of my aunt are my ___.",options:["siblings","cousins","parents","nieces"],correct:1},
    {type:"multiple_choice",question:"My wife's mother is my ___.",options:["sister","mother-in-law","aunt","cousin"],correct:1},
    {type:"fill_blank",question:"My mother and father are my ___.",hint:"plural",correct:"parents"},
    {type:"fill_blank",question:"My brother and sister are my ___.",hint:"siblings",correct:"siblings"},
    {type:"fill_blank",question:"My son and daughter are my ___.",hint:"children",correct:"children"},
    {type:"fill_blank",question:"My father's wife is my ___.",hint:"mother",correct:"mother"},
    {type:"fill_blank",question:"I'm married. My female partner is my ___.",hint:"wife",correct:"wife"},
    {type:"true_false",statements:[
      {text:"Your parents are your mother and father.",answer:true},
      {text:"Your uncle is your mother's sister.",answer:false},
      {text:"Cousins are children of your parents' siblings.",answer:true},
      {text:"A daughter is a female child.",answer:true},
      {text:"Your grandmother is your mother's daughter.",answer:false},
      {text:"'Siblings' means brothers and sisters.",answer:true}
    ]},
    {type:"matching",question:"Match the word to its meaning:",pairs:[
      {left:"mother",right:"female parent"},{left:"husband",right:"married man"},{left:"daughter",right:"female child"},
      {left:"brother",right:"male sibling"},{left:"parents",right:"mother and father"}
    ]}
  ]},

  routine:{ label:"Daily Routine", keys:["routine","daily","everyday","day"], exercises:[
    {type:"multiple_choice",question:"I ___ up at 7 AM.",options:["wake","sleep","cook","work"],correct:0},
    {type:"multiple_choice",question:"She ___ to work by bus.",options:["go","goes","going","gone"],correct:1},
    {type:"multiple_choice",question:"I have ___ in the morning.",options:["dinner","breakfast","lunch","night"],correct:1},
    {type:"multiple_choice",question:"He ___ a shower every day.",options:["take","takes","taking","took"],correct:1},
    {type:"multiple_choice",question:"At night, I go to ___.",options:["bed","work","school","gym"],correct:0},
    {type:"multiple_choice",question:"We ___ dinner at 8 PM.",options:["have","has","having","to have"],correct:0},
    {type:"fill_blank",question:"I ___ up at 6 o'clock.",hint:"wake up",correct:"wake"},
    {type:"fill_blank",question:"She ___ (go) to work at 8.",hint:"he/she + s",correct:"goes"},
    {type:"fill_blank",question:"I ___ (have) breakfast at 7.",hint:"I + verb",correct:"have"},
    {type:"fill_blank",question:"He ___ (brush) his teeth.",hint:"he/she + es",correct:"brushes"},
    {type:"fill_blank",question:"They ___ (sleep) eight hours.",hint:"they + verb",correct:"sleep"},
    {type:"true_false",statements:[
      {text:"We usually have breakfast in the morning.",answer:true},
      {text:"'He go to work' is correct.",answer:false},
      {text:"'Wake up' means to stop sleeping.",answer:true},
      {text:"People normally sleep at noon.",answer:false},
      {text:"'She has lunch at 1 PM' is correct.",answer:true},
      {text:"We add -s to the verb with he, she, it.",answer:true}
    ]},
    {type:"matching",question:"Match the action to its meaning:",pairs:[
      {left:"wake up",right:"stop sleeping"},{left:"have lunch",right:"eat at midday"},{left:"cook",right:"prepare food"},
      {left:"sleep",right:"rest at night"},{left:"go to bed",right:"go to sleep"}
    ]}
  ]},

  frequency:{ label:"Frequency", keys:["frequency","often","adverb","how often"], exercises:[
    {type:"multiple_choice",question:"'100% of the time' = ___.",options:["never","always","rarely","sometimes"],correct:1},
    {type:"multiple_choice",question:"'0% of the time' = ___.",options:["always","never","often","usually"],correct:1},
    {type:"multiple_choice",question:"I ___ drink coffee (about 90%).",options:["never","usually","rarely","sometimes"],correct:1},
    {type:"multiple_choice",question:"She is ___ late (rarely).",options:["rarely","always","often","usually"],correct:0},
    {type:"multiple_choice",question:"Correct: 'I ___ go to the gym.'",options:["always","go always","am always go","go to always"],correct:0},
    {type:"multiple_choice",question:"'Once a week' means ___.",options:["one time every week","every day","never","always"],correct:0},
    {type:"fill_blank",question:"I ___ eat breakfast (100%).",hint:"always",correct:"always"},
    {type:"fill_blank",question:"He ___ smokes (0%).",hint:"never",correct:"never"},
    {type:"fill_blank",question:"They ___ travel (sometimes).",hint:"sometimes",correct:"sometimes"},
    {type:"fill_blank",question:"She is ___ happy (usually).",hint:"usually",correct:"usually"},
    {type:"fill_blank",question:"We go to church ___ a week (once).",hint:"once",correct:"once"},
    {type:"true_false",statements:[
      {text:"'Always' means 100% of the time.",answer:true},
      {text:"Frequency adverbs go after the main verb.",answer:false},
      {text:"'Never' is a negative idea.",answer:true},
      {text:"'She is always late' is correct.",answer:true},
      {text:"'I go usually to work' is correct word order.",answer:false},
      {text:"'Every day' means daily.",answer:true}
    ]},
    {type:"matching",question:"Match the adverb to its meaning:",pairs:[
      {left:"always",right:"100% of the time"},{left:"never",right:"0% of the time"},{left:"sometimes",right:"now and then"},
      {left:"usually",right:"most of the time"},{left:"rarely",right:"almost never"}
    ]}
  ]},

  freetime:{ label:"Free Time / Hobbies", keys:["free time","hobby","hobbies","leisure","freetime","tempo livre"], exercises:[
    {type:"multiple_choice",question:"I like ___ (read) books.",options:["read","reading","reads","to reading"],correct:1},
    {type:"multiple_choice",question:"She loves ___ (dance).",options:["dance","dancing","dances","danced"],correct:1},
    {type:"multiple_choice",question:"I don't ___ cooking.",options:["likes","like","liking","to like"],correct:1},
    {type:"multiple_choice",question:"He ___ playing video games.",options:["enjoy","enjoys","enjoying","to enjoy"],correct:1},
    {type:"multiple_choice",question:"'I hate ___ early' (wake).",options:["wake","waking","wakes","woke"],correct:1},
    {type:"multiple_choice",question:"A ___ is an activity you do for fun.",options:["job","hobby","homework","chore"],correct:1},
    {type:"fill_blank",question:"I like ___ (listen) to music.",hint:"like + -ing",correct:"listening"},
    {type:"fill_blank",question:"She enjoys ___ (paint).",hint:"enjoy + -ing",correct:"painting"},
    {type:"fill_blank",question:"They love ___ (travel).",hint:"love + -ing",correct:"traveling"},
    {type:"fill_blank",question:"I don't like ___ (cook).",hint:"like + -ing",correct:"cooking"},
    {type:"fill_blank",question:"My favorite ___ is reading.",hint:"a hobby",correct:"hobby"},
    {type:"true_false",statements:[
      {text:"After 'like', the verb takes -ing.",answer:true},
      {text:"'I like read' is correct.",answer:false},
      {text:"'Enjoy' is followed by -ing.",answer:true},
      {text:"A hobby is something you do for work.",answer:false},
      {text:"'She loves dancing' is correct.",answer:true},
      {text:"'Don't' is used with I, you, we, they.",answer:true}
    ]},
    {type:"matching",question:"Match the word to its meaning:",pairs:[
      {left:"read",right:"look at a book"},{left:"travel",right:"go to other places"},{left:"dance",right:"move to music"},
      {left:"relax",right:"rest and calm down"},{left:"hobby",right:"a free-time activity"}
    ]}
  ]},

  sports:{ label:"Sports", keys:["sport","sports"], exercises:[
    {type:"multiple_choice",question:"You play this with feet and a ball: ___.",options:["tennis","football","swimming","boxing"],correct:1},
    {type:"multiple_choice",question:"This sport is in water: ___.",options:["running","swimming","cycling","golf"],correct:1},
    {type:"multiple_choice",question:"You ride a bike in ___.",options:["walking","cycling","yoga","boxing"],correct:1},
    {type:"multiple_choice",question:"Right now I ___ (play) tennis.",options:["play","am playing","plays","played"],correct:1},

// ================= ESTADO =================
// LIVE CLASS MODE: the student watches the shared screen and SAYS the answer
// (e.g. "letter B!"); the TEACHER clicks it. Feedback is instant, score is live.
let currentKey = null;
let exercises = [];
let correctCount = 0, answeredCount = 0, totalCount = 0;

function updateScore(ok){
  answeredCount++; if(ok)correctCount++;
  document.getElementById('scoreDisplay').textContent=`${correctCount}/${answeredCount} · ${totalCount} total`;
}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function renderThemeButtons(){
  const c=document.getElementById('themeButtons');
  c.innerHTML=Object.keys(bank).map(k=>`<button class="theme-btn ${k===currentKey?'active':''}" onclick="loadTopic('${k}')">${bank[k].label}</button>`).join('');
}

function loadTopic(key){
  currentKey=key;
  correctCount=0;answeredCount=0;totalCount=0;
  exercises=JSON.parse(JSON.stringify(bank[key].exercises));
  // pre-shuffle matching option lists
  exercises.forEach(ex=>{ if(ex.type==='matching'){ ex._opts=shuffle(ex.pairs.map(p=>p.right)); } });
  exercises.forEach(ex=>{
    if(ex.type==='multiple_choice'||ex.type==='fill_blank')totalCount++;
    if(ex.type==='true_false')totalCount+=ex.statements.length;
    if(ex.type==='matching')totalCount+=ex.pairs.length;
  });
  document.getElementById('currentTopic').textContent=bank[key].label;
  document.getElementById('scoreDisplay').textContent=`0/0 · ${totalCount} total`;
  renderThemeButtons();
  renderExercises();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderExercises(){
  const c=document.getElementById('exercisesContainer');
  c.innerHTML='';
  let num=0;
  exercises.forEach((ex,ei)=>{
    const card=document.createElement('div');
    card.className='card ex-card';
    if(ex.type==='multiple_choice'){
      num++;
      card.innerHTML=`<p class="tag">Multiple choice · student says the letter</p>
        <p class="text-white q-big font-semibold mb-3">${num}. ${ex.question}</p>
        <div>${ex.options.map((o,oi)=>`<button class="opt" id="opt-${ei}-${oi}" onclick="pick(${ei},${oi})"><span class="letter">${String.fromCharCode(65+oi)}</span>${o}</button>`).join('')}</div>`;
    }
    if(ex.type==='fill_blank'){
      num++;
      card.innerHTML=`<p class="tag">Fill in the blank · student says the word</p>
        <p class="text-white q-big font-semibold mb-2">${num}. ${ex.question}</p>
        <p class="text-slate-400 text-sm mb-3 italic">Hint: ${ex.hint}</p>
        <div id="fb-${ei}"><button class="reveal-btn" onclick="reveal(${ei})">👁 Show answer</button></div>`;
    }
    if(ex.type==='true_false'){
      card.innerHTML=`<p class="tag">True or False · student says true or false</p>
        <div class="space-y-3 mt-2">${ex.statements.map((s,si)=>`
          <div>
            <p class="text-white q-big mb-2">${si+1}. ${s.text}</p>
            <div style="display:flex;gap:8px">
              <button class="opt" style="flex:1;text-align:center" id="tf-${ei}-${si}-t" onclick="pickTF(${ei},${si},true)">✓ True</button>
              <button class="opt" style="flex:1;text-align:center" id="tf-${ei}-${si}-f" onclick="pickTF(${ei},${si},false)">✗ False</button>
            </div>
          </div>`).join('')}</div>`;
    }
    if(ex.type==='matching'){
      card.innerHTML=`<p class="tag">Matching · student says the letter for each word</p>
        <p class="text-white q-big font-semibold mb-3">${ex.question}</p>
        <div class="legend">${ex._opts.map((r,ri)=>`<p><b>${String.fromCharCode(65+ri)}</b>${r}</p>`).join('')}</div>
        <div class="space-y-2">${ex.pairs.map((p,pi)=>`
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <div style="min-width:110px"><span class="text-white font-bold" style="font-size:18px">${p.left}</span></div>
            <div style="display:flex;gap:6px">${ex._opts.map((r,ri)=>`<button class="mletter" id="ml-${ei}-${pi}-${ri}" onclick="pickMatch(${ei},${pi},${ri})">${String.fromCharCode(65+ri)}</button>`).join('')}</div>
          </div>`).join('')}</div>`;
    }
    c.appendChild(card);
  });
}

// Teacher clicks the option the student SAID → instant feedback, question locks.
function pick(ei,oi){
  const ex=exercises[ei];
  if(ex._done)return; ex._done=true;
  const ok=oi===ex.correct;
  ex.options.forEach((_,i)=>{
    const el=document.getElementById(`opt-${ei}-${i}`);
    el.disabled=true;
    if(i===ex.correct)el.classList.add('right');
    else if(i===oi)el.classList.add('wrong');
    else el.classList.add('dim');
  });
  updateScore(ok);
}

function pickTF(ei,si,val){
  const ex=exercises[ei];
  if(!ex._done)ex._done={};
  if(ex._done[si])return; ex._done[si]=true;
  const s=ex.statements[si];
  const t=document.getElementById(`tf-${ei}-${si}-t`);
  const f=document.getElementById(`tf-${ei}-${si}-f`);
  t.disabled=true;f.disabled=true;
  (s.answer?t:f).classList.add('right');
  if(val!==s.answer)(val?t:f).classList.add('wrong');
  updateScore(val===s.answer);
}

function pickMatch(ei,pi,ri){
  const ex=exercises[ei];
  if(!ex._done)ex._done={};
  if(ex._done[pi])return; ex._done[pi]=true;
  const correctIdx=ex._opts.indexOf(ex.pairs[pi].right);
  ex._opts.forEach((_,i)=>{
    const el=document.getElementById(`ml-${ei}-${pi}-${i}`);
    el.disabled=true;
    if(i===correctIdx)el.classList.add('right');
    else if(i===ri)el.classList.add('wrong');
    else el.classList.add('dim');
  });
  updateScore(ri===correctIdx);
}

// Fill in the blank: student says the word aloud → teacher reveals → marks right/wrong.
function reveal(ei){
  const box=document.getElementById(`fb-${ei}`);
  box.innerHTML=`<p class="answer-big">${exercises[ei].correct}</p>
    <div style="display:flex;gap:8px">
      <button class="judge jr" id="jr-${ei}" onclick="judge(${ei},true)">✓ Student got it</button>
      <button class="judge jw" id="jw-${ei}" onclick="judge(${ei},false)">✗ Missed it</button>
    </div>`;
}
function judge(ei,ok){
  const ex=exercises[ei];
  if(ex._done)return; ex._done=true;
  const r=document.getElementById(`jr-${ei}`),w=document.getElementById(`jw-${ei}`);
  r.disabled=true;w.disabled=true;
  (ok?r:w).classList.add('picked');
  updateScore(ok);
}

function exportPDF(){
  if(!currentKey){alert('Choose a topic first!');return;}
  const pa=document.getElementById('printArea');
  let num=0;
  let h=`<div style="font-family:Arial;color:#222;padding:30px;line-height:1.6">
    <h1 style="text-align:center;border-bottom:3px solid #6366f1;padding-bottom:12px">Exercises — ${bank[currentKey].label}</h1>`;
  exercises.forEach(ex=>{
    if(ex.type==='multiple_choice'){num++;
      h+=`<p style="margin-top:14px"><b>${num}. ${ex.question}</b></p>`;
      ex.options.forEach((o,i)=>h+=`<p style="margin-left:15px">${String.fromCharCode(65+i)}) ${o} ${i===ex.correct?'<b>✔</b>':''}</p>`);
    }
    if(ex.type==='fill_blank'){num++;
      h+=`<p style="margin-top:14px"><b>${num}. ${ex.question}</b> &nbsp; <span style="color:#059669"><b>(${ex.correct})</b></span></p>`;
    }
    if(ex.type==='true_false'){
      h+=`<p style="margin-top:14px"><b>True or False:</b></p>`;
      ex.statements.forEach((s,i)=>h+=`<p style="margin-left:15px">${i+1}. ${s.text} — <b>${s.answer?'True':'False'}</b></p>`);
    }
    if(ex.type==='matching'){
      h+=`<p style="margin-top:14px"><b>${ex.question}</b></p>`;
      ex.pairs.forEach(p=>h+=`<p style="margin-left:15px">${p.left} → <b>${p.right}</b></p>`);
    }
  });
  h+=`</div>`;
  pa.innerHTML=h;
  printDoc(document.getElementById('printArea').innerHTML,'Sabatovicz');
}
