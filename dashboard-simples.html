<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Lu - Dashboard de Aulas</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    .gradient-coral { background: linear-gradient(135deg, #ff6b4a 0%, #ff8566 100%); }
    .gradient-emerald { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
    .card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border: 1px solid rgba(148, 163, 184, 0.2); }
    .card:hover { border-color: rgba(148, 163, 184, 0.4); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen p-6"></div>

  <script>
    // DADOS DOS MÓDULOS
    const modules = [
      {
        id: 'sp-1',
        title: 'Simple Present - Introducting Yourself',
        sections: [
          { type: 'content', title: '🎯 Context', content: 'Tell me: Who are you? What is your name? Where are you from?\n\nToday we learn the most important phrase in English: introducing yourself!' },
          { type: 'listening', title: '👂 Listening', content: 'Listen and answer: "Hi! My name is John. I am 30 years old. I am from Canada."' },
          { type: 'practice', title: '✏️ Practice', content: 'Complete: I am _____. I am from _____.' },
          { type: 'speaking', title: '💬 Speaking', content: 'Tell us about yourself. Say your name, age, and where you are from.' }
        ]
      },
      {
        id: 'sp-2',
        title: 'Simple Present - Daily Routine',
        sections: [
          { type: 'content', title: '🎯 Context', content: 'What do you do every day? What time do you wake up? What time do you sleep?\n\nWe use Simple Present to talk about routines and habits.' },
          { type: 'listening', title: '👂 Listening', content: 'Listen: "I wake up at 7 AM. I eat breakfast. I go to work. I come home at 6 PM."' },
          { type: 'practice', title: '✏️ Practice', content: 'Complete: I wake up at _____. I go to _____ at _____.' },
          { type: 'speaking', title: '💬 Speaking', content: 'Describe your daily routine. What time do you wake up? What do you do in the morning?' }
        ]
      }
    ];

    let currentModuleIndex = 0;
    let responses = {};

    function renderApp() {
      const app = document.getElementById('app');
      const currentModule = modules[currentModuleIndex];
      
      app.innerHTML = `
        <div class="max-w-4xl mx-auto">
          <!-- HEADER -->
          <div class="mb-8">
            <button onclick="goBack()" class="text-slate-400 hover:text-white mb-4">← Voltar</button>
            <h1 class="text-4xl font-bold text-white mb-2">${currentModule.title}</h1>
            <p class="text-slate-400">${currentModule.id}</p>
          </div>

          <!-- SECTIONS -->
          <div class="space-y-6">
            ${currentModule.sections.map((section, idx) => renderSection(section, idx)).join('')}
          </div>

          <!-- ACTIONS -->
          <div class="mt-12 flex gap-4">
            <button onclick="exportPDF()" class="gradient-emerald text-white font-bold py-3 px-6 rounded-xl">
              📥 Exportar PDF
            </button>
            <button onclick="resetResponses()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl">
              🔄 Resetar
            </button>
          </div>
        </div>
      `;
    }

    function renderSection(section, idx) {
      const key = `${modules[currentModuleIndex].id}-${idx}`;
      const response = responses[key] || '';

      if (section.type === 'content') {
        return `
          <div class="card rounded-xl p-6">
            <h2 class="text-2xl font-bold text-white mb-4">${section.title}</h2>
            <p class="text-slate-300 whitespace-pre-line">${section.content}</p>
          </div>
        `;
      }

      if (section.type === 'listening') {
        return `
          <div class="card rounded-xl p-6">
            <h2 class="text-2xl font-bold text-white mb-4">${section.title}</h2>
            <div class="gradient-coral p-4 rounded-lg text-white mb-4">
              <p class="font-bold mb-2">🔊 Áudio:</p>
              <p>${section.content}</p>
            </div>
            <p class="text-slate-300">Pergunta: O que você ouviu?</p>
          </div>
        `;
      }

      if (section.type === 'practice') {
        return `
          <div class="card rounded-xl p-6">
            <h2 class="text-2xl font-bold text-white mb-4">${section.title}</h2>
            <p class="text-slate-300 mb-4">${section.content}</p>
            <textarea 
              class="w-full p-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-emerald-500 focus:outline-none"
              rows="4"
              placeholder="Sua resposta..."
              onchange="saveResponse('${modules[currentModuleIndex].id}-${idx}', this.value)"
            >${response}</textarea>
          </div>
        `;
      }

      if (section.type === 'speaking') {
        return `
          <div class="card rounded-xl p-6">
            <h2 class="text-2xl font-bold text-white mb-4">${section.title}</h2>
            <div class="bg-emerald-900 bg-opacity-30 border border-emerald-500 rounded-lg p-4 mb-4">
              <p class="text-emerald-300 font-bold mb-2">💬 Prompt:</p>
              <p class="text-white">${section.content}</p>
            </div>
            <label class="text-slate-300">Notas do professor:</label>
            <textarea 
              class="w-full p-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-emerald-500 focus:outline-none mt-2"
              rows="4"
              placeholder="Observações sobre a conversação..."
              onchange="saveResponse('${modules[currentModuleIndex].id}-${idx}-notes', this.value)"
            >${responses[`${modules[currentModuleIndex].id}-${idx}-notes`] || ''}</textarea>
          </div>
        `;
      }

      return '';
    }

    function saveResponse(key, value) {
      responses[key] = value;
    }

    function exportPDF() {
      const module = modules[currentModuleIndex];
      let content = `${module.title}\n\n`;
      
      module.sections.forEach((section, idx) => {
        const key = `${module.id}-${idx}`;
        content += `${section.title}\n`;
        content += `${section.content}\n\n`;
        if (responses[key]) {
          content += `Resposta: ${responses[key]}\n\n`;
        }
        content += '---\n\n';
      });

      const element = document.createElement('a');
      element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(content));
      element.setAttribute('download', `${module.title}.txt`);
      element.style.display = 'none';
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
      alert('✅ Arquivo exportado!');
    }

    function resetResponses() {
      if (confirm('Resetar todas as respostas?')) {
        responses = {};
        renderApp();
        alert('✅ Respostas zeradas!');
      }
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    // RENDER INICIAL
    renderApp();
  </script>
</body>
</html>
