<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⭐ Teacher Lu - Lesson Generator Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    .gradient-coral { background: linear-gradient(135deg, #ff6b4a 0%, #ff8566 100%); }
    .gradient-emerald { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
    .gradient-indigo { background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%); }
    .gradient-amber { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); }
    .card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border: 1px solid rgba(148, 163, 184, 0.2); }
    .card:hover { border-color: rgba(148, 163, 184, 0.4); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .stage-card { border-left: 4px solid; transition: all 0.3s; }
    .stage-card:hover { transform: translateX(4px); }
    .timer-display { font-size: 2rem; font-weight: bold; font-family: 'Poppins'; }
    .tool-button { display: inline-block; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; margin: 4px; text-decoration: none; color: white; transition: all 0.2s; }
    .tool-button:hover { transform: scale(1.05); }
    .wordwall { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .kahoot { background: linear-gradient(135deg, #ffd800 0%, #ff8c00 100%); color: black; }
    .baamboozle { background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%); }
    .testeng { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
    #printArea { background: white; color: #333; padding: 40px; font-family: Arial, sans-serif; line-height: 1.6; }
    .modal { background: white; color: #333; }
    .modal table { width: 100%; border-collapse: collapse; }
    .modal th, .modal td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    .modal th { background: #f0f0f0; font-weight: bold; }
  </style>
</head>
<body>
  <div class="min-h-screen">
    <!-- HEADER -->
    <div class="gradient-indigo text-white p-6 sticky top-0 z-40 shadow-lg">
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-4">
          <div>
            <h1 class="text-3xl font-bold">⭐ Teacher Lu - Lesson Generator Pro</h1>
            <p class="text-indigo-100">8 Etapas com Exercícios Prontos</p>
          </div>
          <button onclick="goHome()" class="bg-white text-indigo-600 font-bold py-2 px-4 rounded-lg hover:bg-indigo-50">
            ← Menu
          </button>
        </div>
        
        <!-- THEME INPUT -->
        <div class="flex gap-4 items-end">
          <div class="flex-1">
            <label class="block text-indigo-100 text-sm font-bold mb-2">Tema da Aula:</label>
            <input 
              type="text" 
              id="themeInput" 
              placeholder="Ex: Sports, Food, Travel, Animals, Technology..."
              class="w-full p-3 bg-indigo-900 bg-opacity-50 border border-indigo-400 rounded-lg text-white placeholder-indigo-200 focus:outline-none focus:border-white"
              onchange="generateLesson(this.value)"
            />
          </div>
          <button onclick="generateLesson(document.getElementById('themeInput').value)" class="gradient-emerald text-white font-bold py-3 px-6 rounded-lg hover:shadow-lg">
            ⚡ Gerar Aula
          </button>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="max-w-7xl mx-auto p-6">
      <div id="lessonContainer" class="space-y-4"></div>

      <!-- ACTIONS -->
      <div class="card rounded-xl p-6 mt-8 flex gap-4 flex-wrap">
        <button onclick="showPlanModal()" class="gradient-indigo text-white font-bold py-3 px-6 rounded-lg">
          📋 Ver Plano
        </button>
        <button onclick="startTimer()" class="gradient-amber text-white font-bold py-3 px-6 rounded-lg">
          ⏱️ Timer
        </button>
        <button onclick="downloadPDF()" class="gradient-emerald text-white font-bold py-3 px-6 rounded-lg">
          📄 Download PDF
        </button>
        <button onclick="resetLesson()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg">
          🔄 Reset
        </button>
      </div>

      <!-- TIMER -->
      <div id="timerDisplay" class="hidden fixed bottom-6 right-6 card rounded-2xl p-8 text-center border-2 border-amber-400 z-40">
        <p class="text-amber-300 text-sm font-bold mb-2">TEMPO</p>
        <div class="timer-display text-white" id="timerValue">00:00</div>
        <div class="flex gap-2 mt-4">
          <button onclick="pauseTimer()" class="flex-1 bg-amber-600 text-white py-2 rounded font-bold">⏸</button>
          <button onclick="closeTimer()" class="flex-1 bg-slate-600 text-white py-2 rounded font-bold">✕</button>
        </div>
      </div>

      <!-- PLAN MODAL -->
      <div id="planModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-96 overflow-y-auto border border-gray-300 modal">
          <div class="sticky top-0 bg-gray-100 p-6 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold">📋 Plano de Aulas - 60 minutos</h3>
            <button onclick="closePlanModal()" class="text-gray-600 hover:text-black text-2xl font-bold">✕</button>
          </div>
          <div id="planContent" class="p-6"></div>
        </div>
      </div>

      <!-- HIDDEN PRINT AREA -->
      <div id="printArea" class="hidden"></div>
    </div>
  </div>

  <script>
    const stages = [
      { id: 1, name: "Welcome + Small Talk", time: 5, objective: "Aquecer o cérebro" },
      { id: 2, name: "Review", time: 8, objective: "Revisar anterior" },
      { id: 3, name: "Lead-in", time: 5, objective: "Introduzir tema" },
      { id: 4, name: "Vocabulary", time: 8, objective: "Ensinar vocabulário" },
      { id: 5, name: "Grammar Focus", time: 10, objective: "Ensinar estrutura" },
      { id: 6, name: "Controlled Practice", time: 8, objective: "Fixar aprendizado" },
      { id: 7, name: "Speaking", time: 12, objective: "Comunicação real" },
      { id: 8, name: "Wrap-up", time: 4, objective: "Consolidar" }
    ];

    const exercises = {
      vocabulary: [
        "1. Matching: Connect words with images\n2. Fill in the blanks: Complete sentences with vocabulary\n3. Word search: Find 10 words in the puzzle\n4. Multiple choice: Select the correct word\n5. Pronunciation: Repeat after audio",
        "1. Create sentences with 5 new words\n2. Synonym matching game\n3. Category sorting activity\n4. Vocabulary quiz (10 questions)\n5. Translation exercise"
      ],
      grammar: [
        "1. Transform sentences (affirmative → negative → question)\n2. Fill in with correct form\n3. Multiple choice grammar exercises\n4. Drag and drop: Order words correctly\n5. Conjugation practice",
        "1. Complete the dialogue\n2. Error correction: Find 5 mistakes\n3. Verb tense exercises\n4. Sentence structure puzzle\n5. Grammar in context"
      ],
      practice: [
        "1. Wordwall interactive game\n2. Kahoot quiz (10 questions)\n3. Fill in the blanks (10 sentences)\n4. True or False (8 statements)\n5. Matching exercise",
        "1. Baamboozle game (5 rounds)\n2. Multiple choice (12 questions)\n3. Complete the conversation\n4. Picture description\n5. Listen and choose activity"
      ],
      speaking: [
        "1. Describe the image in 5 sentences\n2. Answer personal questions about the topic\n3. Role-play: Create a dialogue\n4. Tell a story using new vocabulary\n5. Debate: Express opinions",
        "1. Interview your partner\n2. Present on the topic (3 minutes)\n3. Answer rapid-fire questions\n4. Create and perform a skit\n5. Discuss and compare views"
      ]
    };

    let currentTheme = "";
    let stageContents = {};
    let timerInterval = null;
    let timerRemaining = 0;

    function generateLesson(theme) {
      if (!theme.trim()) {
        alert("Digite um tema!");
        return;
      }
      currentTheme = theme;
      stageContents = {};
      renderLesson();
    }

    function renderLesson() {
      const container = document.getElementById('lessonContainer');
      
      if (!currentTheme) {
        container.innerHTML = `<div class="card rounded-xl p-8 text-center text-slate-400"><p>Digite um tema!</p></div>`;
        return;
      }

      container.innerHTML = `<div class="card rounded-xl p-6 mb-6 bg-gradient-to-r from-indigo-900 to-indigo-800"><h2 class="text-2xl font-bold text-white">📖 ${currentTheme}</h2><p class="text-indigo-100">60 minutos | 8 etapas estruturadas</p></div>`;

      stages.forEach((stage, idx) => {
        const content = getStageContent(stage, currentTheme);
        const borderColors = ['border-blue-500', 'border-green-500', 'border-purple-500', 'border-yellow-500', 'border-red-500', 'border-pink-500', 'border-cyan-500', 'border-emerald-500'];
        
        container.innerHTML += `
          <div class="stage-card card rounded-xl p-6 ${borderColors[idx]} overflow-hidden">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-xl font-bold text-white">${stage.name}</h3>
              <span class="text-3xl font-bold text-white">${stage.time}m</span>
            </div>
            <p class="text-slate-400 text-sm mb-4">🎯 ${stage.objective}</p>
            <div class="bg-slate-900 p-4 rounded-lg text-slate-300 whitespace-pre-wrap mb-4 max-h-40 overflow-y-auto text-sm">
${content}
            </div>
            <div class="flex gap-2">
              <a href="https://wordwall.net/pt" target="_blank" class="tool-button wordwall">Wordwall</a>
              <a href="https://kahoot.com" target="_blank" class="tool-button kahoot">Kahoot</a>
              <a href="https://baamboozle.com" target="_blank" class="tool-button baamboozle">Baamboozle</a>
              <a href="https://test-english.com" target="_blank" class="tool-button testeng">Test-English</a>
            </div>
          </div>
        `;
      });
    }

    function getStageContent(stage, theme) {
      const stageContents = {
        1: `Welcome! Today we're learning about: ${theme}\n\n- How are you?\n- What did you do yesterday?\n- Are you excited about today's lesson?\n\nGoal: Make student comfortable`,
        
        2: `Review previous lesson:\n- What did we learn last time?\n- Can you remember 3 words?\n- Do you have any questions?\n\nQuick quiz on last topic`,
        
        3: `Introduction to ${theme}:\n\nShow images/videos about ${theme}\nAsk: What do you know about ${theme}?\nConnect with student's experience\nBuild interest and curiosity`,
        
        4: `VOCABULARY - ${theme}\n\nKey words to learn:\n1. [word 1] - meaning\n2. [word 2] - meaning  \n3. [word 3] - meaning\n4. [word 4] - meaning\n5. [word 5] - meaning\n\nExercises:\n${exercises.vocabulary[Math.floor(Math.random() * exercises.vocabulary.length)]}`,
        
        5: `GRAMMAR & LANGUAGE FOCUS\n\nStructure: [Grammar point]\nExamples with ${theme}:\n- Example 1\n- Example 2\n- Example 3\n\nExercises:\n${exercises.grammar[Math.floor(Math.random() * exercises.grammar.length)]}`,
        
        6: `CONTROLLED PRACTICE\n\nNo pressure exercises:\n${exercises.practice[Math.floor(Math.random() * exercises.practice.length)]}\n\nObjective: Consolidate before speaking`,
        
        7: `SPEAKING - Free conversation\n\nPrompts:\n1. Tell me about ${theme}...\n2. What's your experience?\n3. How often do you...?\n4. Describe a time when...\n5. Create a dialogue\n\nExercises:\n${exercises.speaking[Math.floor(Math.random() * exercises.speaking.length)]}`,
        
        8: `WRAP-UP & HOMEWORK\n\nWhat we learned today:\n✓ Vocabulary: [3 key words]\n✓ Grammar: [main structure]\n✓ Speaking: [topic]\n\nHomework:\n- Practice on Test-English\n- Write 5 sentences about ${theme}\n- Prepare for next lesson\n\n🎉 Great job today!`
      };
      
      return stageContents[stage.id] || "";
    }

    function showPlanModal() {
      const planContent = document.getElementById('planContent');
      let html = `
        <table>
          <thead>
            <tr><th>Etapa</th><th>Tempo</th><th>Objetivo</th></tr>
          </thead>
          <tbody>
      `;
      
      stages.forEach(stage => {
        html += `
          <tr>
            <td><strong>${stage.name}</strong></td>
            <td><strong>${stage.time} min</strong></td>
            <td>${stage.objective}</td>
          </tr>
        `;
      });
      
      html += `</tbody></table><div style="margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px;"><p><strong>Total:</strong> 60 minutos</p><p style="margin-top: 10px;"><strong>Tema:</strong> ${currentTheme}</p></div>`;
      
      planContent.innerHTML = html;
      document.getElementById('planModal').classList.remove('hidden');
    }

    function closePlanModal() {
      document.getElementById('planModal').classList.add('hidden');
    }

    function startTimer() {
      const totalTime = 60 * 60;
      timerRemaining = totalTime;
      document.getElementById('timerDisplay').classList.remove('hidden');
      updateTimer();

      timerInterval = setInterval(() => {
        timerRemaining--;
        updateTimer();
        if (timerRemaining <= 0) {
          clearInterval(timerInterval);
          alert('⏰ Aula terminada!');
          closeTimer();
        }
      }, 1000);
    }

    function updateTimer() {
      const mins = Math.floor(timerRemaining / 60);
      const secs = timerRemaining % 60;
      document.getElementById('timerValue').textContent = 
        `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function closeTimer() {
      document.getElementById('timerDisplay').classList.add('hidden');
      if (timerInterval) clearInterval(timerInterval);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
    }

    function downloadPDF() {
      const printArea = document.getElementById('printArea');
      
      let html = `
        <div style="text-align: center; margin-bottom: 30px;">
          <h1 style="border-bottom: 3px solid #333; padding-bottom: 15px; margin-bottom: 20px;">⭐ TEACHER LU - LESSON PLAN</h1>
          <h2 style="color: #666; margin: 20px 0;">${currentTheme}</h2>
          <p style="color: #999;">60 minutos | 8 Etapas Estruturadas</p>
        </div>
        
        <table style="width: 100%; border-collapse: collapse; margin: 30px 0;">
          <thead>
            <tr style="background: #f0f0f0;">
              <th style="border: 1px solid #ddd; padding: 12px; text-align: left;">Etapa</th>
              <th style="border: 1px solid #ddd; padding: 12px; text-align: center;">Tempo</th>
              <th style="border: 1px solid #ddd; padding: 12px; text-align: left;">Objetivo</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      stages.forEach(stage => {
        html += `
          <tr>
            <td style="border: 1px solid #ddd; padding: 12px;"><strong>${stage.name}</strong></td>
            <td style="border: 1px solid #ddd; padding: 12px; text-align: center;"><strong>${stage.time} min</strong></td>
            <td style="border: 1px solid #ddd; padding: 12px;">${stage.objective}</td>
          </tr>
        `;
      });
      
      html += `</tbody></table><hr style="margin: 30px 0;">`;

      stages.forEach((stage, idx) => {
        const content = getStageContent(stage, currentTheme);
        html += `
          <div style="page-break-inside: avoid; margin-bottom: 30px;">
            <h2 style="border-left: 4px solid #667eea; padding-left: 15px; margin: 20px 0 10px 0;">STAGE ${stage.id}: ${stage.name}</h2>
            <p style="color: #666; margin: 5px 0;"><strong>⏱️ Tempo:</strong> ${stage.time} minutos</p>
            <p style="color: #666; margin: 5px 0 20px 0;"><strong>🎯 Objetivo:</strong> ${stage.objective}</p>
            <div style="background: #f9f9f9; padding: 15px; border-radius: 5px; white-space: pre-wrap; line-height: 1.6; font-size: 13px;">
${content}
            </div>
          </div>
        `;
      });

      printArea.innerHTML = html;

      const opt = {
        margin: 10,
        filename: `Lesson-${currentTheme.replace(/\s+/g, '-')}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
      };
      
      html2pdf().set(opt).from(printArea).save();
    }

    function resetLesson() {
      if (confirm('Resetar?')) {
        currentTheme = "";
        stageContents = {};
        document.getElementById('themeInput').value = "";
        renderLesson();
      }
    }

    function goHome() {
      window.location.href = 'index.html';
    }

    renderLesson();
  </script>
</body>
</html>
