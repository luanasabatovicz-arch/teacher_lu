<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hendriks Nederlands</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif;}
  h1,h2,h3{font-family:'Baloo 2',cursive;}
  body{background:#fff8f0;color:#2b2440;min-height:100vh;}
  .topbar{background:linear-gradient(120deg,#ff8a3d 0%,#ff4d9d 50%,#7c5cff 100%);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:40;box-shadow:0 6px 22px rgba(124,92,255,.35);}
  .topwrap{max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .hi{font-size:24px;font-weight:800;font-family:'Baloo 2';}
  .stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .pill{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.6);border-radius:99px;padding:6px 14px;font-weight:800;font-size:15px;}
  .menu-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.6);color:#fff;font-weight:800;padding:6px 14px;border-radius:99px;cursor:pointer;text-decoration:none;font-size:14px;}
  .xpbar{max-width:900px;margin:10px auto 0;height:12px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden;}
  .xpfill{height:100%;background:linear-gradient(90deg,#ffe14d,#4dff9d);border-radius:99px;transition:width .5s;}
  .wrap{max-width:900px;margin:0 auto;padding:22px 20px 70px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .lcard{background:#fff;border:4px solid #ffe0c2;border-radius:22px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 6px 0 #ffd7b0;}
  .lcard:hover{transform:translateY(-4px);box-shadow:0 10px 0 #ffd7b0;}
  .lcard .em{font-size:52px;line-height:1;}
  .lcard .nm{font-family:'Baloo 2';font-size:19px;font-weight:800;margin-top:6px;color:#4a3b7a;}
  .lcard .st{font-size:15px;margin-top:4px;letter-spacing:2px;}
  .lcard.done{border-color:#8ce99a;box-shadow:0 6px 0 #69db7c;background:#f4fff5;}

  .tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
  .tab{white-space:nowrap;background:#fff;border:3px solid #ffe0c2;border-radius:99px;padding:9px 16px;font-weight:800;font-size:14px;cursor:pointer;color:#7a5c3e;}
  .tab.active{background:linear-gradient(135deg,#ff8a3d,#ff4d9d);color:#fff;border-color:transparent;}
  .tab.ok{border-color:#8ce99a;color:#2f9e44;}

  .panel{background:#fff;border:4px solid #ffe0c2;border-radius:24px;padding:22px;box-shadow:0 6px 0 #ffd7b0;}
  .big-em{font-size:110px;text-align:center;line-height:1;margin:6px 0 14px;}
  .word{font-family:'Baloo 2';font-size:40px;font-weight:800;text-align:center;color:#4a3b7a;}
  .prompt{font-family:'Baloo 2';font-size:24px;text-align:center;color:#7a5c3e;margin-bottom:10px;}

  .wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
  .wcard{background:#fffaf3;border:3px solid #ffe0c2;border-radius:18px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .18s;}
  .wcard:hover{transform:scale(1.05);border-color:#ff8a3d;}
  .wcard .e{font-size:46px;line-height:1;}
  .wcard .w{font-family:'Baloo 2';font-size:20px;font-weight:800;color:#4a3b7a;margin-top:4px;}
  .wcard.heard{background:#f4fff5;border-color:#8ce99a;}

  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
  .opt{background:#fffaf3;border:3px solid #ffe0c2;border-radius:18px;padding:16px;font-family:'Baloo 2';font-size:24px;font-weight:800;color:#4a3b7a;cursor:pointer;transition:all .15s;}
  .opt:hover{border-color:#ff8a3d;transform:scale(1.03);}
  .opt.right{background:#d3f9d8;border-color:#40c057;animation:pop .3s;}
  .opt.wrong{background:#ffe3e3;border-color:#fa5252;}
  .opt .oe{font-size:44px;display:block;line-height:1.1;}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

  .btn{border:none;border-radius:99px;font-family:'Baloo 2';font-weight:800;cursor:pointer;padding:13px 26px;font-size:18px;color:#fff;transition:all .2s;}
  .btn:hover{transform:translateY(-2px);}
  .btn.orange{background:linear-gradient(135deg,#ff8a3d,#ffb56b);box-shadow:0 5px 0 #e06a1f;}
  .btn.green{background:linear-gradient(135deg,#51cf66,#8ce99a);box-shadow:0 5px 0 #2f9e44;}
  .btn.purple{background:linear-gradient(135deg,#7c5cff,#b197fc);box-shadow:0 5px 0 #5f3dc4;}
  .btn.gray{background:#e9ecef;color:#495057;box-shadow:0 5px 0 #ced4da;}
  .btn.big{font-size:22px;padding:16px 34px;}

  .say-row{background:#fffaf3;border:3px solid #ffe0c2;border-radius:18px;padding:14px;margin:10px 0;display:flex;align-items:center;gap:14px;}
  .say-row .e{font-size:44px;}
  .say-row .t{font-family:'Baloo 2';font-size:22px;font-weight:800;color:#4a3b7a;flex:1;}
  .say-row.ok{background:#f4fff5;border-color:#8ce99a;}

  .feedback{text-align:center;font-family:'Baloo 2';font-size:28px;font-weight:800;margin-top:14px;min-height:38px;}
  .prog{text-align:center;color:#a08a6f;font-weight:800;margin-bottom:8px;font-size:15px;}
  .center{text-align:center;}

  .ex-item{background:#fffaf3;border:3px solid #ffe0c2;border-radius:18px;padding:16px;margin-bottom:12px;}
  .ex-item.right{background:#d3f9d8;border-color:#40c057;}
  .ex-item.wrong{background:#ffe3e3;border-color:#fa5252;}
  .ex-tag{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#ff8a3d;}
  .ex-q{font-family:'Baloo 2';font-size:22px;font-weight:800;color:#4a3b7a;margin:4px 0 10px;}
  .nlhint{background:#e7f5ff;border:2px solid #a5d8ff;border-radius:99px;padding:3px 12px;font-weight:800;color:#1971c2;font-size:15px;display:inline-block;}
  .ex-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ex-opt{background:#fff;border:3px solid #ffe0c2;border-radius:14px;padding:12px;font-family:'Baloo 2';font-size:20px;font-weight:800;color:#4a3b7a;cursor:pointer;transition:all .15s;}
  .ex-opt:hover{border-color:#ff8a3d;}
  .ex-opt.sel{background:#7c5cff;border-color:#7c5cff;color:#fff;}
  .ex-opt.ok{background:#d3f9d8;border-color:#40c057;color:#2b8a3e;}
  .ex-opt.no{background:#ffe3e3;border-color:#fa5252;color:#c92a2a;}
  .ex-inp{width:100%;padding:12px;border:3px solid #ffe0c2;border-radius:14px;font-family:'Baloo 2';font-size:22px;font-weight:800;color:#4a3b7a;background:#fff;text-align:center;}
  .ex-inp:focus{outline:none;border-color:#ff8a3d;}
  .ex-inp.ok{border-color:#40c057;background:#d3f9d8;}
  .ex-inp.no{border-color:#fa5252;background:#ffe3e3;}
  .ex-sel{padding:10px;border:3px solid #ffe0c2;border-radius:14px;font-family:'Baloo 2';font-size:17px;font-weight:800;color:#4a3b7a;background:#fff;cursor:pointer;}
  .ex-sel.ok{border-color:#40c057;background:#d3f9d8;}
  .ex-sel.no{border-color:#fa5252;background:#ffe3e3;}
  .mrow{display:flex;gap:10px;align-items:center;margin:8px 0;}
  .mrow .ml{flex:1;font-family:'Baloo 2';font-size:20px;font-weight:800;color:#4a3b7a;}
  .tf-row{display:flex;gap:8px;}
  .tf-row .ex-opt{flex:1;text-align:center;}
  .score-box{background:linear-gradient(135deg,#7c5cff,#ff4d9d);color:#fff;border-radius:20px;padding:20px;text-align:center;margin-bottom:14px;}
  .score-box .sv{font-family:'Baloo 2';font-size:44px;font-weight:800;line-height:1;}
  .hide{display:none;}
  .cel{position:fixed;inset:0;background:rgba(43,36,64,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .cel.show{display:flex;}
  .celbox{background:#fff;border-radius:28px;padding:34px;text-align:center;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:pop .4s;}

  .celbox h2{font-size:34px;color:#4a3b7a;margin:6px 0;}
  .celbox p{font-size:19px;color:#7a5c3e;font-weight:700;margin-bottom:16px;}
</style>
</head>

const GAMES=[
 {id:'words', name:'👂 Woorden'},
 {id:'match', name:'🎯 Verbinden'},
 {id:'listen', name:'🔊 Luisteren'},

 {id:'say', name:'🗣️ Zeggen'}

/* ================= EXERCISE GENERATOR (NL target, PT support) ================= */
let exTheme='people', exList=[], exAns={}, exChecked=false;

function openEx(){
  document.getElementById('home').classList.add('hide');
  document.getElementById('lesson').classList.add('hide');
  document.getElementById('exView').classList.remove('hide');
  buildEx(exTheme);
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderExTabs(){
  document.getElementById('exTabs').innerHTML=LESSONS.map(l=>
    `<button class="tab ${l.id===exTheme?'active':''}" onclick="buildEx('${l.id}')">${l.icon} ${l.name}</button>`).join('');
}

function buildEx(id){
  exTheme=id; exAns={}; exChecked=false;
  const L=LESSONS.find(x=>x.id===id);
  const W=L.words;
  const pick=(not,n)=>shuffle(W.filter(x=>x.w!==not)).slice(0,n);
  exList=[];

  // A) 6x emoji -> Dutch word (4 options)
  shuffle(W).slice(0,6).forEach(q=>{
    exList.push({t:'mc',e:q.e,ask:'Wat is dit?',correct:q.w,opts:shuffle([q,...pick(q.w,3)]).map(x=>x.w)});
  });
  // B) 4x Dutch word -> emoji (4 options)
  shuffle(W).slice(0,4).forEach(q=>{
    exList.push({t:'mce',word:q.w,ask:'Waar is "'+q.w+'"?',correct:q.e,opts:shuffle([q,...pick(q.w,3)]).map(x=>x.e)});
  });
  // C) 5x type the word
  shuffle(W).slice(0,5).forEach(q=>{
    exList.push({t:'fill',e:q.e,ask:'Schrijf het woord:',correct:q.w});
  });
  // D) 6x true / false
  shuffle(W).slice(0,6).forEach(q=>{
    const lie=Math.random()<0.5;
    const shown=lie?pick(q.w,1)[0].w:q.w;
    exList.push({t:'tf',e:q.e,ask:'Is dit "'+shown+'"?',correct:!lie,right:q.w});
  });
  // E) 5x matching emoji -> Dutch word
  const mp=shuffle(W).slice(0,5);
  exList.push({t:'match',ask:'Verbind het plaatje met het woord:',pairs:mp.map(x=>({nlw:x.w,e:x.e})),bag:shuffle(mp.map(x=>x.w))});

  renderExTabs();
  document.getElementById('exScore').innerHTML='';
  renderEx();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderEx(){
  let n=0;
  document.getElementById('exBody').innerHTML=exList.map((q,i)=>{
    if(q.t==='match'){
      return `<div class="ex-item" id="ei-${i}">
        <div class="ex-tag">Verbinden</div><div class="ex-q">${q.ask}</div>
        ${q.pairs.map((p,pi)=>`<div class="mrow">
          <span style="font-size:40px">${p.e}</span>
          <select class="ex-sel" id="ms-${i}-${pi}" style="flex:1" onchange="exAns['${i}-${pi}']=this.value">
            <option value="">...?</option>
            ${q.bag.map(b=>`<option>${b}</option>`).join('')}
          </select>
          <span id="mm-${i}-${pi}" style="width:26px;font-size:20px"></span>
        </div>`).join('')}
      </div>`;
    }
    n++;
    let inner='';
    if(q.t==='mc'||q.t==='mce'){
      inner=`<div class="ex-opts">${q.opts.map((o,oi)=>`<button class="ex-opt" id="eo-${i}-${oi}" onclick="pickEx(${i},${oi})">${o}</button>`).join('')}</div>`;
    }
    if(q.t==='fill'){
      inner=`<input class="ex-inp" id="ef-${i}" placeholder="..." oninput="exAns[${i}]=this.value">
             <div id="eh-${i}" style="text-align:center;font-weight:800;color:#2f9e44;margin-top:6px"></div>`;
    }
    if(q.t==='tf'){
      inner=`<div class="tf-row">
        <button class="ex-opt" id="et-${i}-yes" onclick="pickEx(${i},true)">✓ Ja</button>
        <button class="ex-opt" id="et-${i}-no" onclick="pickEx(${i},false)">✗ Nee</button></div>`;
    }
    return `<div class="ex-item" id="ei-${i}">
      <div class="ex-tag">${(q.t==='mc'||q.t==='mce')?'Kies':q.t==='fill'?'Schrijf':'Ja of nee'}</div>
      <div class="ex-q">${n}. ${q.ask}</div>
      ${q.e?`<div style="font-size:64px;text-align:center;line-height:1">${q.e}</div>`:''}
      ${inner}
    </div>`;
  }).join('');
}

function pickEx(i,v){
  if(exChecked)return;
  exAns[i]=v;
  const q=exList[i];
  if(q.t==='mc'||q.t==='mce')q.opts.forEach((o,oi)=>document.getElementById('eo-'+i+'-'+oi).classList.remove('sel'));
  if(q.t==='tf'){document.getElementById('et-'+i+'-yes').classList.remove('sel');document.getElementById('et-'+i+'-no').classList.remove('sel');}
  const id=q.t==='tf'?('et-'+i+'-'+(v?'yes':'no')):('eo-'+i+'-'+v);
  document.getElementById(id).classList.add('sel');
}

function checkEx(){
  exChecked=true;
  let correct=0,total=0;
  exList.forEach((q,i)=>{
    if(q.t==='mc'||q.t==='mce'){
      total++;
      const sel=exAns[i];
      q.opts.forEach((o,oi)=>{
        const el=document.getElementById('eo-'+i+'-'+oi);
        el.classList.remove('sel');
        if(o===q.correct)el.classList.add('ok');
        else if(oi===sel)el.classList.add('no');
      });
      if(sel!==undefined&&q.opts[sel]===q.correct)correct++;
      else document.getElementById('ei-'+i).classList.add('wrong');
    }
    if(q.t==='fill'){
      total++;
      const el=document.getElementById('ef-'+i);
      const v=(exAns[i]||'').toLowerCase().trim();
      if(v===q.correct){el.classList.add('ok');correct++;}
      else{el.classList.add('no');document.getElementById('eh-'+i).textContent='→ '+q.correct;}
    }
    if(q.t==='tf'){
      total++;
      const sel=exAns[i];
      const yes=document.getElementById('et-'+i+'-yes'),no=document.getElementById('et-'+i+'-no');
      yes.classList.remove('sel');no.classList.remove('sel');
      (q.correct?yes:no).classList.add('ok');
      if(sel!==undefined&&sel!==q.correct)(sel?yes:no).classList.add('no');
      if(sel===q.correct)correct++;
      else document.getElementById('ei-'+i).classList.add('wrong');
    }
    if(q.t==='match'){
      q.pairs.forEach((p,pi)=>{
        total++;
        const el=document.getElementById('ms-'+i+'-'+pi);
        const mk=document.getElementById('mm-'+i+'-'+pi);
        const v=exAns[i+'-'+pi];
        if(v===p.nlw){el.classList.add('ok');mk.textContent='✓';mk.style.color='#40c057';correct++;}
        else{el.classList.add('no');mk.textContent='✗';mk.style.color='#fa5252';}
      });
    }
  });
  const pct=Math.round(correct/total*100);
  const face=pct>=80?'🏆':pct>=50?'😃':'💪';
  document.getElementById('exScore').innerHTML=`<div class="score-box">
    <div style="font-size:40px">${face}</div>
    <div class="sv">${correct} / ${total}</div>
    <div style="font-weight:800;font-size:17px;margin-top:4px">${pct>=80?'Geweldig!':pct>=50?'Goed gedaan!':'Ga zo door, jij kan het!'}</div>
  </div>`;
  addXP(correct*3);
  window.scrollTo({top:0,behavior:'smooth'});
}

function exportEx(){
  const L=LESSONS.find(x=>x.id===exTheme);
  let n=0;
  let h=`<h1>Hendrik — ${L.name} ${L.icon}</h1><p><b>Oefeningen Nederlands</b></p>`;
  exList.forEach(q=>{
    if(q.t==='match'){
      h+=`<p style="margin-top:14px"><b>${q.ask}</b></p>`;
      q.pairs.forEach(p=>h+=`<p style="margin-left:15px">${p.e} &nbsp;→&nbsp; <b>${p.nlw}</b></p>`);
      return;
    }
    n++;
    if(q.t==='mc'||q.t==='mce')h+=`<p style="margin-top:12px"><b>${n}. ${q.ask}</b> ${q.e?q.e:''}<br>${q.opts.map(o=>o===q.correct?'<b>'+o+' ✔</b>':o).join(' · ')}</p>`;
    if(q.t==='fill')h+=`<p style="margin-top:12px"><b>${n}. ${q.ask}</b> ${q.e} &nbsp; <b style="color:#2f9e44">${q.correct}</b></p>`;
    if(q.t==='tf')h+=`<p style="margin-top:12px"><b>${n}. ${q.ask}</b> &nbsp; <b>${q.correct?'JA':'NEE'}</b> (${q.right})</p>`;
  });
  var w=window.open('','_blank');
  if(!w){alert('Sta pop-ups toe om de PDF te maken.');return;}
  w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Hendrik-'+L.name+'</title><style>body{font-family:Arial;padding:28px;color:#111;line-height:1.7;}h1{border-bottom:3px solid #ff8a3d;padding-bottom:10px;}</style></head><body>'+h+'<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},250);};<\/scr'+'ipt></body></html>');
  w.document.close();
}

/* ================= STATE ================= */
let P={xp:0, lessons:{}};   // lessons[id] = {heard:[], games:{match:true,...}}
let curLesson=null, curGame='words';
let qi=0, qOrder=[], locked=false;

function load(){
  try{const v=localStorage.getItem('hendrik');if(v)P=JSON.parse(v);}catch(e){}
  if(!P.lessons)P.lessons={};
  LESSONS.forEach(l=>{ if(!P.lessons[l.id])P.lessons[l.id]={heard:[],games:{}}; });
}
function save(){try{localStorage.setItem('hendrik',JSON.stringify(P));}catch(e){}}
function addXP(n){P.xp+=n;save();renderTop();}

function starsOf(id){const g=P.lessons[id].games||{};return ['match','listen','sentence','say'].filter(k=>g[k]).length;}
function totalStars(){return LESSONS.reduce((s,l)=>s+starsOf(l.id),0);}
function levelOf(){return Math.floor(P.xp/100)+1;}

/* ================= AUDIO ================= */
function speak(txt){
  if(!('speechSynthesis' in window))return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='nl-NL';u.rate=0.75;u.pitch=1.1;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ================= TOP ================= */
function renderTop(){
  document.getElementById('pLevel').textContent='Niveau '+levelOf();
  document.getElementById('pStars').textContent='⭐ '+totalStars();
  document.getElementById('pXP').textContent=P.xp+' XP';
  document.getElementById('xpFill').style.width=(P.xp%100)+'%';
}

/* ================= HOME ================= */
function renderHome(){
  document.getElementById('lessonGrid').innerHTML=LESSONS.map(l=>{
    const s=starsOf(l.id);
    return `<div class="lcard ${s===4?'done':''}" onclick="openLesson('${l.id}')">
      <div class="em">${l.icon}</div>
      <div class="nm">${l.name}</div>
      <div class="st">${'⭐'.repeat(s)}${'☆'.repeat(4-s)}</div>
    </div>`;
  }).join('');
  renderTop();
}
function goHome(){
  document.getElementById('home').classList.remove('hide');
  document.getElementById('lesson').classList.add('hide');
  document.getElementById('exView').classList.add('hide');
  speechSynthesis&&speechSynthesis.cancel();
  renderHome();
}

/* ================= LESSON ================= */
function openLesson(id){
  curLesson=LESSONS.find(l=>l.id===id);
  curGame='words';
  document.getElementById('home').classList.add('hide');
  document.getElementById('lesson').classList.remove('hide');
  document.getElementById('lTitle').textContent=curLesson.icon+' '+curLesson.name;
  renderTabs();renderGame();
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderTabs(){
  const g=P.lessons[curLesson.id].games||{};
  document.getElementById('tabs').innerHTML=GAMES.map(x=>
    `<button class="tab ${x.id===curGame?'active':''} ${g[x.id]?'ok':''}" onclick="pickGame('${x.id}')">${x.name}${g[x.id]?' ✓':''}</button>`).join('');
}
function pickGame(id){curGame=id;qi=0;locked=false;qOrder=shuffle(curLesson.words);renderTabs();renderGame();}

function renderGame(){
  ({words:gWords,match:gMatch,listen:gListen,sentence:gSentence,say:gSay})[curGame]();
}

/* ---- 1. WORDS ---- */
function gWords(){
  const st=P.lessons[curLesson.id];
  const all=st.heard.length===curLesson.words.length;
  document.getElementById('panel').innerHTML=`
    <p class="prompt">Klik op elk woord en luister! 👂</p>
    <div class="wgrid">${curLesson.words.map((x,i)=>`
      <div class="wcard ${st.heard.includes(x.w)?'heard':''}" id="wc-${i}" onclick="hearWord(${i})">
        <div class="e">${x.e}</div><div class="w">${x.w}</div>
      </div>`).join('')}</div>
    <div class="feedback" id="fb">${all?'Alles gehoord! ⭐ Speel nu 🎯 Verbinden!':''}</div>`;
}
function hearWord(i){
  const x=curLesson.words[i];
  speak(x.w);
  const st=P.lessons[curLesson.id];
  if(!st.heard.includes(x.w)){st.heard.push(x.w);addXP(2);save();
    document.getElementById('wc-'+i).classList.add('heard');
    if(st.heard.length===curLesson.words.length){document.getElementById('fb').textContent='Alles gehoord! ⭐ Speel nu 🎯 Verbinden!';}
  }
}

/* ---- 2. MATCH (emoji -> word) ---- */
function gMatch(){
  if(!qOrder.length)qOrder=shuffle(curLesson.words);
  if(qi>=qOrder.length){return finishGame('match');}
  const q=qOrder[qi];
  const wrong=shuffle(curLesson.words.filter(x=>x.w!==q.w)).slice(0,3);
  const opts=shuffle([q,...wrong]);
  document.getElementById('panel').innerHTML=`
    <div class="prog">${qi+1} / ${qOrder.length}</div>
    <p class="prompt">Wat is dit? 🎯</p>
    <div class="big-em">${q.e}</div>
    <div class="opts">${opts.map(o=>`<button class="opt" id="op-${o.w}" onclick="ansMatch('${o.w}','${q.w}')">${o.w}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>`;
  speak(q.w);
}
function ansMatch(pick,right){
  if(locked)return;locked=true;
  const ok=pick===right;
  document.getElementById('op-'+right).classList.add('right');
  if(!ok)document.getElementById('op-'+pick).classList.add('wrong');
  document.getElementById('fb').textContent=ok?'Ja! 🎉':'Het is "'+right+'" 😊';
  if(ok)addXP(10);
  speak(right);
  setTimeout(()=>{qi++;locked=false;gMatch();},1200);
}

/* ---- 3. LISTEN (word -> emoji) ---- */
function gListen(){
  if(!qOrder.length)qOrder=shuffle(curLesson.words);
  if(qi>=qOrder.length){return finishGame('listen');}
  const q=qOrder[qi];
  const wrong=shuffle(curLesson.words.filter(x=>x.w!==q.w)).slice(0,3);
  const opts=shuffle([q,...wrong]);
  document.getElementById('panel').innerHTML=`
    <div class="prog">${qi+1} / ${qOrder.length}</div>
    <p class="prompt">Luister en klik op het goede plaatje! 🔊</p>
    <div class="center" style="margin-bottom:12px"><button class="btn orange big" onclick="speak('${q.w}')">🔊 Nog een keer</button></div>
    <div class="opts">${opts.map(o=>`<button class="opt" id="ol-${o.w}" onclick="ansListen('${o.w}','${q.w}')"><span class="oe">${o.e}</span></button>`).join('')}</div>
    <div class="feedback" id="fb"></div>`;
  setTimeout(()=>speak(q.w),350);
}
function ansListen(pick,right){
  if(locked)return;locked=true;
  const ok=pick===right;
  document.getElementById('ol-'+right).classList.add('right');
  if(!ok)document.getElementById('ol-'+pick).classList.add('wrong');
  document.getElementById('fb').textContent=ok?'Heel goed! 🌟':'Dit is "'+right+'" 😊';
  if(ok)addXP(10);
  speak(right);
  setTimeout(()=>{qi++;locked=false;gListen();},1200);
}

/* ---- 4. SENTENCE ---- */
function gSentence(){
  if(!qOrder.length)qOrder=shuffle(curLesson.words);
  if(qi>=qOrder.length){return finishGame('sentence');}
  const q=qOrder[qi];
  const wrong=shuffle(curLesson.words.filter(x=>x.w!==q.w)).slice(0,2);
  const opts=shuffle([q,...wrong]);
  const sent=curLesson.frame.replace('___','<span style="color:#ff4d9d">_____</span>');
  document.getElementById('panel').innerHTML=`
    <div class="prog">${qi+1} / ${qOrder.length}</div>
    <p class="prompt">Maak de zin af! 💬</p>
    <div class="big-em">${q.e}</div>
    <div class="word" style="font-size:30px;margin-bottom:14px">${sent}</div>
    <div class="opts" style="grid-template-columns:1fr 1fr 1fr">${opts.map(o=>`<button class="opt" id="os-${o.w}" onclick="ansSent('${o.w}','${q.w}')">${o.w}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>`;
}
function ansSent(pick,right){
  if(locked)return;locked=true;
  const ok=pick===right;
  document.getElementById('os-'+right).classList.add('right');
  if(!ok)document.getElementById('os-'+pick).classList.add('wrong');
  const full=curLesson.frame.replace('___',right);
  document.getElementById('fb').textContent=ok?'Perfect! 🎈':full;
  if(ok)addXP(10);
  speak(full);
  setTimeout(()=>{qi++;locked=false;gSentence();},1600);
}

/* ---- 5. SAY IT ---- */
function gSay(){
  const said=(P.lessons[curLesson.id].said||[]);
  document.getElementById('panel').innerHTML=`
    <p class="prompt">Zeg het hardop! 🗣️</p>
    <p class="center" style="color:#a08a6f;font-weight:700;margin-bottom:12px">Klik op 🔊, luister en zeg het na. De juf klikt op ✓ als je het zegt!</p>
    ${curLesson.say.map((s,i)=>`
      <div class="say-row ${said.includes(i)?'ok':''}" id="sr-${i}">
        <span class="e">${curLesson.icon}</span>
        <span class="t">${s.nl}</span>
        <button class="btn orange" onclick="speakSay(${i})">🔊</button>
        <button class="btn green" onclick="saidIt(${i})">✓</button>
      </div>`).join('')}
    <div class="feedback" id="fb"></div>`;
}
function speakSay(i){ speak(curLesson.say[i].nl); }

function saidIt(i){
  const st=P.lessons[curLesson.id];
  if(!st.said)st.said=[];
  if(!st.said.includes(i)){st.said.push(i);addXP(10);save();document.getElementById('sr-'+i).classList.add('ok');}
  if(st.said.length>=curLesson.say.length)finishGame('say');
}

/* ---- FINISH ---- */
function finishGame(g){
  const st=P.lessons[curLesson.id];
  if(!st.games)st.games={};
  const first=!st.games[g];
  st.games[g]=true;save();
  renderTabs();renderTop();
  const s=starsOf(curLesson.id);
  document.getElementById('celEmoji').textContent=s===4?'🏆':'🎉';
  document.getElementById('celTitle').textContent=s===4?'Les klaar!':'Goed gedaan!';
  document.getElementById('celText').textContent=s===4
    ? curLesson.name+' is klaar! Jij hebt 4 sterren! ⭐⭐⭐⭐'
    : 'Jij hebt een ster! '+ '⭐'.repeat(s) + '  ('+s+'/4)';
  document.getElementById('cel').classList.add('show');
  if(first)addXP(20);
  qi=0;
  if(g!=='say')document.getElementById('panel').innerHTML='<div class="center"><div class="big-em">'+curLesson.icon+'</div><p class="prompt">Super! Kies een ander spel hierboven 👆</p></div>';
}
function closeCel(){document.getElementById('cel').classList.remove('show');}

function resetAll(){
  if(!confirm("Alles wissen? Dit kan niet ongedaan worden."))return;
  P={xp:0,lessons:{}};
  LESSONS.forEach(l=>P.lessons[l.id]={heard:[],games:{},said:[]});
  save();goHome();
}

load();renderHome();
</script>
</body>
