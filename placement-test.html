<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabatovicz — Placement Test</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:700;}
  body{background:#fff;color:#1e293b;min-height:100vh;}
  .topbar{background:linear-gradient(120deg,#06b6d4 0%,#7c3aed 55%,#db2777 100%);color:#fff;padding:22px 24px;position:sticky;top:0;z-index:40;box-shadow:0 6px 24px rgba(124,58,237,.28);}
  .topwrap{max-width:820px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .menu-btn{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.75);color:#fff;font-family:'Poppins';font-weight:600;padding:8px 16px;border-radius:10px;cursor:pointer;text-decoration:none;font-size:14px;}
  .wrap{max-width:820px;margin:0 auto;padding:26px 24px 70px;}
  .card{background:#fff;border:1px solid #ece7fb;border-radius:14px;box-shadow:0 4px 16px rgba(124,58,237,.07);padding:22px;margin-bottom:16px;}
  .inp{width:100%;padding:13px;border:2px solid #e2ddf5;border-radius:10px;font-size:16px;color:#1e293b;background:#f8f7fe;}
  .inp:focus{outline:none;border-color:#7c3aed;}
  .qnum{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7c3aed;}
  .qtext{font-size:21px;font-weight:600;margin:6px 0 12px;}
  .opt{display:block;width:100%;text-align:left;background:#f8f7fe;border:2px solid #e6e0f7;color:#334155;padding:14px 16px;margin:7px 0;border-radius:10px;cursor:pointer;transition:all .15s;font-size:17px;font-weight:600;}
  .opt .letter{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:#ede9fe;color:#6d28d9;font-weight:800;margin-right:10px;}
  .opt.sel .letter{background:#fff;color:#7c3aed;}
  .opt.right .letter{background:#22c55e;color:#fff;}
  .opt.wrong .letter{background:#ef4444;color:#fff;}
  .opt:hover{border-color:#a78bfa;}
  .opt.sel{background:#7c3aed;border-color:#7c3aed;color:#fff;}
  .opt.right{background:#dcfce7;border-color:#22c55e;color:#166534;}
  .opt.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b;}
  .btn{border:none;border-radius:12px;font-weight:700;font-family:'Poppins';cursor:pointer;padding:14px 26px;font-size:16px;color:#fff;transition:all .2s;box-shadow:0 4px 14px rgba(124,58,237,.22);}
  .btn:hover{transform:translateY(-2px);}
  .btn.go{background:linear-gradient(135deg,#7c3aed,#db2777);}
  .btn.green{background:linear-gradient(135deg,#22c55e,#4ade80);}
  .btn.gray{background:#e2e8f0;color:#475569;box-shadow:none;}
  .result{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;border-radius:16px;padding:32px;text-align:center;margin-bottom:20px;box-shadow:0 10px 30px rgba(124,58,237,.3);}
  .level-badge{font-size:58px;font-weight:800;font-family:'Poppins';letter-spacing:.05em;}
  .score{font-size:22px;opacity:.95;margin:6px 0;}
  .hide{display:none;}
  .note{color:#94a3b8;font-size:13px;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topwrap">
    <div>
      <h1 style="font-size:24px">Placement Test</h1>
      <p style="opacity:.9;font-size:14px">30 questions · result with CEFR level</p>
    </div>
    <a href="index.html" class="menu-btn">← Menu</a>
  </div>
</div>

<div class="wrap">
  <!-- RESULT (top, hidden until finished) -->
  <div id="resultBox" class="hide"></div>

  <!-- NAME -->
  <div class="card" id="nameCard">
    <label style="font-weight:600;display:block;margin-bottom:8px">Student name</label>
    <input class="inp" id="studentName" placeholder="Enter the student's name...">
    <p class="note" style="text-align:left;margin-top:10px">Answer the 30 questions below (from easiest to hardest). At the end, click <b>Finish</b>.</p>
  </div>

  <div id="questions"></div>

  <div style="text-align:center;margin-top:10px">
    <button class="btn go" onclick="finish()">Finish test</button>
  </div>

  <div id="printArea" class="hide"></div>
</div>

<script>
const QUESTIONS=[
 {band:'A1',q:"___ name is Ana.",o:["My","I","Me","Mine"],c:0},
 {band:'A1',q:"She ___ a teacher.",o:["am","is","are","be"],c:1},
 {band:'A1',q:"I ___ from Brazil.",o:["am","is","are","be"],c:0},
 {band:'A1',q:"There are two ___ on the table.",o:["book","books","bookes","a book"],c:1},
 {band:'A1',q:"He ___ coffee every morning.",o:["drink","drinks","drinking","drank"],c:1},
 {band:'A1',q:"___ you like pizza?",o:["Do","Does","Are","Is"],c:0},
 {band:'A1',q:"I have ___ apple.",o:["a","an","the","some"],c:1},
 {band:'A1',q:"They ___ not at home.",o:["is","am","are","do"],c:2},
 {band:'A1',q:"What time ___ it?",o:["is","are","do","has"],c:0},
 {band:'A1',q:"She doesn't ___ TV.",o:["watches","watch","watching","watched"],c:1},
 {band:'A2',q:"Yesterday I ___ to the park.",o:["go","went","gone","going"],c:1},
 {band:'A2',q:"This book is ___ than that one.",o:["good","better","best","more good"],c:1},
 {band:'A2',q:"I'm ___ to travel next week.",o:["go","going","goes","went"],c:1},
 {band:'A2',q:"She ___ TV when I called.",o:["watch","was watching","watches","watched"],c:1},
 {band:'A2',q:"There isn't ___ milk in the fridge.",o:["some","any","many","a"],c:1},
 {band:'A2',q:"He is the ___ student in the class.",o:["tall","taller","tallest","most tall"],c:2},
 {band:'A2',q:"I ___ swim when I was five.",o:["can","could","can't","will"],c:1},
 {band:'A2',q:"We ___ dinner at 8 last night.",o:["have","had","has","having"],c:1},
 {band:'A2',q:"You ___ study for the exam. (advice)",o:["should","are","do","being"],c:0},
 {band:'A2',q:"How ___ water do you drink?",o:["many","much","some","any"],c:1},
 {band:'B1',q:"I ___ never been to London.",o:["has","have","am","did"],c:1},
 {band:'B1',q:"If it rains, we ___ stay home.",o:["will","would","are","have"],c:0},
 {band:'B1',q:"She has lived here ___ 2010.",o:["for","since","from","at"],c:1},
 {band:'B1',q:"The car ___ by my father.",o:["washed","was washed","washes","is washing"],c:1},
 {band:'B1',q:"I wish I ___ more time.",o:["have","had","has","having"],c:1},
 {band:'B1',q:"He said he ___ tired.",o:["is","was","be","are"],c:1},
 {band:'B1',q:"You ___ smoke here; it's not allowed.",o:["mustn't","must","should","can"],c:0},
 {band:'B1',q:"I'm used to ___ up early.",o:["wake","waking","woke","wakes"],c:1},
 {band:'B1',q:"If I ___ rich, I would travel the world.",o:["am","were","was being","be"],c:1},
 {band:'B1',q:"By next year, she ___ finished the course.",o:["will have","has","had","will"],c:0}
];

let answers={};

function renderQuestions(){
  document.getElementById('questions').innerHTML=QUESTIONS.map((it,i)=>`
    <div class="card">
      <div class="qnum">Question ${i+1} · ${it.band}</div>
      <div class="qtext">${it.q}</div>
      ${it.o.map((op,j)=>`<button class="opt" id="o-${i}-${j}" onclick="pick(${i},${j})"><span class="letter">${String.fromCharCode(65+j)}</span>${op}</button>`).join('')}
    </div>`).join('');
}
function pick(i,j){
  answers[i]=j;
  QUESTIONS[i].o.forEach((_,k)=>document.getElementById(`o-${i}-${k}`).classList.remove('sel'));
  document.getElementById(`o-${i}-${j}`).classList.add('sel');
}

function levelFor(c){
  if(c<=7) return {code:'A1',name:'Beginner',color:'#f59e0b',desc:'You are just starting out. You can use very simple phrases about yourself. Begin with the Conversation Lessons (weeks 1-4) and the grammar of Verb to be and Present Simple.'};
  if(c<=14) return {code:'A2',name:'Elementary',color:'#22c55e',desc:'You can already communicate in everyday situations. Work on the past (Past Simple), the future (Going to / Will) and frequency. Conversation Lessons weeks 5-8 and past-tense grammar.'};
  if(c<=21) return {code:'B1',name:'Pre-intermediate',color:'#06b6d4',desc:'You can talk about many topics and tell stories. Focus on Present Perfect, conditionals and modals. Ideal for freer conversation and varied themes.'};
  return {code:'B2',name:'Upper-intermediate',color:'#7c3aed',desc:'You communicate fluently and naturally. Work on more complex structures, advanced vocabulary and nuance. Lessons focused on thematic conversation and refinement.'};
}

function finish(){
  let correct=0; const bands={A1:{t:0,c:0},A2:{t:0,c:0},B1:{t:0,c:0}};
  QUESTIONS.forEach((it,i)=>{
    bands[it.band].t++;
    const sel=answers[i];
    for(let k=0;k<it.o.length;k++){const el=document.getElementById(`o-${i}-${k}`);el.classList.remove('sel');if(k===it.c)el.classList.add('right');else if(k===sel)el.classList.add('wrong');}
    if(sel===it.c){correct++;bands[it.band].c++;}
  });
  const lv=levelFor(correct);
  const box=document.getElementById('resultBox');
  box.className='';
  box.innerHTML=`<div class="result">
      <div style="font-size:13px;letter-spacing:.24em;text-transform:uppercase;opacity:.9">Estimated level</div>
      <div class="level-badge">${lv.code}</div>
      <div style="font-size:20px;font-weight:600">${lv.name}</div>
      <div class="score">Score: ${correct} of 30</div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:8px;color:#7c3aed">Interpretation</h3>
      <p style="color:#475569">${lv.desc}</p>
      <p style="color:#475569;margin-top:10px"><b>Performance by level:</b> A1 ${bands.A1.c}/${bands.A1.t} · A2 ${bands.A2.c}/${bands.A2.t} · B1 ${bands.B1.c}/${bands.B1.t}</p>
      <div style="text-align:center;margin-top:18px">
        <button class="btn green" onclick="exportPDF(${correct})">Download PDF</button>
        <button class="btn gray" onclick="location.reload()">Retake</button>
      </div>
      <p class="note">Guiding result, based on grammar and usage. Combine it with a short conversation to confirm the level.</p>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function exportPDF(correct){
  const lv=levelFor(correct);
  const name=(document.getElementById('studentName').value||'—');
  const bands={A1:{t:0,c:0},A2:{t:0,c:0},B1:{t:0,c:0}};
  QUESTIONS.forEach((it,i)=>{bands[it.band].t++;if(answers[i]===it.c)bands[it.band].c++;});
  const date=new Date().toLocaleDateString('pt-BR');
  let key=QUESTIONS.map((it,i)=>{const ok=answers[i]===it.c;const chosen=answers[i]!==undefined?String.fromCharCode(65+answers[i]):'—';return `<tr><td>${i+1}</td><td>${it.q}</td><td>${chosen}</td><td><b>${String.fromCharCode(65+it.c)}</b></td><td style="color:${ok?'#16a34a':'#dc2626'}">${ok?'✓':'✗'}</td></tr>`;}).join('');
  const html=`
    <h1 style="text-align:center;border-bottom:3px solid #7c3aed;padding-bottom:12px">Placement Test — Sabatovicz</h1>
    <p><b>Student:</b> ${name} &nbsp;&nbsp; <b>Date:</b> ${date}</p>
    <div style="text-align:center;border:3px solid #7c3aed;border-radius:12px;padding:20px;margin:18px 0">
      <div style="font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:#7c3aed">Estimated level</div>
      <div style="font-size:52px;font-weight:bold;color:#7c3aed">${lv.code}</div>
      <div style="font-size:20px">${lv.name}</div>
      <div style="font-size:18px;margin-top:6px">Score: <b>${correct}/30</b></div>
    </div>
    <p><b>Interpretation:</b> ${lv.desc}</p>
    <p><b>Performance by level:</b> A1 ${bands.A1.c}/${bands.A1.t} · A2 ${bands.A2.c}/${bands.A2.t} · B1 ${bands.B1.c}/${bands.B1.t}</p>
    <h2>Detailed answer key</h2>
    <table><thead><tr><th>#</th><th>Question</th><th>Answer</th><th>Correct</th><th>OK</th></tr></thead><tbody>${key}</tbody></table>`;
  printDoc(html,'Nivelamento-'+name);
}

function printDoc(html,title){var w=window.open('','_blank');if(!w){alert('Allow pop-ups to generate the PDF.');return;}w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+title+'</title><style>body{font-family:Arial,Helvetica,sans-serif;padding:28px;colo
